<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library | Novet NFT Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-purple: #6a0dad; --sub-pink: #e0115f; --bg-gray: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg-gray); margin: 0; padding: 0; }
        
        nav { background: #fff; border-bottom: 1px solid #eee; padding: 10px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .nav-link { text-decoration: none; color: #666; font-size: 14px; }
        .nav-active { color: var(--main-purple); font-weight: bold; border-bottom: 2px solid var(--main-purple); }

        .container { display: flex; max-width: 1200px; margin: 30px auto; padding: 0 20px; gap: 40px; }
        .main-content { flex: 1; }
        
        .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .nft-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .nft-img { width: 100%; height: 280px; object-fit: cover; background: #333; display: block; }
        .nft-info { padding: 15px; }

        .listing-form { background: #fff; border: 2px solid var(--main-purple); padding: 25px; border-radius: 16px; margin-bottom: 30px; display: none; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--main-purple); color: white; width: 100%; }
        .btn-outline { background: none; border: 1px solid var(--main-purple); color: var(--main-purple); width: 100%; }
        
        .cover-preview-box { width: 100%; height: 320px; background: #222; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 8px; border: 1px solid #ddd; }
        .preview-title { position: absolute; z-index: 2; width: 100%; text-align: center; color: white; font-size: 20px; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        
        .sidebar { width: 250px; position: sticky; top: 100px; }
        .status-card { background: #fff; border: 2px solid var(--main-purple); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        /* library.html の <style> ブロックの中に追加 */
.status-card {
    background: #fff;
    border: 2px solid var(--main-purple); /* 紫の太枠 */
    padding: 20px;
    border-radius: 16px; /* 角丸を少し大きく */
    box-shadow: 0 4px 12px rgba(106, 13, 173, 0.08); /* ほんのり紫の影 */
    font-size: 14px;
}
    </style>
</head>
<body>
    <input type="file" id="customImgUpload" accept="image/png, image/jpeg" style="display:none;" onchange="handleImageUpload(event)">

<nav>
  <div style="font-weight: bold; color: var(--main-purple); font-size: 20px; display: flex; align-items: center; gap: 8px;">
    💎 Novet NFT Studio
  </div>
  <div style="display: flex; gap: 30px;">
    <a href="nft_mint.html" class="nav-link">作成トップ</a>
    <a href="market.html" class="nav-link">マーケット</a>
    <a href="library.html" class="nav-link nav-active">ライブラリ</a>
    <a href="assets.html" class="nav-link">イラスト保管庫</a>
    <a href="purchased.html" class="nav-link">購入済み一覧</a>
  </div>
  <div><a href="index.html" style="font-size: 13px; color: #999; text-decoration: none;">← 一般サイトへ</a></div>
</nav>

<div class="container">
    <div class="main-content">
        <div id="listingForm" class="listing-form">
            <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 250px;">
                    <div class="cover-preview-box">
                        <img id="previewImg" src="" style="width:100%; height:100%; object-fit:cover; position:absolute; display:none;">
                        <div id="previewTitle" class="preview-title"></div>
                    </div>
                    <div style="display: flex; gap: 5px; margin-top: 10px;">
                        <button onclick="updateTitlePos('top')" class="btn btn-outline" style="flex:1; font-size:11px;">上</button>
                        <button onclick="updateTitlePos('center')" class="btn btn-outline" style="flex:1; font-size:11px;">中</button>
                        <button onclick="updateTitlePos('bottom')" class="btn btn-outline" style="flex:1; font-size:11px;">下</button>
                    </div>
                </div>
                <div style="margin-top:20px; background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #eee;">
    <label style="font-size:12px; font-weight:bold; color:#666;">販売価格 (NVT) ※最低5NVT</label>
    <input type="number" id="inputPrice" min="5" value="5" oninput="calculateFees()" 
           style="width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #6a0dad; font-size:18px; font-weight:bold; box-sizing:border-box;">
    
    <div style="font-size:13px; color:#555; line-height:1.8; margin-top:10px;">
        <div style="display:flex; justify-content:space-between;">
            <span>システム利用料 (5%):</span>
            <span id="feeDisplay">0.25 NVT</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; color:#e0115f; border-top:1px dashed #ccc; margin-top:5px; padding-top:5px;">
            <span>販売時の受取予想額:</span>
            <span id="receiveDisplay">4.75 NVT</span>
        </div>
    </div>
</div>

<div style="margin-top:20px;">
    <button id="submitBtn" onclick="updateListingStatus()" class="btn btn-primary" style="padding:15px; font-size:16px;">
        【販売価格 <span id="btnPriceDisplay">5</span> NVTで公開する】
    </button>
    
    <p style="font-size:11px; color:#888; margin-top:10px; text-align:center;">
        ※購入されると、ウォレットに即時反映されます
    </p>
    <button onclick="hideListingForm()" class="btn" style="width:100%; background:#eee; color:#666; margin-top:10px;">キャンセル</button>
</div>


            </div>
        </div>

        <h2 style="margin-top:0;">My Minted NFTs</h2>
        <div id="nftListArea" class="nft-grid"></div>
    </div>

    <div class="sidebar">
        <div id="userStatusArea" class="status-card">読み込み中...</div>
    </div>
</div>

<script src="auth-check.js"></script>
<script>
// Supabase設定は auth-check.js で共通読み込み済み

let currentNfts = []; // 読み込んだデータを一時保存する箱
let currentEditingNftId = null;

async function init() {
    try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = "nft_mint.html";
            return;
        }
        
        // アカウント情報の取得
        const { data: profile, error: pError } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', session.user.id)
            .eq('authors.zone', 'main')
            .single();

        if (profile) {
    document.getElementById("userStatusArea").innerHTML = `
        <h3 style="border-bottom: 2px solid var(--main-purple); padding-bottom: 5px; margin-bottom: 15px;">マイステータス</h3>
        
        <p style="font-size:13px; margin-bottom:10px;"><b>👤 アカウント：</b><br>${profile.username || "名無し"}</p>
        
        <a href="../portal/wallet.html" style="text-decoration: none; color: inherit; display: block;">
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #eee; transition: background 0.2s;" 
                 onmouseover="this.style.background='#f0f0f0'" 
                 onmouseout="this.style.background='#f9f9f9'">
                <p style="font-size:11px; color:#666; margin-bottom:5px;">保有資産 <span style="color:var(--main-purple); font-weight:bold;">(クリックでウォレットへ)</span></p>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span style="font-size:13px; font-weight:bold; color:var(--main-purple);">💎 NVT (報酬)</span>
                    <span style="font-size:13px; font-weight:bold;">${(profile.nvt_balance || 0).toLocaleString()}</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:13px; font-weight:bold; color:#ff8c00;">💰 NP (ポイント)</span>
                    <span style="font-size:13px; font-weight:bold;">${(profile.np_balance || 0).toLocaleString()}</span>
                </div>
            </div>
        </a>

        <div style="border-top: 1px solid #f0f0f0; padding-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <a href="../portal/account.html" style="text-align: center; text-decoration: none; font-size: 12px; color: var(--main-purple); padding: 8px; border: 1px solid var(--main-purple); border-radius: 8px; font-weight: bold;">
                ← アカウント管理へ戻る
            </a>
            <button onclick="handleLogout()" style="width: 100%; font-size: 11px; cursor: pointer; border: none; background: #f5f5f5; color: #999; padding: 8px; border-radius: 8px;">
                ログアウト
            </button>
        </div>
    `;
}

        // --- NFTリストの取得（修正版：ミント済みのものだけを表示） ---
        const { data: nfts, error: nError } = await supabaseClient
        .from('nft_metadata')
        .select('*')
        .eq('owner_id', session.user.id)
        .not('minted_at', 'is', null) // ★発行日時が null ではない（＝発行済み）ものだけに絞り込む
        .order('minted_at', { ascending: false });

        const listArea = document.getElementById("nftListArea");
        listArea.innerHTML = "";

        if (nfts && nfts.length > 0) {
            currentNfts = nfts; // 🌟 取得したデータを変数に保存
            nfts.forEach((nft, index) => { // 🌟 index を追加
                const card = document.createElement("div");
                card.className = "nft-card";
                const imgUrl = nft.cover_image_url || "";
                
                // 🌟 判定：公開済みかどうか
                const isPublished = nft.is_listing === true;

                card.innerHTML = `
                    <div class="nft-img-container" style="width:100%; height:280px; background:#333; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center;">
                        ${imgUrl ? `<img src="${imgUrl}" class="nft-img" style="width:100%; height:100%; object-fit:cover;">` : `<div style="color:#666;">No Image</div>`}
                    </div>
                    <div class="nft-info">
                        <div style="font-size:11px; color:#999; margin-bottom:5px;">${isPublished ? '🟢 公開中' : '⚪️ 未出品'}</div>
                        <div style="font-weight:bold; font-size:14px; margin-bottom:10px; height: 34px; overflow: hidden;">${nft.title_at_mint}</div>
                        
                        ${isPublished ? `
                            <div style="font-size: 11px; color: #6a0dad; font-weight: bold; margin-bottom: 5px;">
                                価格: ${nft.price_nvt || 0} NVT
                            </div>
                            <button disabled class="btn btn-outline" style="width:100%; font-size:12px; opacity: 0.5; cursor: not-allowed; margin-bottom: 5px;">
                                公開済み（設定変更不可）
                            </button>
                            <button onclick="window.location.href='nft_view.html?id=${nft.id}'" 
                                    style="width: 100%; padding: 8px; background: #fff; color: #6a0dad; border: 1px solid #6a0dad; border-radius: 4px; font-size: 12px; cursor: pointer;">
                                📖 自分の作品を読む
                            </button>
                        ` : `
                            <button onclick="openSettingsByIndex(${index})" class="btn btn-outline" style="width:100%; font-size:12px;">設定・出品</button>
                        `}
                    </div>
                `;
                listArea.appendChild(card);
            });

        } else {
            listArea.innerHTML = "<p style='color:#999;'>ミントされたNFTがありません。</p>";
        }
    
    // 🌟 ここが抜けていました！ try に対する catch と、init関数を閉じる括弧です。
    } catch (e) {
        console.error("Init Error:", e);
    }
}

// 🌟 番号（index）を受け取って設定画面を開く新しい関数
function openSettingsByIndex(index) {
    const nft = currentNfts[index]; // 🌟 箱からデータを取り出す
    if (!nft) return;

    currentEditingNftId = nft.id;
    const form = document.getElementById("listingForm");
    const previewImg = document.getElementById("previewImg");
    const previewTitle = document.getElementById("previewTitle");
    
    form.style.display = "block";
    
    if (nft.cover_image_url) {
        previewImg.src = nft.cover_image_url;
        previewImg.style.display = "block";
    } else {
        previewImg.style.display = "none";
    }
    
    previewTitle.innerText = nft.title_at_mint;
    document.getElementById("inputPrice").value = nft.price_nvt || 5;
    
    updateTitlePos('center');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    calculateFees(); 
}

function hideListingForm() { 
    document.getElementById("listingForm").style.display = "none"; 
}

function updateTitlePos(pos) {
    const t = document.getElementById("previewTitle");
    t.style.top = "auto"; t.style.bottom = "auto"; t.style.transform = "none";
    if (pos === 'top') t.style.top = "20px";
    else if (pos === 'center') { t.style.top = "50%"; t.style.transform = "translateY(-50%)"; }
    else if (pos === 'bottom') t.style.bottom = "20px";
}

/**
 * リアルタイム手数料計算
 */
function calculateFees() {
    const priceInput = document.getElementById("inputPrice");
    let price = parseFloat(priceInput.value) || 0;
    
    const fee = price * 0.05; 
    const receive = price - fee;

    document.getElementById("feeDisplay").innerText = fee.toFixed(2) + " NVT";
    document.getElementById("receiveDisplay").innerText = receive.toFixed(2) + " NVT";
    document.getElementById("btnPriceDisplay").innerText = price;

    const btn = document.getElementById("submitBtn");
    if (price < 5) {
        btn.disabled = true;
        btn.style.opacity = "0.5";
        btn.innerText = "5NVT以上に設定してください";
    } else {
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.innerText = `【販売価格 ${price} NVTで公開する】`;
    }
}

/**
 * 出品更新
 */
async function updateListingStatus() {
    const price = parseFloat(document.getElementById("inputPrice").value);
    
    const { error } = await supabaseClient
        .from('nft_metadata')
        .update({ 
            is_listing: true, // 常に公開
            price_nvt: price 
        })
        .eq('id', currentEditingNftId);

    if (error) {
        alert("エラー: " + error.message);
    } else {
        alert("マーケット情報を更新しました。");
        hideListingForm();
        init(); // 一覧を再読み込みして状態を反映
    }
}

// 実行
init();
</script>
</body>
</html>
