<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@web3auth/modal@9.4.0/dist/modal.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@web3auth/ethereum-provider@9.4.0/dist/ethereumProvider.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f5f5f5; }
    .container { max-width: 400px; margin: 100px auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 30px; }
    button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
    
    /* Googleログインボタン用スタイル */
    .google-btn { background-color: #4285F4; color: #fff; font-weight: bold; }
    .google-btn:hover { background-color: #357ae8; }

    .back-link { display: inline-block; margin-bottom: 20px; color: #6a0dad; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    
    .info-text { text-align: center; margin-top: 20px; font-size: 13px; color: #666; line-height: 1.6; }
    
    .footer { background: #333; color: white; text-align: center; padding: 20px 10px; margin-top: 60px; }
    .footer .copy { font-size: 12px; color: #ccc; }
  </style>
</head>

<body>

<div class="container">
  <a href="index.html" class="back-link">← トップへ戻る</a>
  <h1>ログイン</h1>

  <button type="button" id="googleLoginBtn" class="google-btn">Googleでログイン / ウォレット作成</button>

  <div class="info-text">
    Googleアカウントでログインするだけで、<br>
    あなたの専用ウォレットが自動的に作成されます。
  </div>
</div>

<div class="footer">
  <div class="copy">ODAcorp</div>
</div>

<script>
// --- Supabase 初期化 ---
const SUPABASE_URL = "https://brgaykxyfgylzyujrjbp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2F5a3h5Zmd5bHp5dWpyamJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxNDUsImV4cCI6MjA5MDIwMDE0NX0.HRN3DDpjFKeiyfhdhvcHOHg0lvnSvozJwBFsL0E12e0";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- Web3Auth 初期化設定 ---
let web3auth = null;

async function initWeb3Auth() {
  try {
    const clientId = "BKrGedHzJhGM4Bkk7uI8KoENQQhZnj1cUa6y7aORSSjrF5Wn44j-JOkZwveNuvFRMoJlT6l7Pp1-_AW7iUeRfmE"; 

    const chainConfig = {
      chainNamespace: "eip155",
      chainId: "0x89", 
      rpcTarget: "https://polygon.drpc.org", 
      displayName: "Polygon Mainnet",
      blockExplorerUrl: "https://polygonscan.com/",
      ticker: "MATIC",
      tickerName: "Matic",
    };

    const privateKeyProvider = new window.EthereumProvider.EthereumPrivateKeyProvider({
      config: { chainConfig: chainConfig }
    });

    web3auth = new window.Modal.Web3Auth({
      clientId: clientId,
      web3AuthNetwork: "sapphire_devnet", 
      privateKeyProvider: privateKeyProvider,
      uiConfig: {
        uxMode: "redirect", 
        appName: "Novetcoin",
        theme: "light",
      }
    });

    await web3auth.initModal();

    // ログイン済みでリダイレクトから戻ってきた時の処理
    if (web3auth.connected) {
      const user = await web3auth.getUserInfo();
      console.log("ログイン中:", user);
      alert(`ログイン成功！\nようこそ、${user.name}さん`);
      // 必要に応じてここで index.html に飛ばすなどの処理を追加できます
    }

  } catch (error) {
    console.error("Web3Authの初期化エラー:", error);
  }
}

window.addEventListener("load", initWeb3Auth);

// Googleログインボタン
document.getElementById("googleLoginBtn").addEventListener("click", async function() {
  if (!web3auth) return;
  try {
    await web3auth.connect();
  } catch (error) {
    console.error("ログインエラー:", error);
  }
});
</script>

</body>
</html>
