<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NFT発行・表紙作成 | Novet NFT Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-purple: #6a0dad; --bg-gray: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; color: #333; }
        .confirm-card { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-size: 22px; color: var(--main-purple); border-bottom: 2px solid var(--main-purple); padding-bottom: 10px; margin: 0; }
        .settings-side { display: flex; flex-direction: column; gap: 20px; }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 14px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .gen-section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 13px; resize: none; }
        .preview-side { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222; border-radius: 10px; min-height: 400px; position: relative; overflow: hidden; border: 1px solid #ddd; }
        #coverPreview { width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .no-img-msg { color: #888; text-align: center; z-index: 2; position: absolute; }
        .btn-gen { background: #333; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-mint { background: var(--main-purple); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-mint:disabled { background: #ccc; cursor: not-allowed; }
        .loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 10; color: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="confirm-card">
    <h1>NFT発行・表紙デザイン確定</h1>
        <div class="info-box">
            <div class="info-row"><strong>作品名:</strong> <span id="dispTitle">-</span></div>
            <div class="info-row"><strong>総話数:</strong> <span id="dispEpisodes">-</span></div>
            <div class="info-row"><strong>挿絵数:</strong> <span id="dispIllusts">-</span></div>
        </div>

        <div style="text-align: center; margin: -5px 0 5px 0;">
            <button type="button" onclick="openAssetModal()" style="width: 100%; padding: 12px; background: #fff; border: 2px dashed #6a0dad; color: #6a0dad; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; transition: all 0.2s;">
                🖼️ イラスト保管庫から表紙を選ぶ
            </button>
        </div>
        <div class="gen-section">
            <label style="font-size: 13px; font-weight: bold;">🎨 表紙AI生成（フルカラー）</label>

        <div class="gen-section">
            <label style="font-size: 13px; font-weight: bold;">🎨 表紙AI生成（フルカラー）</label>
            <p style="font-size: 11px; color: #666; margin: 5px 0 10px;">表紙イメージを入力してください（日本語可）</p>
            <textarea id="promptInput" placeholder="例：ファンタジーな街並み、夕暮れ、水彩画風"></textarea>
            <button class="btn-gen" onclick="generateCover()">表紙画像を生成する</button>
        </div>

        <div>
            <button id="mintBtn" class="btn-mint" onclick="handleMint()" disabled>100NPを消費してNFT化</button>
            <p style="font-size: 11px; color: #d9534f; margin-top: 10px; text-align: center;">
                ※NFT化後は、作品内容および表紙の編集はできません。
            </p>
            <a href="nft_mint.html" style="display:block; text-align:center; color:#888; font-size:13px; text-decoration:none; margin-top:15px;">← 保存せずにトップに戻る</a>
        </div>
    </div>

    <div class="preview-side">
        <div id="loader" class="loader">
            <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--main-purple); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
            <p style="font-size: 12px; margin-top: 10px;">表紙を錬成中...</p>
        </div>
        <img id="coverPreview" src="" style="display:none;">
        <div id="noImgMsg" class="no-img-msg">
            <p style="font-size:13px;">まだ表紙がありません。<br>生成を開始してください。</p>
        </div>
    </div>
</div>

<script src="auth-check.js"></script>
<script>

let novelId, currentCoverUrl = "";
let novelTag = "";
let novelData = null; // 🌟 これを追加（小説の元データを保持するため）
// --- 追加：回数管理と生成ロジック ---
let freeGenCount = parseInt(localStorage.getItem('cover_free_gen_count') || "0");
let lastGenDate = localStorage.getItem('cover_gen_date') || "";

// 日付が変わっていたらカウントをリセット
const today = new Date().toLocaleDateString();
if (lastGenDate !== today) {
    freeGenCount = 0;
    localStorage.setItem('cover_free_gen_count', "0");
    localStorage.setItem('cover_gen_date', today);
}

async function init() {
    

    const params = new URLSearchParams(window.location.search);
    novelId = params.get('novel_id');

    try {
        const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
        novelData = novel; // 🌟 これを1行追加
        document.getElementById('dispTitle').innerText = novel.title;
        novelTag = novel.tag || "";
        
        let epCount = 0, imgCount = 0;
        novel.content?.forEach(c => c.episodes?.forEach(e => {
            epCount++;
            if (e.pageAssets) imgCount += Object.values(e.pageAssets).filter(url => url).length;
        }));
        
        document.getElementById('dispEpisodes').innerText = epCount + " 話";
        document.getElementById('dispIllusts').innerText = imgCount + " 枚";

        // 初期表示はサンプル画像
        // 🌟 ここを書き換え：初期表示は画像タグを隠し、メッセージのみ表示する
        const imgEl = document.getElementById('coverPreview');
        const noImgMsg = document.getElementById('noImgMsg');

        imgEl.style.display = 'none'; // 最初はAI画像がないので非表示
        noImgMsg.style.display = 'block'; // 「まだ表紙がありません」を表示

    } catch (err) { console.error(err); }
}

// 🌟 追加：画像URLを読み込んで軽量なWebP(Base64形式)に変換する関数
// 🌟 追加：画像URLを読み込んで軽量なWebP(Base64形式)に変換する関数
async function convertToWebP(imageUrl) {
    if (!imageUrl) return null;
    // すでに変換済みのデータならそのまま返す
    if (imageUrl.startsWith('data:')) return imageUrl; 

    return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous"; // 外部画像の読み込み許可
        
        img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            try {
                // 画質80%のWebPに変換
                const webpDataUrl = canvas.toDataURL("image/webp", 0.8);
                resolve(webpDataUrl);
            } catch (e) {
                console.warn("WebP変換エラー (CORS等): URLを維持します", e);
                resolve(imageUrl); // エラー時はURLのまま保存する安全策
            }
        };
        img.onerror = () => {
            console.warn("画像読み込みエラー: URLを維持します", imageUrl);
            resolve(imageUrl);
        };
        img.src = imageUrl;
    });
}

// ==========================================
// 🌟 今回新しく追加する Storage（バケット）保存機能
// ==========================================

// 追加1：Base64(長い文字列)を、アップロード用のファイル形式(Blob)に変換する魔法
function dataURLtoBlob(dataurl) {
    let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--){
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], {type: mime});
}

// 追加2：Supabase Storageに画像を保存し、公開URLを返す関数
// 追加2：Supabase Storageに画像を保存し、公開URLを返す関数
async function uploadImageToStorage(base64Data, fileNamePrefix) {
    if (!base64Data || base64Data.startsWith('http')) return base64Data;

    // 💡 エラーをごまかす（try-catch）のをやめました！
    const blob = dataURLtoBlob(base64Data);
    const bucketName = 'nft-assets'; 
    const filePath = `${novelId}/${Date.now()}_${fileNamePrefix}.webp`;

    const { data, error } = await supabaseClient.storage
        .from(bucketName)
        .upload(filePath, blob, { contentType: 'image/webp', upsert: true });

    // 🌟 エラーが起きたら、無理やり進まずに処理を「強制ストップ」させる！
    if (error) {
        console.error("🚨 Storage Error:", error);
        throw new Error(`クラウド保存エラー: ${error.message}`);
    }

    const { data: publicUrlData } = supabaseClient.storage
        .from(bucketName)
        .getPublicUrl(filePath);

    return publicUrlData.publicUrl;
}

// --- 修正版 generateCover 関数（回数制限とNP消費機能付き） ---
async function generateCover() {
    const promptValue = document.getElementById('promptInput').value.trim();
    if (!promptValue) return alert("イメージを入力してください");

    // 🌟 追加1：ログインユーザー情報の取得
    const { data: { user } } = await supabaseClient.auth.getUser();
    let profile = null;

    // 🌟 追加2：4回目以降（無料枠3回を使い切った場合）のNPチェックと確認
    if (freeGenCount >= 3) {
        // 現在のNP残高を取得
        const { data: p } = await supabaseClient.from('profiles').select('np_balance').eq('id', user.id).single();
        profile = p;
        
        if (profile.np_balance < 10) {
            return alert("NPが不足しています。4回目以降の表紙生成には10NPが必要です。");
        }
        
        // ユーザーに確認を求める
        if (!confirm(`本日の無料枠(3回)を使い切りました。\n10NPを消費して表紙を生成しますか？\n（現在の残高: ${profile.np_balance} NP）`)) {
            return; // キャンセルした場合はここで処理を止める
        }
    }

    const loader = document.getElementById('loader');
    loader.style.display = 'flex';

    try {
        // AI画像生成APIを呼び出す
        const response = await fetch(`${SUPABASE_URL}/functions/v1/generate-nft-image`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Authorization": `Bearer ${SUPABASE_KEY}` 
            },
            body: JSON.stringify({ 
                mode: "scenery", 
                base_prompt: "High-quality professional book cover illustration, full color, no text, ",
                raw_text: promptValue 
            })
        });

        const data = await response.json();
        
        if (data && data.imageUrl) {
            // 🌟 追加3：画像生成に「成功」した場合のみ、NPを消費しカウントを増やす
            if (freeGenCount >= 3 && profile) {
                await supabaseClient.from('profiles')
                    .update({ np_balance: profile.np_balance - 10 })
                    .eq('id', user.id);
            }
            
            // カウントを1増やして、ブラウザに記憶させる
            freeGenCount++;
            localStorage.setItem('cover_free_gen_count', freeGenCount.toString());

            // --- 以降は元の画面更新処理 ---
            currentCoverUrl = data.imageUrl; 
            const imgEl = document.getElementById('coverPreview');
            imgEl.src = currentCoverUrl;
            imgEl.style.display = 'block';
            document.getElementById('noImgMsg').style.display = 'none';
            
            document.getElementById('mintBtn').disabled = false;
            document.getElementById('mintBtn').style.opacity = "1";
            
            // あと何回無料かコンソールでお知らせ（開発用）
            console.log(`✅ 画像生成成功！本日の利用回数: ${freeGenCount}回`);
            
        } else {
            throw new Error("画像URLが空で返されました");
        }

    } catch (err) {
        console.error("Generate Error:", err);
        alert("生成に失敗しました。もう一度お試しください。");
        // ※エラーの時はカウントも増えず、NPも消費されません（ユーザーに優しい設計です）
    } finally {
        loader.style.display = 'none';
    }
}
// --- 🌟 エディション（版）対応版 handleMint 関数 ---
// --- 🌟 エディション（版）対応 ＆ URL保存対応版 handleMint 関数 ---
async function handleMint() {
    if (!currentCoverUrl || currentCoverUrl === "" || currentCoverUrl.includes('null')) {
        alert("エラー：表紙画像が正しく保持されていません。もう一度「表紙を生成する」を押してください。");
        return;
    }

    if (!confirm("100NPを消費してこの作品をNFT化しますか？\n（画像のクラウド保存を行うため、少し時間がかかります）")) return;

    const btn = document.getElementById('mintBtn');
    btn.disabled = true;
    btn.innerText = "NFT作成中...（表紙の画像処理中）";

    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: profile } = await supabaseClient.from('profiles').select('np_balance').eq('id', user.id).single();
        
        if (profile.np_balance < 100) throw new Error("NPが不足しています");

        // 🌟 1. 表紙画像をWebPに変換 ＆ Storageにアップロード
        const base64Cover = await convertToWebP(currentCoverUrl);
        btn.innerText = "NFT作成中...（表紙をクラウドに保存中）";
        // ↓ ここでバケットに保存して短いURLを受け取ります
        const finalCoverUrl = await uploadImageToStorage(base64Cover, 'cover') || base64Cover;

        // 🌟 2. 過去に何回ミントされたか（第何版か）をチェック！
        const { data: existingNfts } = await supabaseClient
            .from('nft_metadata')
            .select('id')
            .eq('novel_id', novelId);

        const editionCount = existingNfts ? existingNfts.length : 0;
        const finalTitle = editionCount === 0 
            ? novelData.title 
            : `${novelData.title} (第${editionCount + 1}版)`;

        // 🌟 3. 本文データと挿絵を「全エピソード分」合体させて取得する
        let finalEpisodes = [];
        let epCounter = 1;

        const { data: allDrafts } = await supabaseClient
            .from('nft_metadata')
            .select('nft_content')
            .eq('novel_id', novelId)
            .order('created_at', { ascending: true }); // 古い順に並べる
            
        let drafts = {};
        if (allDrafts && allDrafts.length > 0) {
            allDrafts.forEach(d => {
                const episodesInThisRow = d.nft_content?.episodes || {};
                Object.assign(drafts, episodesInThisRow);
            });
        }

        for (let cIdx = 0; cIdx < novelData.content.length; cIdx++) {
            let chapter = novelData.content[cIdx];
            for (let eIdx = 0; eIdx < chapter.episodes.length; eIdx++) {
                let ep = chapter.episodes[eIdx];
                let draftKey = `draft_${cIdx}_${eIdx}`;

                let pages = [];
                let assets = {};

                if (drafts[draftKey]) {
                    pages = drafts[draftKey].pages || [];
                    let rawAssets = drafts[draftKey].assets || {};
                    
                    // 🌟 ここが挿絵を順番にバケットに保存する処理です
                    for (let pageNum in rawAssets) {
                        btn.innerText = `NFT作成中...（第${epCounter}話の画像をクラウドに保存中）`;
                        let base64Webp = await convertToWebP(rawAssets[pageNum]);
                        assets[pageNum] = await uploadImageToStorage(base64Webp, `ep${epCounter}_p${pageNum}`);
                    }
                } else {
                    let text = ep.content || "";
                    for (let i = 0; i < text.length; i += 100) {
                        pages.push(text.substring(i, i + 100));
                    }
                }

                finalEpisodes.push({
                    episode_number: epCounter++,
                    title: ep.title || `第${epCounter-1}話`,
                    pages: pages,
                    assets: assets
                });
            }
        }

        // 🌟 ここが修正箇所3：まとめる処理（長大な文字ではなく、短いURLをセットする）
        const finalNftContent = {
            cover_image: finalCoverUrl, 
            episodes: finalEpisodes
        };

        btn.innerText = "NFT作成中...（ブロックチェーン書き込み中）";

        const currentAuthorId = novelData.author_id || localStorage.getItem("authorId");
        if (!currentAuthorId) throw new Error("作家データが読み込めませんでした。一度前の画面に戻り直してください。");

        // 🌟 4. 先にデータベース登録（エラー時にNPが減らないように保護）
        const { error: metaError } = await supabaseClient.from('nft_metadata').insert({
            novel_id: novelId,
            title_at_mint: finalTitle, 
            cover_image_url: finalCoverUrl, // ここも短いURLに変更
            nft_content: finalNftContent,     
            minted_at: new Date().toISOString(),
            is_listing: false,
            owner_id: user.id,
            author_id: currentAuthorId 
        });

        if (metaError) throw metaError;

        // 🌟 5. DB登録が「成功」した時だけ、決済(100NP消費)を行う
        await supabaseClient.from('profiles').update({ np_balance: profile.np_balance - 100 }).eq('id', user.id);
        
        await supabaseClient.from('novels').update({ is_nft: true }).eq('id', novelId);

        alert(`NFT化成功！「${finalTitle}」としてライブラリに追加されました。`);
        location.href = "library.html";

    } catch (err) {
        console.error("Mint Error:", err);
        alert("発行失敗: " + err.message);
        btn.disabled = false;
        btn.innerText = "100NPを消費してNFT化";
    }
}

init();
// ==========================================
// 🌟 イラスト保管庫（アセット）連携機能
// ==========================================

async function openAssetModal() {
    document.getElementById('assetModal').style.display = 'flex';
    const body = document.getElementById('assetModalBody');
    body.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">読み込み中...</p>';

    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return alert("ログインが必要です");

        const { data: assets, error } = await supabaseClient
            .from('user_assets')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (assets && assets.length > 0) {
            body.innerHTML = '<div class="modal-gallery-grid">' + assets.map(asset => `
                <div class="modal-asset-card" onclick="selectAsset('${asset.file_url}')">
                    <img src="${asset.file_url}" class="modal-asset-img">
                    <div class="modal-asset-name">${asset.file_name || '無題'}</div>
                </div>
            `).join('') + '</div>';
        } else {
            body.innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <p style="color: #666; font-size: 15px; margin-bottom: 20px;">イラスト保管庫に素材がありません。</p>
                    <a href="assets.html" target="_blank" style="display: inline-block; padding: 10px 20px; background: #6a0dad; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold;">
                        🎨 イラスト保管庫を開いて追加する
                    </a>
                    <p style="font-size: 12px; color: #999; margin-top: 15px;">※追加後、この画面に戻って再度ボタンを押してください。</p>
                </div>
            `;
        }
    } catch (err) {
        body.innerHTML = `<p style="color: red; text-align: center;">エラーが発生しました: ${err.message}</p>`;
    }
}

function closeAssetModal() {
    document.getElementById('assetModal').style.display = 'none';
}

function selectAsset(imageUrl) {
    // 1. 表紙の変数に、選んだ画像URLをセットする
    currentCoverUrl = imageUrl;
    
    // 2. プレビュー画面を更新する
    const imgEl = document.getElementById('coverPreview');
    imgEl.src = currentCoverUrl;
    imgEl.style.display = 'block';
    document.getElementById('noImgMsg').style.display = 'none'; // 「まだ表紙がありません」を消す
    
    // 3. ミント（NFT化）ボタンを有効化する
    const mintBtn = document.getElementById('mintBtn');
    mintBtn.disabled = false;
    mintBtn.style.opacity = "1";
    
    // 4. ポップアップを閉じる
    closeAssetModal();
}
</script>

<div class="asset-modal-overlay" id="assetModal">
    <div class="asset-modal-content">
        <div class="asset-modal-header">
            <h3>🎨 イラスト保管庫から選ぶ</h3>
