<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>登録完了</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 40px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    #welcome {
      margin-bottom: 30px;
      font-size: 16px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    a:hover {
      background: #555;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>登録が完了しました</h1>

    <p id="welcome"></p>

    <a href="index.html">トップへ戻る</a>
  </div>

  <script src="auth-check.js"></script>
<script>
    const name = localStorage.getItem("username");

    if (name) {
      document.getElementById("welcome").innerText =
        name + " さん、登録ありがとうございます！";
    }
  </script>

</body>
</html>
