    <style>
    /* --- レイアウト修正版 CSS --- */
:root { 
    --main-purple: #6a0dad; 
    --book-cream: #f8f4e6; 
}
    /* 画面全体のレイアウト調整 */
body { 
    background: #444; 
    margin: 0; 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

    /* 1. 作品表示エリア（本が置かれる場所） */
.work-display-area { 
    flex: 1 1 auto;
    min-width: 0;

    display: flex; 
    flex-direction: column; 
    align-items: flex-start; 
    justify-content: flex-start;

    padding-top: 60px;
    padding-left: 60px;
    padding-right: 60px;

    background: #555; 
    box-shadow: inset 0 0 100px rgba(0,0,0,0.3);

    overflow-x: auto;
    overflow-y: hidden;
    box-sizing: border-box;
}
    
/* --- のどの中央固定 & 微調整 --- */

/* 📖 本の見開きユニット本体 */
.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative; /* 絶対配置の基準点 */
    margin: 0 auto;    /* 親要素内で中央に配置 */
}

/* --- のどの中央固定：最終解 --- */

.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative;
    /* 左右のページを強制的に等幅にするための設定 */
    justify-content: center;
    align-items: stretch;
}

/* 🖋️ 影の位置を計算ではなく「真ん中」に完全固定 */
.page-spread::after { 
    content: "";
    position: absolute; 
    top: 0;
    /* left: 50% と translateX(-50%) の組み合わせは、親要素の正確な中心を指します */
    left: 50%;
    transform: translateX(-50%);
    
    width: 60px; /* 影の幅を少し広げて、境界を曖昧にする */
    height: 100%;
    /* 中央を一番濃く、外側を透明にするグラデーション */
    background: linear-gradient(to right, 
        rgba(0,0,0,0) 0%, 
        rgba(0,0,0,0.05) 25%, 
        rgba(0,0,0,0.18) 50%, 
        rgba(0,0,0,0.05) 75%, 
        rgba(0,0,0,0) 100%
    );
    pointer-events: none;
    z-index: 20; /* テキストや画像より必ず上に配置 */
}

/* 📖 左右のページ幅を「1:1」で絶対に動かさない設定 */
.text-half, .illust-half {
    flex: 1 1 50% !important; /* 優先度を上げ、幅を50%に強制 */
    max-width: 50% !important;
    min-width: 50% !important;
    box-sizing: border-box;
    position: relative;
}

/* 左ページのパディング微調整（影にかぶりすぎないよう右側を少し空ける） */
.text-half {
    padding: 60px 60px 60px 40px; 
}

/* 左半分：テキストエリア（サイズ維持） */
.text-half { 
    flex: 1; 
    padding: 60px 50px; 
    writing-mode: vertical-rl; 
    text-orientation: mixed;
    font-size: 16px; /* 指定通りそのまま */
    line-height: 2.5; 
    letter-spacing: 0.05em; 
    color: #333; 
    outline: none;
    z-index: 5;
}

/* 右半分：イラストエリア */
.illust-half { 
    flex: 1; 
    background: #eee; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    z-index: 5;
}
.illust-half img { width: 100%; height: 100%; object-fit: cover; }

/* --- 📱 スマホモード：レイアウト & スクロール完全修正版 --- */

.page-spread.mobile-mode {
    width: 330px !important;
    height: 720px !important;
    border: 8px solid #333;
    border-radius: 40px;
    display: block !important; 
    position: relative;
    overflow: hidden;
    flex-direction: column !important;
}

/* 🖼️ イラスト：全画面。枠内にぴったり収めます */
.page-spread.mobile-mode .illust-half { 
    position: absolute !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100% !important; 
    height: 100% !important; 
    max-width: 100% !important;
    min-width: 100% !important; /* PC版の50%設定を上書き */
    z-index: 1; 
    display: flex !important;
    background: #eee;
    padding: 0 !important; /* 余計なパディングを排除 */
}

.page-spread.mobile-mode .illust-half img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
}

/* 🖋️ テキストエリア：下部中央にガラス質感で配置 */
.page-spread.mobile-mode .text-half { 
    position: absolute !important; 
    bottom: 22px !important; 
    left: 50% !important;
    transform: translateX(-50%) !important; 
    
    width: 82% !important; 
    min-width: 0 !important;
    max-width: 82% !important;
    height: 95px !important; 
    z-index: 5; 
    
    background: rgba(0, 0, 0, 0.28) !important; 
    backdrop-filter: blur(10px) saturate(130%) !important; 
    
    color: #fff; 
    padding: 14px 16px !important;
    border-radius: 18px; 
    writing-mode: horizontal-tb !important;
    font-size: 14px; 
    line-height: 1.65;
    border: 1px solid rgba(255, 255, 255, 0.16); 
    display: block !important;
    box-sizing: border-box !important;

    overflow-y: auto !important; 
    overflow-x: hidden !important;
}

/* ✨ ガラス質感に合う細身のスクロールバー */
.page-spread.mobile-mode .text-half::-webkit-scrollbar {
    width: 5px !important;
    display: block !important;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05) !important;
    border-radius: 10px;
    margin: 10px 0;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3) !important;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.5) !important;
}

/* スマホ時は中央の影（のど）を完全に排除 */
.page-spread.mobile-mode::after { display: none !important; }

    /* 操作パネル */
   /* 右側操作パネル */
.control-panel { 
    width: 360px;
    min-width: 360px;
    max-width: 360px;
    flex: 0 0 360px;

    background: #fff; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
    border-left: 1px solid #ccc;
    font-family: sans-serif;
    overflow-y: auto;
    overflow-x: hidden;
    box-sizing: border-box;
}
    .section-card { background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #eee; font-size: 12px; }
    .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    .btn-save { background: #2ecc71; color: white; padding: 15px; font-size: 16px; margin-top: auto; }
    /* --- 編集用：縦書き行ガイド --- */
.text-half {
    white-space: pre-wrap;
}

.line-guide-layer {
    position: absolute;
    top: 18px;
    left: 0;
    width: 50%;
    box-sizing: border-box;
    padding: 0 50px;
    pointer-events: none;
    z-index: 12;
    font-family: sans-serif;
}

.line-guide-note {
    font-size: 10px;
    color: rgba(106, 13, 173, 0.55);
    text-align: center;
    margin-bottom: 6px;
    white-space: nowrap;
}

.line-guide-numbers {
    display: grid;
    grid-template-columns: repeat(9, 40px);
    justify-content: end;
    gap: 0;
    color: rgba(106, 13, 173, 0.45);
    font-size: 11px;
    font-weight: bold;
}

.line-guide-number {
    text-align: center;
    line-height: 1;
}

/* スマホ風表示では行番号ガイドを非表示 */
.page-spread.mobile-mode .line-guide-layer {
    display: none !important;
}

/* ===== スマホ表示：イラストノベル編集画面最適化 ===== */
.mobile-control-toggle,
.mobile-control-overlay {
    display: none;
}

@media (max-width: 760px) {
    body {
        display: block !important;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #444;
    }

    .work-display-area {
    width: 100%;
    height: 100vh;
    padding: 48px 12px 28px !important;
    align-items: center !important;
    justify-content: flex-start !important;
    overflow-x: hidden !important;
    overflow-y: auto !important;
    box-sizing: border-box;
}

    .page-spread.mobile-mode {
    width: min(88vw, 360px) !important;
    height: min(78vh, 740px) !important;
    margin: 0 auto !important;
}

    .work-display-area > div:last-child {
        margin-top: 18px !important;
        gap: 24px !important;
        justify-content: center !important;
    }

    .mobile-control-toggle {
        display: block;
        position: fixed;
        top: 10px;
        right: 12px;
        z-index: 1002;
        padding: 11px 15px;
        border: none;
        border-radius: 999px;
        background: #6a0dad;
        color: #fff;
        font-size: 15px;
        font-weight: bold;
        box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        cursor: pointer;
    }

    .mobile-control-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 1000;
    }

    .mobile-control-overlay.is-open {
        display: block;
    }

    .control-panel {
        position: fixed !important;
        top: 0 !important;
        right: 0 !important;
        width: min(78vw, 310px) !important;
        min-width: 0 !important;
        max-width: none !important;
        height: 100vh !important;
        padding: 18px 14px !important;
        border-radius: 18px 0 0 18px !important;
        border-left: none !important;
        background: #fff !important;
        z-index: 1001 !important;
        overflow-y: auto !important;
        box-shadow: -10px 0 30px rgba(0,0,0,0.25) !important;
        transform: translateX(110%);
        transition: transform 0.25s ease;
    }

    .control-panel.is-open {
        transform: translateX(0);
    }

    .section-card {
        padding: 10px !important;
    }

    .btn {
        min-height: 42px;
        font-size: 13px;
    }
}
    </style>

<body>
    <style>

    .asset-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

    .asset-modal-content {

    }

        cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);

// 1. 初期化関数
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const novelId = urlParams.get('novel_id');
    currentPage = parseInt(urlParams.get('page')) || 0;
    const cIdx = urlParams.get('cIdx');
    const eIdx = urlParams.get('eIdx');

    try {
        // 1. まず novels テーブルから本番データを取得
        const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
        novelData = novel;

        if (cIdx !== null && eIdx !== null && novel.content[cIdx]) {
            masterText = novel.content[cIdx].episodes[eIdx].content || "";
            // 🌟 重要：まず本番DBにある画像を読み込む
            pageAssets = novel.content[cIdx].episodes[eIdx].pageAssets || {};
        } else {
            masterText = "エピソードデータが見つかりません。";
            pageAssets = {};
        }

        refreshPages();

        // 2. nft_metadata (下書き) をチェックする
        // 🌟 修正1：複数データがある場合に備え、一番新しい(order/limit)データを取得する
        const { data: nftDraft } = await supabaseClient
            .from('nft_metadata')
            .select('nft_content')
            .eq('novel_id', novelId)
            .is('minted_at', null) // 👈 ★これを追加！（下書きだけを探す魔法）
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        const episodeKey = `draft_${cIdx}_${eIdx}`;
        
        if (nftDraft && nftDraft.nft_content && nftDraft.nft_content.episodes && nftDraft.nft_content.episodes[episodeKey]) {
            const draftData = nftDraft.nft_content.episodes[episodeKey];
            
            // 🌟 修正2：下書きに画像データ（assets）が保存されていれば、それを合体・上書きする
            // （ユーザーが手動で編集・保存した状態を最優先にするため）
            if (draftData.assets && Object.keys(draftData.assets).length > 0) {
                pageAssets = { ...pageAssets, ...draftData.assets };
            }

            // ついでに、テキストやページ割りも最新の編集状態があれば復元する
            if (draftData.full_text) {
                masterText = draftData.full_text;
                if (draftData.pages && draftData.pages.length > 0) {
                    pages = draftData.pages; // 保存時のページ割りをそのまま復元
                } else {
                    refreshPages(); 
                }
            }
        }

        // --- メタ情報表示 ---
        const paramsForMeta = new URLSearchParams(window.location.search);
        const currentCIdx = parseInt(paramsForMeta.get("cIdx") || "0");
        const currentEIdx = parseInt(paramsForMeta.get("eIdx") || "0");

        let displayName = novel.title || "編集中の作品";

        if (
            Array.isArray(novel.content) &&
            novel.content[currentCIdx] &&
            Array.isArray(novel.content[currentCIdx].episodes) &&
            novel.content[currentCIdx].episodes[currentEIdx]
        ) {
            displayName = novel.content[currentCIdx].episodes[currentEIdx].title || displayName;
        }

        const metaTitleEl = document.getElementById("metaTitle");
        if (metaTitleEl) {
            metaTitleEl.innerText = displayName;
        }

        // --- ユーザー情報と残高 ---
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (user) {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('np_balance')
                .eq('id', user.id)
                .single();

            const myNpEl = document.getElementById("myNp");
            if (myNpEl) {
                myNpEl.innerText = profile?.np_balance || 0;
            }

            await loadCharacters(user.id);
        }

        // 🌟 最後に描画
        renderPage();
        renderStandardReferenceCard();

        console.log("✅ 初期化完了：最新の画像データを読み込みました", pageAssets);

    } catch (err) { 
        console.error("Init Error:", err); 
    }
}

function loadImageFromBlob(blob) {
    return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(blob);
        const img = new Image();

        img.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(img);
        };

        img.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("画像の読み込みに失敗しました。"));
        };

        img.src = objectUrl;
    });
}

async function convertImageUrlToWebpBlob(imageUrl) {
    const response = await fetch(imageUrl);

    if (!response.ok) {
        throw new Error("生成画像の取得に失敗しました。");
    }

    const originalBlob = await response.blob();
    const img = await loadImageFromBlob(originalBlob);

    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;

    const ctx = canvas.getContext("2d");
    if (!ctx) {
        throw new Error("Canvasの初期化に失敗しました。");
    }

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const webpBlob = await new Promise((resolve) => {
        canvas.toBlob(resolve, "image/webp", 0.85);
    });

    if (!webpBlob) {
        throw new Error("WebP変換に失敗しました。");
    }

    return webpBlob;
}

function openStandardReferenceDb() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(STANDARD_REF_DB_NAME, 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;

            if (!db.objectStoreNames.contains(STANDARD_REF_STORE_NAME)) {
                db.createObjectStore(STANDARD_REF_STORE_NAME, { keyPath: "key" });
            }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveStandardReferenceImageBlob(blob) {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        // 常に current 1件だけを上書き保存する
        store.put({
            key: STANDARD_REF_IMAGE_KEY,
            blob,
            updated_at: new Date().toISOString()
        });

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function getStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readonly");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);
        const request = store.get(STANDARD_REF_IMAGE_KEY);

        request.onsuccess = () => {
            db.close();
            resolve(request.result?.blob || null);
        };

        request.onerror = () => {
            db.close();
            reject(request.error);
        };
    });
}

async function clearStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        store.delete(STANDARD_REF_IMAGE_KEY);

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function fetchImageAsBlob(imageUrl) {
    const response = await fetch(imageUrl);

    if (!response.ok) {
        throw new Error("基準化画像の取得に失敗しました。");
    }

    return await response.blob();
}

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onloadend = () => {
            const result = String(reader.result || "");
            const base64 = result.includes(",") ? result.split(",")[1] : result;
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
    });
}

async function extractStandardReferenceFeatures() {
    const raw = localStorage.getItem(STANDARD_REF_KEY);
    if (!raw) {
        throw new Error("基準化情報が見つかりません。");

    const ref = JSON.parse(raw);
    const blob = await getStandardReferenceImageBlob();

    if (!blob || blob.size === 0) {
        throw new Error("基準化画像Blobが見つかりません。");
    }

    const imageBase64 = await blobToBase64(blob);
    const imageMimeType = blob.type || "image/webp";

    const { data, error } = await supabaseClient.functions.invoke(
    "extract-standard-reference-features-allages",
        {
            body: {
                image_base64: imageBase64,
                image_mime_type: imageMimeType
            }
        }
    );

    if (error) {
        console.error("特徴抽出Function Error:", error);
        throw new Error(error.message || "特徴抽出Functionの呼び出しに失敗しました。");
    }

    if (!data || data.ok !== true) {
        console.error("特徴抽出API Error:", data);
        throw new Error(data?.error || "特徴抽出に失敗しました。");
    }

    const updatedRef = {
        ...ref,
        extracted: true,
        extracting: false,
        extracted_at: new Date().toISOString(),
        features: data.extracted
    };

    localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(updatedRef));
    renderStandardReferenceCard();

    return updatedRef;
}

        let blobCached = false;
        let blobCacheError = "";

        // スマホSafari等では、画像fetchまたはIndexedDBのBlob保存に失敗することがある。
        // ただし現在のLeonardo参照画像ルートでは image_url があれば進められるため、
        // Blob保存は「成功したら使う」扱いにする。
        try {
            const blob = await fetchImageAsBlob(asset.file_url);
            await saveStandardReferenceImageBlob(blob);

            const cachedBlob = await getStandardReferenceImageBlob();

            if (cachedBlob && cachedBlob.size > 0) {
                blobCached = true;
            } else {
                blobCacheError = "Blob保存後の読み戻し確認に失敗しました。";
            }
        } catch (blobErr) {
            console.warn("基準化画像Blobキャッシュはスキップします:", blobErr);
            blobCacheError = blobErr?.message || String(blobErr);
        }

        const ref = {
            type,
            asset_id: asset.id || null,
            title: asset.file_name || "無題",
            image_url: asset.file_url,
            reference_image_url: asset.file_url,
            extracted: false,
            extracting: false,
            standard_ready: isLeonardoReferenceOnly,
standard_method: isLeonardoReferenceOnly ? "leonardo_reference_image" : null,
standardized_at: isLeonardoReferenceOnly ? new Date().toISOString() : null,
            blob_cached: blobCached,
            blob_cache_error: blobCacheError,
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();

        if (isLeonardoReferenceOnly) {
           alert("Leonardo用の参照画像を選択しました。\n風景・その他生成では、この画像を参照画像として使用します。");
            return;
        }

        if (blobCached) {
            alert("基準化用のイラストを選択しました。\n続けて「基準化」ボタンを押すと、この画像を参照画像として確定します。");
        } else {
            alert("基準化用のイラストを選択しました。\nスマホ環境のため一時保存形式をURL参照に切り替えました。\n続けて「基準化」ボタンを押してください。");
        }

    } catch (err) {
        console.error("基準化画像の保存エラー:", err);
        alert("基準化画像の保存に失敗しました。画像URLの保存で問題が発生しています。");
    }
}

function escapeStandardHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

// 3. 描画・ページ操作系
// =====================================================
// ページ分割：行スロット方式
// 1ページ = 9行 / 1行 = 18文字目安
// =====================================================
const PAGE_LINE_LIMIT = 9;
const PAGE_CHARS_PER_LINE = 18;

function toKanjiNumber(num) {
    const ones = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];

    if (num <= 9) return ones[num];
    if (num === 10) return "十";
    if (num < 20) return "十" + ones[num - 10];

    const tens = Math.floor(num / 10);
    const rest = num % 10;

    return ones[tens] + "十" + (rest ? ones[rest] : "");
}

function refreshPages() {
    const text = String(masterText || "").replace(/\r/g, "");

    pages = [];

    let buffer = "";
    let lineCount = 1;
    let charCountInLine = 0;

    function pushPage() {
        pages.push(buffer);
        buffer = "";
        lineCount = 1;
        charCountInLine = 0;
    }

    for (const char of text) {
        // Enterは「次の行へ送る」
        if (char === "\n") {
            buffer += "\n";
            lineCount++;
            charCountInLine = 0;

            if (lineCount > PAGE_LINE_LIMIT) {
                pushPage();
            }

            continue;
        }

        // 1行の文字数を超えたら、次の行へ送る
        if (charCountInLine >= PAGE_CHARS_PER_LINE) {
            lineCount++;
            charCountInLine = 0;

            if (lineCount > PAGE_LINE_LIMIT) {
                pushPage();
            }
        }

        buffer += char;
        charCountInLine++;
    }

    if (buffer || pages.length === 0) {
        pages.push(buffer);
    }
}

function commitCurrentTextAndReflow() {
    const textHalf = document.getElementById("textHalf");

    if (textHalf) {
        pages[currentPage] = textHalf.innerText.replace(/\r/g, "");
        masterText = pages.join("");
    }

    refreshPages();

    if (currentPage >= pages.length) {
        currentPage = Math.max(0, pages.length - 1);
    }
}

function ensureLineGuideLayer() {
    const spread = document.getElementById("mainSpread");
    if (!spread) return null;

    let guide = document.getElementById("textLineGuideLayer");

    if (!guide) {
        guide = document.createElement("div");
        guide.id = "textLineGuideLayer";
        guide.className = "line-guide-layer";
        guide.setAttribute("aria-hidden", "true");
        spread.appendChild(guide);
    }

    return guide;
}

function renderLineGuide() {
    const guide = ensureLineGuideLayer();
    if (!guide) return;

    const numbers = Array.from({ length: PAGE_LINE_LIMIT }, (_, index) => {
        const n = PAGE_LINE_LIMIT - index;
        return `<span class="line-guide-number">${toKanjiNumber(n)}</span>`;
    }).join("");

    guide.innerHTML = `
        <div class="line-guide-note">
            ※行数表示は編集用ガイドです。投稿後・NFT表示には保存されません。
        </div>
        <div class="line-guide-numbers">
            ${numbers}
        </div>
    `;
}

function placeCaretAtEnd(el) {
    if (!el) return;

    el.focus();

    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);

    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
}

function renderPage() {
    const textHalf = document.getElementById("textHalf");
    const illustHalf = document.getElementById("illustHalf");
    const counter = document.getElementById("pageCounter");

    textHalf.innerText = pages[currentPage] || "";

    if (pageAssets[currentPage]) {
        illustHalf.innerHTML = `<img src="${pageAssets[currentPage]}">`;
    } else {
        illustHalf.innerHTML = `<span style="color:#aaa; font-size:12px;">NO IMAGE</span>`;
    }

    renderLineGuide();

    counter.innerText = `${currentPage + 1} / ${pages.length}`;
}

function handleTextEdit() {
    const textHalf = document.getElementById("textHalf");

    if (textHalf) {
        pages[currentPage] = textHalf.innerText.replace(/\r/g, "");
        masterText = pages.join("");
    }

    refreshPages();

    if (currentPage >= pages.length) {
        currentPage = Math.max(0, pages.length - 1);
    }

    const nextText = pages[currentPage] || "";

    if (textHalf && textHalf.innerText !== nextText) {
        textHalf.innerText = nextText;
        placeCaretAtEnd(textHalf);
    }

    const counter = document.getElementById("pageCounter");
    if (counter) {
        counter.innerText = `${currentPage + 1} / ${pages.length}`;
    }

    renderLineGuide();
    isEdited = true;
}

function changePage(delta) {
    commitCurrentTextAndReflow();

    const newPage = currentPage + delta;

    if (newPage >= 0 && newPage < pages.length) {
        currentPage = newPage;
        renderPage();
    }
}

function collectTemplatePayload() {
    const templateType = document.getElementById("templateType")?.value || "character";
    const fields = {};

    document.querySelectorAll("#templateDisplay .template-field").forEach(fieldEl => {
        const key = fieldEl.id;
        if (!key) return;

        const value = String(fieldEl.value || "").trim();
        if (!value) return;

        const isDirectCustomField =
            fieldEl.dataset.templateMode === "custom" ||
            fieldEl.tagName.toLowerCase() === "textarea";

        if (isDirectCustomField) {
            fields[key] = {
                mode: "custom",
                value
            };
            return;
        }

        if (value === "__custom__") {
            const customEl = document.getElementById(key + "_custom");
            const customValue = customEl?.value?.trim();

            if (!customValue) return;

            fields[key] = {
                mode: "custom",
                value: customValue
            };
            return;
        }

        fields[key] = {
            mode: "select",
            value
        };
    });

    return {
        template_type: templateType,
        template_fields: fields
    };
}

async function buildGeminiAllagesCharacterPayload(templatePayload) {
    const rawRef = localStorage.getItem(STANDARD_REF_KEY);

    if (!rawRef) {
        throw new Error("キャラ生成には、先に基準化画像を選択してください。");
    }

    const standardRef = JSON.parse(rawRef);

    if (!standardRef.standard_ready || !standardRef.features?.editable_fields_japanese) {
        throw new Error("キャラ生成には、先に基準化を完了してください。");
    }

    const refType = String(standardRef.type || standardRef.asset_type || "").toLowerCase();

    if (!(refType === "character" || refType === "illustration" || refType === "")) {
        throw new Error("キャラ生成には、キャラ用の基準化画像を選択してください。");
    }

    let referenceBlob = await getStandardReferenceImageBlob();

    if (!referenceBlob || referenceBlob.size === 0) {
        if (!standardRef.image_url) {
            throw new Error("基準化画像が見つかりません。");
        }

        referenceBlob = await fetchImageAsBlob(standardRef.image_url);
        await saveStandardReferenceImageBlob(referenceBlob);
    }

    if (!referenceBlob || referenceBlob.size === 0) {
        throw new Error("基準化画像Blobを準備できませんでした。");
    }

    const referenceImageBase64 = await blobToBase64(referenceBlob);
    const referenceImageMimeType = referenceBlob.type || "image/png";

    const fields = templatePayload.template_fields || {};

    function fieldValue(key) {
        return String(fields[key]?.value || "").trim();
    }

    return {
        template_type: "character",

        reference_image_base64: referenceImageBase64,
        reference_image_mime_type: referenceImageMimeType,

        editable_fields_japanese: standardRef.features.editable_fields_japanese,
        reference_features: standardRef.features,

        tpl_character_free_text: fieldValue("tpl_character_free_text"),
        tpl_character_expression: fieldValue("tpl_character_expression"),
        tpl_character_view: fieldValue("tpl_character_view"),
        tpl_character_age: fieldValue("tpl_character_age"),
        tpl_character_pose: fieldValue("tpl_character_pose"),
        tpl_character_outfit: fieldValue("tpl_character_outfit"),
        tpl_character_background: fieldValue("tpl_character_background"),
        tpl_character_lighting: fieldValue("tpl_character_lighting"),

        standard_edit_modified: standardRef.standard_edit_modified === true
    };
}

function getTemplateFieldValue(fieldId) {
    const selectEl = document.getElementById(fieldId);
    if (!selectEl) return "";

    const value = selectEl.value;

    if (!value) return "";

    if (value === "__custom__") {
        const customEl = document.getElementById(fieldId + "_custom");
        return customEl?.value?.trim() || "";
    }

    return value;
}

function collectCurrentSceneSettings() {
    return {

        composition: getTemplateFieldValue("tpl_scenery_composition"),
        scale: getTemplateFieldValue("tpl_scenery_scale"),
        place: getTemplateFieldValue("tpl_scenery_place"),
        world: getTemplateFieldValue("tpl_scenery_world"),
        detail: getTemplateFieldValue("tpl_scenery_detail"),
        light: getTemplateFieldValue("tpl_scenery_light"),
        tone: getTemplateFieldValue("tpl_scenery_tone"),
        person: getTemplateFieldValue("tpl_scenery_person"),
        mood: getTemplateFieldValue("tpl_scenery_mood")
    };
}

function hasAnySceneSetting(sceneSettings) {
    return Object.values(sceneSettings || {}).some(value => String(value || "").trim() !== "");
}

// =====================================================

function buildSceneGenerationPayload() {
    const sceneSettings = collectCurrentSceneSettings();

    let standardRef = null;

    try {
        const raw = localStorage.getItem(STANDARD_REF_KEY);
        standardRef = raw ? JSON.parse(raw) : null;
    } catch {
        standardRef = null;
    }

    const refType = String(standardRef?.type || standardRef?.asset_type || "").toLowerCase();

const isSceneReference =
    refType === "scenery" ||
    refType === "scene" ||
    refType === "background";

// 風景はGemini特徴抽出ではなく、Leonardoの参照画像URLとして使う
const hasReferenceImage = !!(
    standardRef &&
    standardRef.image_url &&
    isSceneReference
);

    return {
        mode: "scene",
        template_type: "scenery",

        // 場所タイプ・構図・世界観・時間帯など
        scene_settings: sceneSettings,

        // 風景基準化は任意
        reference_enabled: hasReferenceImage,
        reference_image_url: hasReferenceImage ? standardRef.image_url : null,
        reference_asset_id: hasReferenceImage ? (standardRef.asset_id || null) : null,

        // 固定ルール
        fixed_style: {
            monochrome: true,
            hand_drawn: true,
            novel_illustration: true
        }
    };
}

async function saveCurrentScenePreset() {
    try {
        const templateType = document.getElementById("templateType")?.value || "";

        if (templateType !== "scenery") {
            alert("風景テンプレートを選択してから保存してください。");
            return;
        }

        const { data: { user } } = await supabaseClient.auth.getUser();

        if (!user) {
            alert("ログインが必要です。");
            return;
        }

        const sceneSettings = collectCurrentSceneSettings();

        if (!hasAnySceneSetting(sceneSettings)) {
            alert("保存する風景設定がありません。少なくとも1つ項目を選択してください。");
            return;
        }

        const placeType = sceneSettings.place || "";
        const customPlace = sceneSettings.detail || "";

        const defaultName = placeType
            ? `${placeType}の風景設定`
            : "風景設定";

        const presetName = prompt("保存する風景設定の名前を入力してください。", defaultName);

        if (!presetName || !presetName.trim()) {
            return;
        }

        let standardRef = null;

        try {
            const raw = localStorage.getItem(STANDARD_REF_KEY);
            standardRef = raw ? JSON.parse(raw) : null;
        } catch {
            standardRef = null;
        }

        const referenceEnabled = !!(standardRef && standardRef.image_url);

        const { error } = await supabaseClient
            .from("scene_presets")
            .insert({
                user_id: user.id,
                preset_name: presetName.trim(),
                template_type: "scenery",
                place_type: placeType || null,
                custom_place: customPlace || null,
                scene_settings: sceneSettings,
                reference_enabled: referenceEnabled,
                reference_asset_id: standardRef?.asset_id || null,
                reference_image_url: standardRef?.image_url || null
            });

        if (error) {
            throw error;
        }

        alert("風景設定を保存しました。");

    } catch (err) {
        console.error("風景設定保存エラー:", err);
        alert("風景設定の保存に失敗しました: " + (err.message || String(err)));
    }
}

function setTemplateFieldValue(fieldId, value) {
    const selectEl = document.getElementById(fieldId);
    if (!selectEl) return;

    const normalizedValue = String(value || "").trim();

    if (!normalizedValue) {
        selectEl.value = "";
        toggleTemplateCustomInput(selectEl);
        return;
    }

    const hasOption = Array.from(selectEl.options).some(option => option.value === normalizedValue);

    if (hasOption) {
        selectEl.value = normalizedValue;
        toggleTemplateCustomInput(selectEl);
        return;
    }

    // 保存値が既存選択肢にない場合は、自由入力へ戻す
    selectEl.value = "__custom__";
    toggleTemplateCustomInput(selectEl);

    const customEl = document.getElementById(fieldId + "_custom");
    if (customEl) {
        customEl.value = normalizedValue;
    }
}

function applyCharacterEmotionPreset(presetKey) {
    const preset = getCharacterEmotionPresetSettings(presetKey);
    const statusEl = document.getElementById("characterEmotionPresetStatus");

    if (!preset) {
        if (statusEl) {
            statusEl.innerText = "表情プリセットは未選択です。";
        }
        return;
    }

    // 既存の「表情」欄にも反映する。
    // 選択肢にない長文なので、自動で自由入力扱いになる。
    setTemplateFieldValue("tpl_character_expression", preset.expressionText);

    try {
        const raw = localStorage.getItem(STANDARD_REF_KEY);

        if (raw) {
            const ref = JSON.parse(raw);

            if (!ref.features) {
                ref.features = {};
            }

            if (!ref.features.editable_fields_japanese) {
                ref.features.editable_fields_japanese = {};
            }

            Object.assign(ref.features.editable_fields_japanese, preset.fields);

            ref.standard_edit_modified = true;
            ref.character_emotion_preset = preset.label;
            ref.character_emotion_preset_updated_at = new Date().toISOString();

            localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
            renderStandardReferenceCard();
        }
    } catch (err) {
        console.error("表情プリセット反映エラー:", err);
    }

    if (statusEl) {
        statusEl.innerText = `${preset.label}を反映しました。同一性は維持しつつ、表情だけ大きめに変化させます。`;
    }
}

    if (!preset) return;

    if (templateTypeEl) {

    }

    const settings = preset.scene_settings || {};

    setTemplateFieldValue("tpl_scenery_pov", settings.pov);
    setTemplateFieldValue("tpl_scenery_composition", settings.composition);
    setTemplateFieldValue("tpl_scenery_scale", settings.scale);
    setTemplateFieldValue("tpl_scenery_place", settings.place);
    setTemplateFieldValue("tpl_scenery_world", settings.world);
    setTemplateFieldValue("tpl_scenery_detail", settings.detail);
    setTemplateFieldValue("tpl_scenery_light", settings.light);
    setTemplateFieldValue("tpl_scenery_tone", settings.tone);
    setTemplateFieldValue("tpl_scenery_person", settings.person);
    setTemplateFieldValue("tpl_scenery_mood", settings.mood);

    // 背景基準化画像が保存されている場合は、現在の基準化として復元する
    if (preset.reference_enabled && preset.reference_image_url) {
        const ref = {
            type: "scenery",
            asset_id: preset.reference_asset_id || null,
            title: preset.preset_name || "風景基準化",
            image_url: preset.reference_image_url,
            extracted: true,
            extracting: false,
            standard_ready: true,
            standard_method: "scene_reference_image",
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();
    }

    closeScenePresetLoadModal();
    alert("保存済み風景設定を読み込みました。");
}

function buildLeonardoReferenceDetailSettings(templatePayload = {}) {
    const fields = templatePayload.template_fields || {};

    const getFieldValue = (fieldId) => {
        const field = fields[fieldId];
        if (!field) return "";

        return String(field.value || "").trim();
    };

    // 現在はキャラテンプレート用を優先して作る
    const detailSettingsJa = {
    free_text: getFieldValue("tpl_character_free_text"),
    view: getFieldValue("tpl_character_view"),
    age: getFieldValue("tpl_character_age"),
    expression: getFieldValue("tpl_character_expression"),
    pose: getFieldValue("tpl_character_pose"),
    outfit: getFieldValue("tpl_character_outfit"),
    parts: getFieldValue("tpl_character_parts"),
    background: getFieldValue("tpl_character_background"),
    lighting_mood: getFieldValue("tpl_character_lighting")
};

    // 日本語表示値をLeonardo向け英語値へ変換
    return convertDetailSettingsToEnglish(detailSettingsJa);
}

// 5. 保存ロジック（エピソードごとに分離 ＆ ミント済み保護機能付き）
async function saveNftDraft() {
    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) throw new Error("ログインセッションが見つかりません。");

        // ★修正ポイント：現在の小説を書いた「作家のID」を取得する
        const currentAuthorId = localStorage.getItem("authorId") || novelData.author_id;

        const urlParams = new URLSearchParams(window.location.search);
        const cIdx = urlParams.get('cIdx');
        const eIdx = urlParams.get('eIdx');
        
        // 【重要】エピソードごとに固有のキーを作成
        const episodeKey = `draft_${cIdx}_${eIdx}`;

        // 🌟 修正1：複数あるデータの中から「一番最新のデータ」を取得する
        const { data: existingData } = await supabaseClient
            .from('nft_metadata')
            .select('id, nft_content, minted_at')
            .eq('novel_id', novelData.id)
            .is('minted_at', null) // 👈 ★ここにも追加！
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        let currentContent = existingData ? existingData.nft_content : {};
        if (!currentContent) currentContent = {};
        if (!currentContent.episodes) currentContent.episodes = {};

        // このエピソード専用のデータを作成
        const episodeData = {
            full_text: masterText,
            pages: pages,
            assets: pageAssets,
            last_edited: new Date()
        };

        // 全体のデータの中に、このエピソードのデータを格納
        currentContent.episodes[episodeKey] = episodeData;

        // 🌟 修正2：upsert をやめて、ミント状況に応じた安全な保存を行う
        if (existingData && existingData.id) {
            if (existingData.minted_at) {
                // ▼ 最新データが「すでにミント済みの作品」だった場合
                const { error } = await supabaseClient.from('nft_metadata').insert({
                    novel_id: novelData.id,
                    author_id: currentAuthorId, // 👈 修正：user.id から変更！
                    owner_id: user.id,  
                    nft_content: currentContent,
                    title_at_mint: novelData.title,
                    minted_at: null // 👈 ミント前（下書き）の証拠として null を入れる
                });
                if (error) throw error;
            } else {
                // ▼ 最新データが「まだミントされていない下書き」だった場合
                const { error } = await supabaseClient.from('nft_metadata')
                    .update({ 
                        nft_content: currentContent,
                        title_at_mint: novelData.title 
                    })
                    .eq('id', existingData.id);
                if (error) throw error;
            }
        } else {
            // ▼ まだ一度も保存・ミントされていない場合（完全新規）
            const { error } = await supabaseClient.from('nft_metadata').insert({
                novel_id: novelData.id,
                author_id: currentAuthorId, // 👈 修正：user.id から変更！
                owner_id: user.id,  
                nft_content: currentContent,
                title_at_mint: novelData.title,
                minted_at: null // 下書きなので null
            });
            if (error) throw error;
        }

        alert("編集内容を保存しました。");
        isEdited = false; // 保存が完了したら「保存済み」に戻す

    } catch (err) {
        console.error("Save Error:", err);
        alert("保存失敗: " + (err.message || JSON.stringify(err)));
    }
}

    }

    button.addEventListener("click", () => {
        if (panel.classList.contains("is-open")) {
            closePanel();
        } else {
            openPanel();
        }
    });

    overlay.addEventListener("click", closePanel);

    window.addEventListener("resize", applyMobileDefaultView);

    applyMobileDefaultView();
}

document.addEventListener("DOMContentLoaded", setupMobileNftPrepareUI);

init();

// ==========================================
// 🌟 プレミアム生成からの帰還時：最新データを同期して画面に反映する
// ==========================================
window.addEventListener('load', async () => {
    const params = new URLSearchParams(window.location.search);
    
    // プレミアム生成から戻った時、またはURLに novel_id がある場合に実行
    if (params.has('page') && typeof supabaseClient !== 'undefined') {
        console.log("💎 プレミアム生成からの帰還を検知。最新データを同期します...");
        
        try {
            // 現在の novelId を取得（変数名が novel_id の場合はそれに合わせる）
            const targetId = typeof novelId !== 'undefined' ? novelId : params.get('novel_id');

            const { data: novel, error } = await supabaseClient
                .from('novels')
                .select('content')
                .eq('id', targetId)
                .single();

            if (!error && novel && novel.content) {
                // URLから現在のチャプターとエピソード番号を取得
                const c = parseInt(params.get('cIdx') || "0");
                const e = parseInt(params.get('eIdx') || "0");
                
                // 🌟 重要：DBの構造から pageAssets を抽出
                const dbAssets = novel.content[c]?.episodes[e]?.pageAssets || [];
                
                console.log("📦 DBから取得した画像リスト:", dbAssets);

                // 🌟 ここがポイント：nft_prepare.html 内で画像リストを保持している
                // 全く同じ変数名（おそらく pageAssets）に代入する
                if (typeof pageAssets !== 'undefined') {
                    pageAssets = dbAssets;
                }

                // 🌟 画面の再描画（現在表示中のページを更新）
                if (typeof renderPage === 'function') {
                    renderPage(); 
                } else if (typeof showPage === 'function') {
                    showPage(parseInt(params.get('page'))); // 関数名が showPage の場合
                }
                
                console.log("✅ 画面への反映が完了しました。");
            }
        } catch (err) {
            console.error("同期失敗:", err);
        }
    }
});

</script>
