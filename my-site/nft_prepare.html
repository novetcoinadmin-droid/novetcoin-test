<!DOCTYPE html>
<html lang="ja">
<head>
    <title>Novet NFT Studio | Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    /* --- レイアウト修正版 CSS --- */
:root { 
    --main-purple: #6a0dad; 
    --book-cream: #f8f4e6; 
}
    /* 画面全体のレイアウト調整 */
body { 
    background: #444; 
    margin: 0; 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

    /* 1. 作品表示エリア（本が置かれる場所） */
.work-display-area { 
    flex: 1 1 auto;
    min-width: 0;

    display: flex; 
    flex-direction: column; 
    align-items: flex-start; 
    justify-content: flex-start;

    padding-top: 60px;
    padding-left: 60px;
    padding-right: 60px;

    background: #555; 
    box-shadow: inset 0 0 100px rgba(0,0,0,0.3);

    overflow-x: auto;
    overflow-y: hidden;
    box-sizing: border-box;
}
    
/* --- のどの中央固定 & 微調整 --- */

/* 📖 本の見開きユニット本体 */
.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative; /* 絶対配置の基準点 */
    margin: 0 auto;    /* 親要素内で中央に配置 */
}

/* --- のどの中央固定：最終解 --- */

.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative;
    /* 左右のページを強制的に等幅にするための設定 */
    justify-content: center;
    align-items: stretch;
}

/* 🖋️ 影の位置を計算ではなく「真ん中」に完全固定 */
.page-spread::after { 
    content: "";
    position: absolute; 
    top: 0;
    /* left: 50% と translateX(-50%) の組み合わせは、親要素の正確な中心を指します */
    left: 50%;
    transform: translateX(-50%);
    
    width: 60px; /* 影の幅を少し広げて、境界を曖昧にする */
    height: 100%;
    /* 中央を一番濃く、外側を透明にするグラデーション */
    background: linear-gradient(to right, 
        rgba(0,0,0,0) 0%, 
        rgba(0,0,0,0.05) 25%, 
        rgba(0,0,0,0.18) 50%, 
        rgba(0,0,0,0.05) 75%, 
        rgba(0,0,0,0) 100%
    );
    pointer-events: none;
    z-index: 20; /* テキストや画像より必ず上に配置 */
}

/* 📖 左右のページ幅を「1:1」で絶対に動かさない設定 */
.text-half, .illust-half {
    flex: 1 1 50% !important; /* 優先度を上げ、幅を50%に強制 */
    max-width: 50% !important;
    min-width: 50% !important;
    box-sizing: border-box;
    position: relative;
}

/* 左ページのパディング微調整（影にかぶりすぎないよう右側を少し空ける） */
.text-half {
    padding: 60px 60px 60px 40px; 
}

/* 左半分：テキストエリア（サイズ維持） */
.text-half { 
    flex: 1; 
    padding: 60px 50px; 
    writing-mode: vertical-rl; 
    text-orientation: mixed;
    font-size: 16px; /* 指定通りそのまま */
    line-height: 2.5; 
    letter-spacing: 0.05em; 
    color: #333; 
    outline: none;
    z-index: 5;
}

/* 右半分：イラストエリア */
.illust-half { 
    flex: 1; 
    background: #eee; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    z-index: 5;
}
.illust-half img { width: 100%; height: 100%; object-fit: cover; }

/* --- 📱 スマホモード：レイアウト & スクロール完全修正版 --- */

.page-spread.mobile-mode {
    width: 360px !important;
    height: 640px !important;
    border: 8px solid #333;
    border-radius: 40px;
    display: block !important; 
    position: relative;
    overflow: hidden;
    /* PC版の flex レイアウトを完全に解除 */
    flex-direction: column !important;
}

/* 🖼️ イラスト：全画面。枠内にぴったり収めます */
.page-spread.mobile-mode .illust-half { 
    position: absolute !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100% !important; 
    height: 100% !important; 
    max-width: 100% !important;
    min-width: 100% !important; /* PC版の50%設定を上書き */
    z-index: 1; 
    display: flex !important;
    background: #eee;
    padding: 0 !important; /* 余計なパディングを排除 */
}

.page-spread.mobile-mode .illust-half img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
}

/* 🖋️ テキストエリア：下部中央にガラス質感で配置 */
.page-spread.mobile-mode .text-half { 
    position: absolute !important; 
    bottom: 25px !important; 
    left: 50% !important;
    transform: translateX(-50%) !important; 
    
    /* 【重要】幅の設定を安定させる修正 */
    width: 85% !important; 
    min-width: 0 !important;  /* PC版の50%固定を解除 */
    max-width: 85% !important; /* 幅が広がらないよう制限 */
    height: 160px !important; 
    z-index: 5; 
    
    background: rgba(0, 0, 0, 0.45) !important; 
    backdrop-filter: blur(15px) saturate(150%) !important; 
    
    color: #fff; 
    padding: 20px !important; /* PC版のパディングをリセット */
    border-radius: 20px; 
    writing-mode: horizontal-tb !important; /* 横書き */
    font-size: 14px; 
    line-height: 1.7;
    border: 1px solid rgba(255, 255, 255, 0.2); 
    display: block !important;
    box-sizing: border-box !important;

    /* スクロール機能 */
    overflow-y: auto !important; 
    overflow-x: hidden !important;
}

/* ✨ ガラス質感に合う細身のスクロールバー */
.page-spread.mobile-mode .text-half::-webkit-scrollbar {
    width: 5px !important;
    display: block !important;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05) !important;
    border-radius: 10px;
    margin: 10px 0;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3) !important;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.5) !important;
}

/* スマホ時は中央の影（のど）を完全に排除 */
.page-spread.mobile-mode::after { display: none !important; }

    /* 操作パネル */
   /* 右側操作パネル */
.control-panel { 
    width: 360px;
    min-width: 360px;
    max-width: 360px;
    flex: 0 0 360px;

    background: #fff; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
    border-left: 1px solid #ccc;
    font-family: sans-serif;
    overflow-y: auto;
    overflow-x: hidden;
    box-sizing: border-box;
}
    .section-card { background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #eee; font-size: 12px; }
    .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    .btn-save { background: #2ecc71; color: white; padding: 15px; font-size: 16px; margin-top: auto; }
    </style>
</head>

    <div class="asset-modal-overlay" id="assetModal">
        <div class="asset-modal-content">

        <div class="section-card" style="border-left: 4px solid #6a0dad;">

        <div class="section-card" style="border-left: 4px solid #6a0dad;">

    🖼️ イラスト保管庫から選択
</button>

        <button class="btn btn-save" onclick="saveNftDraft()">編集内容を保存する</button>

<script src="auth-check.js"></script>
<script>

let novelData = null;
let pages = []; 
let currentPage = 0;
let masterText = ""; 
let pageAssets = {}; 
let isMobileView = false;
let isEdited = false; // ✨ これを追加（編集されたかを判定するフラグ）
let assetModalMode = "insert"; // insert / standardize
const STANDARD_REF_KEY = "novet_standard_reference";
const STANDARD_REF_DB_NAME = "novet_standard_reference_cache";
const STANDARD_REF_STORE_NAME = "standard_reference_images";
const STANDARD_REF_IMAGE_KEY = "current";

// =====================================================
// 細部設定：日本語表示値 → Leonardo送信用英語値 変換
// =====================================================

function convertDetailSettingsToEnglish(detailSettings = {}) {
    const maps = {
        view: {
            "顔アップ": "close-up portrait",
            "バストアップ": "upper body portrait",
            "上半身": "upper body portrait",
            "膝上": "knees-up character view",
            "全身": "full body view",
            "少し離れた全身": "full body view from a slight distance",
            "遠景の人物": "distant character view"
        },

        age: {
            "幼少期": "childlike appearance while preserving identity",
            "少年・少女": "young boy or girl appearance while preserving identity",
            "10代前半": "early teenage appearance while preserving identity",
            "10代後半": "late teenage appearance while preserving identity",
            "20代前半": "appears in their early 20s while preserving identity",
            "20代後半": "appears in their late 20s while preserving identity",
            "30代": "appears in their 30s while preserving identity",
            "40代": "appears in their 40s while preserving identity",
            "50代以上": "appears over 50 while preserving identity",
            "年齢不詳": "ambiguous age while preserving identity"
        },

        expression: {
            "無表情": "neutral expression",
            "微笑み": "subtle smile",
            "喜び": "happy expression",
            "悲しげ": "sad expression",
            "真面目": "serious expression",
            "怒り": "angry expression",
            "疲れ": "tired expression",
            "照れ": "shy expression",
            "緊張": "tense expression",
            "決意": "determined expression"
        },

        pose: {
            "正面立ち": "front-facing standing pose",
            "斜め立ち": "three-quarter standing pose",
            "座る": "sitting pose",
            "振り返る": "turning back pose",
            "歩く": "walking pose",
            "手を胸に当てる": "hand placed on chest",
            "武器を構える": "holding a weapon pose",
            "本を持つ": "holding a book",
            "祈る": "praying pose",
            "見上げる": "looking up"
        },

        outfit: {
            "ドレス": "dress outfit",
            "スーツ": "suit outfit",
            "甲冑": "armor outfit",
            "冒険者マント": "adventurer cloak outfit",
            "和服": "traditional Japanese clothing",
            "制服": "school uniform",
            "ローブ": "robe outfit",
            "旅装": "traveler outfit",
            "貴族服": "noble clothing",
            "カジュアル服": "casual outfit"
        },

        parts: {
            "角": "horns",
            "翼": "wings",
            "獣耳": "animal ears",
            "尻尾": "tail",
            "宝石装飾": "jewel ornaments",
            "髪飾り": "hair ornament",
            "眼帯": "eyepatch",
            "仮面": "mask",
            "非人間的な瞳": "inhuman eyes",
            "魔法紋": "magic markings"
        },

        background: {
            "無地": "plain background",
            "和風": "simple Japanese-style background",
            "西洋風": "simple western-style background",
            "現代風": "simple modern background",
            "自然": "simple natural background",
            "城内": "simple castle interior background",
            "路地": "simple alley background",
            "森": "simple forest background",
            "室内": "simple indoor background",
            "幻想空間": "simple fantasy space background"
        },

        lighting_mood: {
            "明るい": "bright mood",
            "暗い": "dark mood",
            "逆光": "backlit mood",
            "柔らかい光": "soft light",
            "強い影": "strong shadows",
            "シリアス": "serious mood",
            "ポップ": "pop mood",
            "透明感": "clear and delicate mood",
            "神秘的": "mystical mood",
            "静かな雰囲気": "quiet mood"
        }
    };

    const result = {};

    for (const key of Object.keys(detailSettings || {})) {
        const value = detailSettings[key];

        if (!value) {
            result[key] = "";
            continue;
        }

        result[key] = maps[key]?.[value] || value;
    }

    return result;
}

// 1. 初期化関数
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const novelId = urlParams.get('novel_id');
    currentPage = parseInt(urlParams.get('page')) || 0;
    const cIdx = urlParams.get('cIdx');
    const eIdx = urlParams.get('eIdx');

    try {
        // 1. まず novels テーブルから本番データを取得
        const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
        novelData = novel;

        if (cIdx !== null && eIdx !== null && novel.content[cIdx]) {
            masterText = novel.content[cIdx].episodes[eIdx].content || "";
            // 🌟 重要：まず本番DBにある画像を読み込む
            pageAssets = novel.content[cIdx].episodes[eIdx].pageAssets || {};
        } else {
            masterText = "エピソードデータが見つかりません。";
            pageAssets = {};
        }

        refreshPages();

        // 2. nft_metadata (下書き) をチェックする
        // 🌟 修正1：複数データがある場合に備え、一番新しい(order/limit)データを取得する
        const { data: nftDraft } = await supabaseClient
            .from('nft_metadata')
            .select('nft_content')
            .eq('novel_id', novelId)
            .is('minted_at', null) // 👈 ★これを追加！（下書きだけを探す魔法）
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        const episodeKey = `draft_${cIdx}_${eIdx}`;
        
        if (nftDraft && nftDraft.nft_content && nftDraft.nft_content.episodes && nftDraft.nft_content.episodes[episodeKey]) {
            const draftData = nftDraft.nft_content.episodes[episodeKey];
            
            // 🌟 修正2：下書きに画像データ（assets）が保存されていれば、それを合体・上書きする
            // （ユーザーが手動で編集・保存した状態を最優先にするため）
            if (draftData.assets && Object.keys(draftData.assets).length > 0) {
                pageAssets = { ...pageAssets, ...draftData.assets };
            }

            // ついでに、テキストやページ割りも最新の編集状態があれば復元する
            if (draftData.full_text) {
                masterText = draftData.full_text;
                if (draftData.pages && draftData.pages.length > 0) {

function loadImageFromBlob(blob) {
    return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(blob);
        const img = new Image();

        img.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(img);
        };

        img.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("画像の読み込みに失敗しました。"));
        };

        img.src = objectUrl;
    });
}

async function convertImageUrlToWebpBlob(imageUrl) {
    const response = await fetch(imageUrl);

    if (!response.ok) {
        throw new Error("生成画像の取得に失敗しました。");
    }

    const originalBlob = await response.blob();
    const img = await loadImageFromBlob(originalBlob);

    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;

    const ctx = canvas.getContext("2d");
    if (!ctx) {
        throw new Error("Canvasの初期化に失敗しました。");
    }

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const webpBlob = await new Promise((resolve) => {
        canvas.toBlob(resolve, "image/webp", 0.85);
    });

    if (!webpBlob) {
        throw new Error("WebP変換に失敗しました。");
    }

    return webpBlob;
}

function openStandardReferenceDb() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(STANDARD_REF_DB_NAME, 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;

            if (!db.objectStoreNames.contains(STANDARD_REF_STORE_NAME)) {
                db.createObjectStore(STANDARD_REF_STORE_NAME, { keyPath: "key" });
            }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveStandardReferenceImageBlob(blob) {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        // 常に current 1件だけを上書き保存する
        store.put({
            key: STANDARD_REF_IMAGE_KEY,
            blob,
            updated_at: new Date().toISOString()
        });

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function getStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readonly");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);
        const request = store.get(STANDARD_REF_IMAGE_KEY);

        request.onsuccess = () => {
            db.close();
            resolve(request.result?.blob || null);
        };

        request.onerror = () => {
            db.close();
            reject(request.error);
        };
    });
}

async function clearStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        store.delete(STANDARD_REF_IMAGE_KEY);

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function fetchImageAsBlob(imageUrl) {
    const response = await fetch(imageUrl);

    if (!response.ok) {
        throw new Error("基準化画像の取得に失敗しました。");
    }

    return await response.blob();
}

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onloadend = () => {
            const result = String(reader.result || "");
            const base64 = result.includes(",") ? result.split(",")[1] : result;
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
    });
}

async function extractStandardReferenceFeatures() {
    const raw = localStorage.getItem(STANDARD_REF_KEY);
    if (!raw) {
        throw new Error("基準化情報が見つかりません。");
    }

    const ref = JSON.parse(raw);
    const blob = await getStandardReferenceImageBlob();

    if (!blob || blob.size === 0) {
        throw new Error("基準化画像Blobが見つかりません。");
    }

    const imageBase64 = await blobToBase64(blob);
    const imageMimeType = blob.type || "image/webp";

    const { data, error } = await supabaseClient.functions.invoke(
        "extract-standard-reference-features",
        {
            body: {
                image_base64: imageBase64,
                image_mime_type: imageMimeType
            }
        }
    );

    if (error) {
        console.error("特徴抽出Function Error:", error);
        throw new Error(error.message || "特徴抽出Functionの呼び出しに失敗しました。");
    }

    if (!data || data.ok !== true) {
        console.error("特徴抽出API Error:", data);
        throw new Error(data?.error || "特徴抽出に失敗しました。");
    }

    const updatedRef = {
        ...ref,
        extracted: true,
        extracting: false,
        extracted_at: new Date().toISOString(),
        features: data.extracted
    };

    localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(updatedRef));
    renderStandardReferenceCard();

    return updatedRef;
}

async function saveStandardReference(asset) {
    try {
        const type = document.getElementById("templateType")?.value || "character";

        if (!asset.file_url) {
            alert("基準化画像のURLが見つかりません。");
            return;
        }

        // 画像本体を取得して、IndexedDBに current 1件だけ保存する
        const blob = await fetchImageAsBlob(asset.file_url);
        await saveStandardReferenceImageBlob(blob);

        // 保存直後に読み戻して、抽出用Blobが本当に残っているか確認
        const cachedBlob = await getStandardReferenceImageBlob();

        if (!cachedBlob || cachedBlob.size === 0) {
            throw new Error("基準化画像Blobの保存確認に失敗しました。");
        }

        const ref = {
            type,
            asset_id: asset.id || null,
            title: asset.file_name || "無題",
            image_url: asset.file_url,
            extracted: false,
            extracting: false,
            blob_cached: true,
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();

        alert("基準化用のイラストを選択しました。\n続けて「基準化」ボタンを押すと、この画像を参照画像として確定します。");
    } catch (err) {

        alert("基準化画像の保存に失敗しました。画像の取得または一時保存で問題が発生しています。");
    }
}

    }

function collectTemplatePayload() {
    const templateType = document.getElementById("templateType")?.value || "character";
    const fields = {};

    document.querySelectorAll("#templateDisplay .template-field").forEach(select => {
        const key = select.id;
        let value = select.value;

        if (!value) return;

        if (value === "__custom__") {
            const customEl = document.getElementById(key + "_custom");
            const customValue = customEl?.value?.trim();

            if (!customValue) return;

            fields[key] = {
                mode: "custom",
                value: customValue
            };
            return;
        }

        fields[key] = {
            mode: "select",
            value
        };
    });

    return {
        template_type: templateType,
        template_fields: fields
    };
}

// 風景設定プリセット保存
// =====================================================

function getTemplateFieldValue(fieldId) {
    const selectEl = document.getElementById(fieldId);
    if (!selectEl) return "";

    const value = selectEl.value;

    if (!value) return "";

    if (value === "__custom__") {
        const customEl = document.getElementById(fieldId + "_custom");
        return customEl?.value?.trim() || "";
    }

    return value;
}

function collectCurrentSceneSettings() {
    return {
        pov: getTemplateFieldValue("tpl_scenery_pov"),
        composition: getTemplateFieldValue("tpl_scenery_composition"),
        scale: getTemplateFieldValue("tpl_scenery_scale"),
        place: getTemplateFieldValue("tpl_scenery_place"),
        world: getTemplateFieldValue("tpl_scenery_world"),
        detail: getTemplateFieldValue("tpl_scenery_detail"),
        light: getTemplateFieldValue("tpl_scenery_light"),
        tone: getTemplateFieldValue("tpl_scenery_tone"),
        person: getTemplateFieldValue("tpl_scenery_person"),
        mood: getTemplateFieldValue("tpl_scenery_mood")
    };
}

function hasAnySceneSetting(sceneSettings) {
    return Object.values(sceneSettings || {}).some(value => String(value || "").trim() !== "");
}

async function saveCurrentScenePreset() {
    try {
        const templateType = document.getElementById("templateType")?.value || "";

        if (templateType !== "scenery") {
            alert("風景テンプレートを選択してから保存してください。");
            return;
        }

        const { data: { user } } = await supabaseClient.auth.getUser();

        if (!user) {
            alert("ログインが必要です。");
            return;
        }

        const sceneSettings = collectCurrentSceneSettings();

        if (!hasAnySceneSetting(sceneSettings)) {
            alert("保存する風景設定がありません。少なくとも1つ項目を選択してください。");
            return;
        }

        const placeType = sceneSettings.place || "";
        const customPlace = sceneSettings.detail || "";

        const defaultName = placeType
            ? `${placeType}の風景設定`
            : "風景設定";

        const presetName = prompt("保存する風景設定の名前を入力してください。", defaultName);

        if (!presetName || !presetName.trim()) {
            return;
        }

        let standardRef = null;

        try {
            const raw = localStorage.getItem(STANDARD_REF_KEY);
            standardRef = raw ? JSON.parse(raw) : null;
        } catch {
            standardRef = null;
        }

        const referenceEnabled = !!(standardRef && standardRef.image_url);

        const { error } = await supabaseClient
            .from("scene_presets")
            .insert({
                user_id: user.id,
                preset_name: presetName.trim(),
                template_type: "scenery",
                place_type: placeType || null,
                custom_place: customPlace || null,
                scene_settings: sceneSettings,
                reference_enabled: referenceEnabled,
                reference_asset_id: standardRef?.asset_id || null,
                reference_image_url: standardRef?.image_url || null
            });

        if (error) {
            throw error;
        }

        alert("風景設定を保存しました。");

    } catch (err) {
        console.error("風景設定保存エラー:", err);
        alert("風景設定の保存に失敗しました: " + (err.message || String(err)));
    }
}

function closeScenePresetLoadModal() {

}

function setTemplateFieldValue(fieldId, value) {
    const selectEl = document.getElementById(fieldId);
    if (!selectEl) return;

    const normalizedValue = String(value || "").trim();

    if (!normalizedValue) {
        selectEl.value = "";
        toggleTemplateCustomInput(selectEl);
        return;
    }

    const hasOption = Array.from(selectEl.options).some(option => option.value === normalizedValue);

    if (hasOption) {
        selectEl.value = normalizedValue;
        toggleTemplateCustomInput(selectEl);
        return;
    }

    // 保存値が既存選択肢にない場合は、自由入力へ戻す
    selectEl.value = "__custom__";
    toggleTemplateCustomInput(selectEl);

    const customEl = document.getElementById(fieldId + "_custom");
    if (customEl) {
        customEl.value = normalizedValue;
    }
}

function applyScenePresetToForm(preset) {
    if (!preset) return;

    const templateTypeEl = document.getElementById("templateType");
    if (templateTypeEl) {
        templateTypeEl.value = "scenery";
        updateTemplateDisplay();
    }

    const settings = preset.scene_settings || {};

    setTemplateFieldValue("tpl_scenery_pov", settings.pov);
    setTemplateFieldValue("tpl_scenery_composition", settings.composition);
    setTemplateFieldValue("tpl_scenery_scale", settings.scale);
    setTemplateFieldValue("tpl_scenery_place", settings.place);
    setTemplateFieldValue("tpl_scenery_world", settings.world);
    setTemplateFieldValue("tpl_scenery_detail", settings.detail);
    setTemplateFieldValue("tpl_scenery_light", settings.light);
    setTemplateFieldValue("tpl_scenery_tone", settings.tone);
    setTemplateFieldValue("tpl_scenery_person", settings.person);
    setTemplateFieldValue("tpl_scenery_mood", settings.mood);

    // 背景基準化画像が保存されている場合は、現在の基準化として復元する
    if (preset.reference_enabled && preset.reference_image_url) {
        const ref = {
            type: "scenery",
            asset_id: preset.reference_asset_id || null,
            title: preset.preset_name || "風景基準化",
            image_url: preset.reference_image_url,
            extracted: true,
            extracting: false,
            standard_ready: true,
            standard_method: "scene_reference_image",
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();
    }

    closeScenePresetLoadModal();
    alert("保存済み風景設定を読み込みました。");
}

function buildLeonardoReferenceDetailSettings(templatePayload = {}) {
    const fields = templatePayload.template_fields || {};

        const field = fields[fieldId];
        if (!field) return "";

        return String(field.value || "").trim();
    };

    // 現在はキャラテンプレート用を優先して作る
    const detailSettingsJa = {
        view: getFieldValue("tpl_character_view"),
        age: getFieldValue("tpl_character_age"),
        expression: getFieldValue("tpl_character_expression"),
        pose: getFieldValue("tpl_character_pose"),
        outfit: getFieldValue("tpl_character_outfit"),
        parts: getFieldValue("tpl_character_parts"),
        background: getFieldValue("tpl_character_background"),
        lighting_mood: getFieldValue("tpl_character_lighting")
    };

    // 日本語表示値をLeonardo向け英語値へ変換
    return convertDetailSettingsToEnglish(detailSettingsJa);
}

function updatePromptSource() {
    const charSelect = document.getElementById("charSelect");
    const detailBox = document.getElementById("charDetailBox");
    const charId = charSelect.value;

    if (charId === "text") {
        detailBox.style.display = "none";
        return;
    }

    const charData = novelData.characters.find(c => c.id === charId);
    if (charData && charData.detail) {
        detailBox.style.display = "block";
        detailBox.innerHTML = `<strong>設定確認:</strong><br>${charData.detail.replace(/\n/g, '<br>')}`;
    } else {
        detailBox.style.display = "none";
    }
}

// 4. 画像生成ロジック
// Leonardo参照画像Function 本実行版
async function generateImage(type) {
    const charSelect = document.getElementById("charSelect");
    const charId = charSelect ? charSelect.value : "text";
    const urlParams = new URLSearchParams(window.location.search);
    const loadingOverlay = document.getElementById("loadingOverlay");

    // --- プレミアムの場合 ---
    if (type === "premium") {
        if (charId === "text") {
            alert("プレミアム生成にはキャラクターを選択してください。");
            return;
        }

        location.href = `premium_generate.html?char_id=${charId}&novel_id=${novelData.id}&page=${currentPage}&cIdx=${urlParams.get("cIdx")}&eIdx=${urlParams.get("eIdx")}`;
        return;
    }

    // --- スタンダード生成 ---
    try {
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (!user) {
            alert("ログインが必要です。");
            return;
        }

        const { data: profile, error: profileError } = await supabaseClient
            .from("profiles")
            .select("np_balance")
            .eq("id", user.id)
            .single();

        if (profileError) {
            throw profileError;
        }

        const currentNp = Number(profile?.np_balance || 0);

        if (currentNp < 10) {
            alert("NP残高が不足しています（必要: 10 NP）。");
            return;
        }

        const templatePayload = collectTemplatePayload();

        if (templatePayload.template_type !== "character") {
            alert("現在の参照画像生成は、キャラテンプレートのみ対応です。");
            return;
        }

        let standardRef = null;

        try {
            const raw = localStorage.getItem(STANDARD_REF_KEY);
            standardRef = raw ? JSON.parse(raw) : null;
        } catch {
            standardRef = null;
        }

        if (!standardRef || !standardRef.image_url) {
            alert("先にイラスト保管庫から基準化用の画像を選択してください。");
            return;
        }

        if (standardRef.standard_ready !== true) {
            alert("基準化用の画像は選択済みです。\n続けて「基準化」ボタンを押してから生成してください。");
            return;
        }

        const detailSettings = buildLeonardoReferenceDetailSettings(templatePayload);

        const hasAnyDetail = Object.values(detailSettings).some(value => String(value || "").trim() !== "");

        if (!hasAnyDetail) {
            alert("キャラテンプレートの細部設定を1つ以上選択してください。");
            return;
        }

        if (!confirm("スタンダード生成を実行しますか？\n費用: 10 NP")) {
            return;
        }

        if (loadingOverlay) {
            loadingOverlay.style.display = "flex";
        }

        const requestPayload = {
            reference_image_url: standardRef.image_url,
            detail_settings: detailSettings,
            debug_prompt_only: false
        };

        console.log("🎨 Leonardo参照画像Functionへ送るpayload:", {
            has_reference_image_url: !!requestPayload.reference_image_url,
            detail_settings: requestPayload.detail_settings,
            debug_prompt_only: requestPayload.debug_prompt_only
        });

        const { data, error } = await supabaseClient.functions.invoke(
            "generate-nft-image-leonardo-reference",
            {
                body: requestPayload
            }
        );

        if (error) {
            console.error("Leonardo参照画像Function Error:", error);
            throw new Error(error.message || "Leonardo参照画像Functionの呼び出しに失敗しました。");
        }

        console.log("🎨 Leonardo参照画像Function 結果:", data);

        if (!data || data.ok !== true) {
            throw new Error(data?.error || "画像URLの取得に失敗しました。");
        }

        const imageUrl =
            data.imageUrl ||
            data.image_url ||
            data.generatedImageUrl ||
            data.generated_image_url ||
            data.url ||
            "";

        if (!imageUrl) {
            throw new Error("画像URLが返ってきませんでした。");
        }

        pageAssets[currentPage] = imageUrl;
        isEdited = true;
        renderPage();

        const newNp = currentNp - 10;

        const { error: updateError } = await supabaseClient
            .from("profiles")
            .update({ np_balance: newNp })
            .eq("id", user.id);

        if (updateError) {
            console.error("NP更新エラー:", updateError);
            alert("画像は作成されましたが、NP残高更新でエラーが発生しました。管理者に確認してください。");
        } else {
            const myNpEl = document.getElementById("myNp");
            if (myNpEl) {
                myNpEl.innerText = newNp;
            }
        }

        if (loadingOverlay) {
            loadingOverlay.style.display = "none";
        }

        alert("スタンダード生成が完了しました。\n内容を保存してください。");

    } catch (err) {
        console.error("Standard Generation Error:", err);

        if (loadingOverlay) {
            loadingOverlay.style.display = "none";
        }

        alert("エラー: " + (err.message || String(err)));
    }
}

// 5. 保存ロジック（エピソードごとに分離 ＆ ミント済み保護機能付き）
async function saveNftDraft() {
    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) throw new Error("ログインセッションが見つかりません。");

        // ★修正ポイント：現在の小説を書いた「作家のID」を取得する
        const currentAuthorId = localStorage.getItem("authorId") || novelData.author_id;

        const urlParams = new URLSearchParams(window.location.search);
        const cIdx = urlParams.get('cIdx');
        const eIdx = urlParams.get('eIdx');
        
        // 【重要】エピソードごとに固有のキーを作成
        const episodeKey = `draft_${cIdx}_${eIdx}`;

        // 🌟 修正1：複数あるデータの中から「一番最新のデータ」を取得する
        const { data: existingData } = await supabaseClient
            .from('nft_metadata')
            .select('id, nft_content, minted_at')
            .eq('novel_id', novelData.id)
            .is('minted_at', null) // 👈 ★ここにも追加！
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        let currentContent = existingData ? existingData.nft_content : {};
        if (!currentContent) currentContent = {};
        if (!currentContent.episodes) currentContent.episodes = {};

        // このエピソード専用のデータを作成
        const episodeData = {
            full_text: masterText,
            pages: pages,
            assets: pageAssets,
            last_edited: new Date()
        };

        // 全体のデータの中に、このエピソードのデータを格納
        currentContent.episodes[episodeKey] = episodeData;

        // 🌟 修正2：upsert をやめて、ミント状況に応じた安全な保存を行う
        if (existingData && existingData.id) {
            if (existingData.minted_at) {
                // ▼ 最新データが「すでにミント済みの作品」だった場合
                const { error } = await supabaseClient.from('nft_metadata').insert({
                    novel_id: novelData.id,
                    author_id: currentAuthorId, // 👈 修正：user.id から変更！
                    owner_id: user.id,  
                    nft_content: currentContent,
                    title_at_mint: novelData.title,
                    minted_at: null // 👈 ミント前（下書き）の証拠として null を入れる
                });
                if (error) throw error;
            } else {
                // ▼ 最新データが「まだミントされていない下書き」だった場合
                const { error } = await supabaseClient.from('nft_metadata')
                    .update({ 
                        nft_content: currentContent,
                        title_at_mint: novelData.title 
                    })
                    .eq('id', existingData.id);
                if (error) throw error;
            }
        } else {
            // ▼ まだ一度も保存・ミントされていない場合（完全新規）
            const { error } = await supabaseClient.from('nft_metadata').insert({
                novel_id: novelData.id,
                author_id: currentAuthorId, // 👈 修正：user.id から変更！
                owner_id: user.id,  
                nft_content: currentContent,
                title_at_mint: novelData.title,
                minted_at: null // 下書きなので null
            });
            if (error) throw error;
        }

        alert("編集内容を保存しました。");
        isEdited = false; // 保存が完了したら「保存済み」に戻す

    } catch (err) {
        console.error("Save Error:", err);
        alert("保存失敗: " + (err.message || JSON.stringify(err)));
    }
}

// ✨ 追加：戻るボタンを押したときの処理

// ✨ 追加：ブラウザの戻るボタンや、タブを閉じようとした時の強力なブロック
window.addEventListener('beforeunload', function (e) {
    if (isEdited) {
        e.preventDefault();
        e.returnValue = ''; // これを入れるとブラウザ標準の「このサイトを離れますか？」が出ます
    }
});

// ==========================================
// 🌟 プレミアム生成からの帰還時：最新データを同期して画面に反映する
// ==========================================
window.addEventListener('load', async () => {
    const params = new URLSearchParams(window.location.search);
    
    // プレミアム生成から戻った時、またはURLに novel_id がある場合に実行
    if (params.has('page') && typeof supabaseClient !== 'undefined') {
        console.log("💎 プレミアム生成からの帰還を検知。最新データを同期します...");
        
        try {
            // 現在の novelId を取得（変数名が novel_id の場合はそれに合わせる）
            const targetId = typeof novelId !== 'undefined' ? novelId : params.get('novel_id');

            const { data: novel, error } = await supabaseClient
                .from('novels')
                .select('content')
                .eq('id', targetId)
                .single();

            if (!error && novel && novel.content) {
                // URLから現在のチャプターとエピソード番号を取得
                const c = parseInt(params.get('cIdx') || "0");
                const e = parseInt(params.get('eIdx') || "0");
                
                // 🌟 重要：DBの構造から pageAssets を抽出
                const dbAssets = novel.content[c]?.episodes[e]?.pageAssets || [];
                
                console.log("📦 DBから取得した画像リスト:", dbAssets);

                // 🌟 ここがポイント：nft_prepare.html 内で画像リストを保持している
                // 全く同じ変数名（おそらく pageAssets）に代入する
                if (typeof pageAssets !== 'undefined') {
                    pageAssets = dbAssets;
                }

                // 🌟 画面の再描画（現在表示中のページを更新）
                if (typeof renderPage === 'function') {
                    renderPage(); 
                } else if (typeof showPage === 'function') {
                    showPage(parseInt(params.get('page'))); // 関数名が showPage の場合
                }
                
                console.log("✅ 画面への反映が完了しました。");
            }
        } catch (err) {
            console.error("同期失敗:", err);
        }
    }
});
