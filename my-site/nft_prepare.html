<!DOCTYPE html>
<html lang="ja">
<head>
    <title>Novet NFT Studio | Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    /* --- レイアウト修正版 CSS --- */
:root { 
    --main-purple: #6a0dad; 
    --book-cream: #f8f4e6; 
}
    /* 画面全体のレイアウト調整 */
body { 
    background: #444; 
    margin: 0; 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

    /* 1. 作品表示エリア（本が置かれる場所） */
.work-display-area { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: flex-start; /* 上詰めに変更 */
    padding-top: 60px; /* 上部にしっかり余白を確保 */
    background: #555; 
    box-shadow: inset 0 0 100px rgba(0,0,0,0.3);
}
    
/* --- のどの中央固定 & 微調整 --- */

/* 📖 本の見開きユニット本体 */
.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative; /* 絶対配置の基準点 */
    margin: 0 auto;    /* 親要素内で中央に配置 */
}

/* --- のどの中央固定：最終解 --- */

.page-spread { 
    display: flex; 
    width: 900px; 
    height: 600px; 
    background: var(--book-cream);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
    border-radius: 4px 15px 15px 4px; 
    overflow: hidden; 
    position: relative;
    /* 左右のページを強制的に等幅にするための設定 */
    justify-content: center;
    align-items: stretch;
}

/* 🖋️ 影の位置を計算ではなく「真ん中」に完全固定 */
.page-spread::after { 
    content: "";
    position: absolute; 
    top: 0;
    /* left: 50% と translateX(-50%) の組み合わせは、親要素の正確な中心を指します */
    left: 50%;
    transform: translateX(-50%);
    
    width: 60px; /* 影の幅を少し広げて、境界を曖昧にする */
    height: 100%;
    /* 中央を一番濃く、外側を透明にするグラデーション */
    background: linear-gradient(to right, 
        rgba(0,0,0,0) 0%, 
        rgba(0,0,0,0.05) 25%, 
        rgba(0,0,0,0.18) 50%, 
        rgba(0,0,0,0.05) 75%, 
        rgba(0,0,0,0) 100%
    );
    pointer-events: none;
    z-index: 20; /* テキストや画像より必ず上に配置 */
}

/* 📖 左右のページ幅を「1:1」で絶対に動かさない設定 */
.text-half, .illust-half {
    flex: 1 1 50% !important; /* 優先度を上げ、幅を50%に強制 */
    max-width: 50% !important;
    min-width: 50% !important;
    box-sizing: border-box;
    position: relative;
}

/* 左ページのパディング微調整（影にかぶりすぎないよう右側を少し空ける） */
.text-half {
    padding: 60px 60px 60px 40px; 
}

/* 左半分：テキストエリア（サイズ維持） */
.text-half { 
    flex: 1; 
    padding: 60px 50px; 
    writing-mode: vertical-rl; 
    text-orientation: mixed;
    font-size: 16px; /* 指定通りそのまま */
    line-height: 2.5; 
    letter-spacing: 0.05em; 
    color: #333; 
    outline: none;
    z-index: 5;
}

/* 右半分：イラストエリア */
.illust-half { 
    flex: 1; 
    background: #eee; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    z-index: 5;
}
.illust-half img { width: 100%; height: 100%; object-fit: cover; }

/* --- 📱 スマホモード：レイアウト & スクロール完全修正版 --- */

.page-spread.mobile-mode {
    width: 360px !important;
    height: 640px !important;
    border: 8px solid #333;
    border-radius: 40px;
    display: block !important; 
    position: relative;
    overflow: hidden;
    /* PC版の flex レイアウトを完全に解除 */
    flex-direction: column !important;
}

/* 🖼️ イラスト：全画面。枠内にぴったり収めます */
.page-spread.mobile-mode .illust-half { 
    position: absolute !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100% !important; 
    height: 100% !important; 
    max-width: 100% !important;
    min-width: 100% !important; /* PC版の50%設定を上書き */
    z-index: 1; 
    display: flex !important;
    background: #eee;
    padding: 0 !important; /* 余計なパディングを排除 */
}

.page-spread.mobile-mode .illust-half img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
}

/* 🖋️ テキストエリア：下部中央にガラス質感で配置 */
.page-spread.mobile-mode .text-half { 
    position: absolute !important; 
    bottom: 25px !important; 
    left: 50% !important;
    transform: translateX(-50%) !important; 
    
    /* 【重要】幅の設定を安定させる修正 */
    width: 85% !important; 
    min-width: 0 !important;  /* PC版の50%固定を解除 */
    max-width: 85% !important; /* 幅が広がらないよう制限 */
    height: 160px !important; 
    z-index: 5; 
    
    background: rgba(0, 0, 0, 0.45) !important; 
    backdrop-filter: blur(15px) saturate(150%) !important; 
    
    color: #fff; 
    padding: 20px !important; /* PC版のパディングをリセット */
    border-radius: 20px; 
    writing-mode: horizontal-tb !important; /* 横書き */
    font-size: 14px; 
    line-height: 1.7;
    border: 1px solid rgba(255, 255, 255, 0.2); 
    display: block !important;
    box-sizing: border-box !important;

    /* スクロール機能 */
    overflow-y: auto !important; 
    overflow-x: hidden !important;
}

/* ✨ ガラス質感に合う細身のスクロールバー */
.page-spread.mobile-mode .text-half::-webkit-scrollbar {
    width: 5px !important;
    display: block !important;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05) !important;
    border-radius: 10px;
    margin: 10px 0;
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3) !important;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.page-spread.mobile-mode .text-half::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.5) !important;
}

/* スマホ時は中央の影（のど）を完全に排除 */
.page-spread.mobile-mode::after { display: none !important; }

    /* 操作パネル */
   /* 右側操作パネル */
.control-panel { 
    width: 300px; /* 幅を固定して計算を安定させる */
    background: #fff; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
    border-left: 1px solid #ccc;
    font-family: sans-serif;
    overflow-y: auto;
}
    .section-card { background: #fdfdfd; padding: 12px; border-radius: 8px; border: 1px solid #eee; font-size: 12px; }
    .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    .btn-save { background: #2ecc71; color: white; padding: 15px; font-size: 16px; margin-top: auto; }
    </style>
</head>
<body>
<body>
    <style>
    /* モーダルの背景（黒半透明） */
    .asset-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;
    }

    /* モーダルの本体 */
    .asset-modal-content {
        background: #fff; width: 90%; max-width: 800px; height: 80vh; border-radius: 10px;
        display: flex; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.3); overflow: hidden;
    }

    .asset-modal-header {
        padding: 15px 20px; background: #fdfaf6; border-bottom: 1px solid #eee;
        display: flex; justify-content: space-between; align-items: center;
    }

    .asset-modal-header h3 { margin: 0; color: #6a0dad; font-size: 18px; }
    .close-modal-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }

    /* ギャラリー部分 */
    .asset-modal-body { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; }

    .modal-gallery-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;
    }

    .modal-asset-card {
        background: #fff; border: 2px solid transparent; border-radius: 8px; overflow: hidden;
        cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .modal-asset-card:hover { border-color: #6a0dad; transform: translateY(-2px); }
    .modal-asset-img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .modal-asset-name { padding: 8px; font-size: 12px; color: #555; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>

    <div class="asset-modal-overlay" id="assetModal">
        <div class="asset-modal-content">
            <div class="asset-modal-header">
                <h3>🎨 イラスト保管庫から選ぶ</h3>
                <button class="close-modal-btn" onclick="closeAssetModal()">×</button>
            </div>
            <div class="asset-modal-body" id="assetModalBody">
                <p style="text-align: center; color: #999; margin-top: 20px;">読み込み中...</p>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; color:white; justify-content:center; align-items:center; flex-direction:column;">
        <div style="font-size: 24px; margin-bottom: 20px;">🎨 画像を錬成中...</div>
        <div>しばらくお待ちください（約10〜20秒）</div>
    </div>

    <div class="work-display-area">
        <div class="page-spread" id="mainSpread">
            <div class="text-half" id="textHalf" contenteditable="true" oninput="handleTextEdit()"></div>
            <div class="illust-half" id="illustHalf">
                <span style="color:#bbb; font-size: 12px;">NO IMAGE</span>
            </div>
        </div>

        <div style="margin-top: 40px; display: flex; align-items: center; gap: 40px;">
            <button onclick="changePage(-1)" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 15px; border-radius:20px;">前へ</button>
            <span id="pageCounter" style="color:#fff; font-weight:bold; font-size:20px;">-- / --</span>
            <button onclick="changePage(1)" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 15px; border-radius:20px;">次へ</button>
        </div>
    </div>

    <div class="control-panel">

        <div class="section-card" style="border-left: 4px solid #6a0dad;">
            <button class="btn" style="background:#444; color:white;" onclick="toggleMobileView()" id="viewToggleBtn">
                📱 スマホ風表示
            </button>

            <button class="btn" style="background:#eee; color:#666;" onclick="backToMint()">
                ← 作品選択に戻る
            </button>

            <div style="margin-top: 14px; padding-top: 12px; border-top: 1px solid #eee;">
                <label style="font-size:12px; color:#666;">作品名</label>
                <div id="metaTitle" style="font-weight:bold; font-size:14px; margin-top:4px;">--</div>
            </div>

            <div style="margin-top: 12px;">
                <label style="font-size:12px; color:#666;">保有NP</label>
                <div style="font-weight:bold; font-size:18px; color:#6a0dad; margin-top:4px;">
                    <span id="myNp">--</span> NP
                </div>
            </div>
        </div>

        <div class="section-card" style="border-left: 4px solid #333;">
            <label style="font-size:13px; font-weight:bold;">基準化</label>
            <p style="font-size:10px; color:#777; line-height:1.5; margin:6px 0 10px;">
                イラスト保管庫から基準にしたい画像を選び、今後の生成の作風・顔立ち・世界観を安定させます。
                注意：無くても生成可能です。同じようなキャラや世界観を統一したい時におすすめです。
            </p>

            <button type="button" class="btn" style="background:#fff; border:1px solid #6a0dad; color:#6a0dad;" onclick="standardizeFromAsset()">
                🖼️ イラスト保管庫から選択
            </button>

            <div id="standardStatus" style="font-size:10px; color:#999; margin-top:8px;">
                現在の基準化：未設定
            </div>
        </div>

        <div class="section-card" style="border-left: 4px solid #999;">
            <label style="font-size:13px; font-weight:bold;">生成テンプレート</label>

            <select id="templateType" onchange="updateTemplateDisplay()" style="width:100%; margin:8px 0; padding:8px; border-radius:6px; border:1px solid #ddd;">
                <option value="character">キャラテンプレート</option>
                <option value="scenery">風景テンプレート</option>
                <option value="other">その他テンプレート</option>
            </select>

            <div id="templateDisplay" style="font-size:11px; color:#555; background:#f7f7f7; padding:10px; border-radius:6px; line-height:1.6;">
                キャラクターの顔立ち、輪郭、髪型、表情、服装、ポーズ、画面構成を基準化して生成します。
            </div>
        </div>

        <div class="section-card" style="border-left: 4px solid #2ecc71;">
            <label style="font-size:13px; font-weight:bold;">AIイラスト生成</label>

            <select id="charSelect" style="display:none;">
                <option value="text">現在の本文から生成</option>
            </select>

            <div id="charDetailBox" style="display:none;"></div>

            <button class="btn" style="background:#f0f0f0; color:#333; font-size:13px; margin-top:10px;" onclick="generateImage('std')">
                スタンダード生成（10 NP）
            </button>

            <p style="font-size:10px; color:#999; margin-top:8px; line-height:1.5;">
                ※配色はモノクロ固定。プレミアム生成は現在停止中です。
            </p>
        </div>

        <button class="btn btn-save" onclick="saveNftDraft()">編集内容を保存する</button>
    </div>

<script src="auth-check.js"></script>
<script>

let novelData = null;
let pages = []; 
let currentPage = 0;
let masterText = ""; 
let pageAssets = {}; 
let isMobileView = false;
let isEdited = false; // ✨ これを追加（編集されたかを判定するフラグ）
let assetModalMode = "insert"; // insert / standardize
const STANDARD_REF_KEY = "novet_standard_reference";
const STANDARD_REF_DB_NAME = "novet_standard_reference_cache";
const STANDARD_REF_STORE_NAME = "standard_reference_images";
const STANDARD_REF_IMAGE_KEY = "current";

// 1. 初期化関数
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const novelId = urlParams.get('novel_id');
    currentPage = parseInt(urlParams.get('page')) || 0;
    const cIdx = urlParams.get('cIdx');
    const eIdx = urlParams.get('eIdx');

    try {
        // 1. まず novels テーブルから本番データを取得
        const { data: novel } = await supabaseClient.from('novels').select('*').eq('id', novelId).single();
        novelData = novel;

        if (cIdx !== null && eIdx !== null && novel.content[cIdx]) {
            masterText = novel.content[cIdx].episodes[eIdx].content || "";
            // 🌟 重要：まず本番DBにある画像を読み込む
            pageAssets = novel.content[cIdx].episodes[eIdx].pageAssets || {};
        } else {
            masterText = "エピソードデータが見つかりません。";
            pageAssets = {};
        }

        refreshPages();

        // 2. nft_metadata (下書き) をチェックする
        // 🌟 修正1：複数データがある場合に備え、一番新しい(order/limit)データを取得する
        const { data: nftDraft } = await supabaseClient
            .from('nft_metadata')
            .select('nft_content')
            .eq('novel_id', novelId)
            .is('minted_at', null) // 👈 ★これを追加！（下書きだけを探す魔法）
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        const episodeKey = `draft_${cIdx}_${eIdx}`;
        
        if (nftDraft && nftDraft.nft_content && nftDraft.nft_content.episodes && nftDraft.nft_content.episodes[episodeKey]) {
            const draftData = nftDraft.nft_content.episodes[episodeKey];
            
            // 🌟 修正2：下書きに画像データ（assets）が保存されていれば、それを合体・上書きする
            // （ユーザーが手動で編集・保存した状態を最優先にするため）
            if (draftData.assets && Object.keys(draftData.assets).length > 0) {
                pageAssets = { ...pageAssets, ...draftData.assets };
            }

            // ついでに、テキストやページ割りも最新の編集状態があれば復元する
            if (draftData.full_text) {
                masterText = draftData.full_text;
                if (draftData.pages && draftData.pages.length > 0) {
                    pages = draftData.pages; // 保存時のページ割りをそのまま復元
                } else {
                    refreshPages(); 
                }
            }
        }

        // --- メタ情報表示 ---
        const paramsForMeta = new URLSearchParams(window.location.search);
        const currentCIdx = parseInt(paramsForMeta.get("cIdx") || "0");
        const currentEIdx = parseInt(paramsForMeta.get("eIdx") || "0");

        let displayName = novel.title || "編集中の作品";

        if (
            Array.isArray(novel.content) &&
            novel.content[currentCIdx] &&
            Array.isArray(novel.content[currentCIdx].episodes) &&
            novel.content[currentCIdx].episodes[currentEIdx]
        ) {
            displayName = novel.content[currentCIdx].episodes[currentEIdx].title || displayName;
        }

        const metaTitleEl = document.getElementById("metaTitle");
        if (metaTitleEl) {
            metaTitleEl.innerText = displayName;
        }

        // --- ユーザー情報と残高 ---
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (user) {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('np_balance')
                .eq('id', user.id)
                .single();

            const myNpEl = document.getElementById("myNp");
            if (myNpEl) {
                myNpEl.innerText = profile?.np_balance || 0;
            }

            await loadCharacters(user.id);
        }

        // 🌟 最後に描画
        renderPage();
        renderStandardReferenceCard();

        console.log("✅ 初期化完了：最新の画像データを読み込みました", pageAssets);

    } catch (err) { 
        console.error("Init Error:", err); 
    }
}
// ==========================================
// 🌟 イラスト保管庫（アセット）連携機能
// ==========================================

// ポップアップを開いて画像を読み込む
async function openAssetModal() {
    document.getElementById('assetModal').style.display = 'flex';
    const body = document.getElementById('assetModalBody');
    body.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">読み込み中...</p>';

    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return alert("ログインが必要です");

        // 自分の素材を新しい順に取得
        const { data: assets, error } = await supabaseClient
            .from('user_assets')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (assets && assets.length > 0) {
            // 画像がある場合：グリッド表示
            body.innerHTML = '<div class="modal-gallery-grid">' + assets.map((asset, index) => `
    <div class="modal-asset-card" onclick="selectAssetFromList(${index})">
        <img src="${asset.file_url}" class="modal-asset-img">
        <div class="modal-asset-name">${asset.file_name || '無題'}</div>
    </div>
`).join('') + '</div>';

window.currentAssetList = assets;
        } else {
            // 画像がない場合：親切な案内とリンクを表示
            body.innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <p style="color: #666; font-size: 15px; margin-bottom: 20px;">イラスト保管庫に素材がありません。</p>
                    <a href="assets.html" target="_blank" style="display: inline-block; padding: 10px 20px; background: #6a0dad; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold;">
                        🎨 イラスト保管庫を開いて追加する
                    </a>
                    <p style="font-size: 12px; color: #999; margin-top: 15px;">※追加後、この画面に戻って再度ボタンを押してください。</p>
                </div>
            `;
        }
    } catch (err) {
        body.innerHTML = `<p style="color: red; text-align: center;">エラーが発生しました: ${err.message}</p>`;
    }
}

// ポップアップを閉じる
function closeAssetModal() {
    document.getElementById('assetModal').style.display = 'none';
}

async function selectAssetFromList(index) {
    const asset = window.currentAssetList?.[index];
    if (!asset) return;

    if (assetModalMode === "standardize") {
        await saveStandardReference(asset);
        closeAssetModal();
        assetModalMode = "insert";
        return;
    }

    selectAsset(asset.file_url);
}

// 画像がクリックされた時の処理
function selectAsset(imageUrl) {
    // 1. 現在のページの挿絵データとして、選んだ画像のURLをセットする
    pageAssets[currentPage] = imageUrl;
    
    // 2. 変更があったので「未保存状態」にする（戻るボタン対策）
    isEdited = true;
    
    // 3. 画面を再描画して、イラスト枠(illustHalf)に画像を即座に表示させる
    renderPage();
    
    // 4. ポップアップを閉じる
    closeAssetModal();
    
    // 5. ユーザーにお知らせ
    alert("イラストを挿入しました！\n（※忘れずに「保存」ボタンを押してください）");
}

function openStandardReferenceDb() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(STANDARD_REF_DB_NAME, 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;

            if (!db.objectStoreNames.contains(STANDARD_REF_STORE_NAME)) {
                db.createObjectStore(STANDARD_REF_STORE_NAME, { keyPath: "key" });
            }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveStandardReferenceImageBlob(blob) {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        // 常に current 1件だけを上書き保存する
        store.put({
            key: STANDARD_REF_IMAGE_KEY,
            blob,
            updated_at: new Date().toISOString()
        });

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function getStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readonly");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);
        const request = store.get(STANDARD_REF_IMAGE_KEY);

        request.onsuccess = () => {
            db.close();
            resolve(request.result?.blob || null);
        };

        request.onerror = () => {
            db.close();
            reject(request.error);
        };
    });
}

async function clearStandardReferenceImageBlob() {
    const db = await openStandardReferenceDb();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(STANDARD_REF_STORE_NAME, "readwrite");
        const store = tx.objectStore(STANDARD_REF_STORE_NAME);

        store.delete(STANDARD_REF_IMAGE_KEY);

        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };

        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function fetchImageAsBlob(imageUrl) {
    const response = await fetch(imageUrl);

    if (!response.ok) {
        throw new Error("基準化画像の取得に失敗しました。");
    }

    return await response.blob();
}

function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onloadend = () => {
            const result = String(reader.result || "");
            const base64 = result.includes(",") ? result.split(",")[1] : result;
            resolve(base64);
        };

        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
    });
}

async function extractStandardReferenceFeatures() {
    const raw = localStorage.getItem(STANDARD_REF_KEY);
    if (!raw) {
        throw new Error("基準化情報が見つかりません。");
    }

    const ref = JSON.parse(raw);
    const blob = await getStandardReferenceImageBlob();

    if (!blob || blob.size === 0) {
        throw new Error("基準化画像Blobが見つかりません。");
    }

    const imageBase64 = await blobToBase64(blob);
    const imageMimeType = blob.type || "image/webp";

    const { data, error } = await supabaseClient.functions.invoke(
        "extract-standard-reference-features",
        {
            body: {
                image_base64: imageBase64,
                image_mime_type: imageMimeType
            }
        }
    );

    if (error) {
        console.error("特徴抽出Function Error:", error);
        throw new Error(error.message || "特徴抽出Functionの呼び出しに失敗しました。");
    }

    if (!data || data.ok !== true) {
        console.error("特徴抽出API Error:", data);
        throw new Error(data?.error || "特徴抽出に失敗しました。");
    }

    const updatedRef = {
        ...ref,
        extracted: true,
        extracting: false,
        extracted_at: new Date().toISOString(),
        features: data.extracted
    };

    localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(updatedRef));
    renderStandardReferenceCard();

    return updatedRef;
}

async function runStandardizeExtraction() {
    try {
        const raw = localStorage.getItem(STANDARD_REF_KEY);
        if (!raw) {
            alert("先にイラスト保管庫から基準化用の画像を選択してください。");
            return;
        }

        const ref = JSON.parse(raw);
        ref.extracting = true;
        ref.extracted = false;
        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();

        const statusBox = document.getElementById("standardStatus");
        if (statusBox) {
            const loadingText = document.createElement("div");
            loadingText.id = "standardLoadingText";
            loadingText.style = "font-size:11px; color:#6a0dad; margin-top:8px; font-weight:bold;";
            loadingText.innerText = "プロンプトデータを読み込んでいます...";
            statusBox.appendChild(loadingText);
        }

        await extractStandardReferenceFeatures();

        alert("基準化が完了しました。");
    } catch (err) {
        console.error("基準化エラー:", err);

        const raw = localStorage.getItem(STANDARD_REF_KEY);
        if (raw) {
            try {
                const ref = JSON.parse(raw);
                ref.extracting = false;
                ref.extracted = false;
                ref.extraction_error = err instanceof Error ? err.message : String(err);
                localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
                renderStandardReferenceCard();
            } catch {}
        }

        alert("基準化に失敗しました。プロンプトデータの読み込みで問題が発生しています。");
    }
}

async function saveStandardReference(asset) {
    try {
        const type = document.getElementById("templateType")?.value || "character";

        if (!asset.file_url) {
            alert("基準化画像のURLが見つかりません。");
            return;
        }

        // 画像本体を取得して、IndexedDBに current 1件だけ保存する
        const blob = await fetchImageAsBlob(asset.file_url);
        await saveStandardReferenceImageBlob(blob);

        // 保存直後に読み戻して、抽出用Blobが本当に残っているか確認
        const cachedBlob = await getStandardReferenceImageBlob();

        if (!cachedBlob || cachedBlob.size === 0) {
            throw new Error("基準化画像Blobの保存確認に失敗しました。");
        }

        const ref = {
            type,
            asset_id: asset.id || null,
            title: asset.file_name || "無題",
            image_url: asset.file_url,
            extracted: false,
            extracting: false,
            blob_cached: true,
            saved_at: new Date().toISOString()
        };

        localStorage.setItem(STANDARD_REF_KEY, JSON.stringify(ref));
        renderStandardReferenceCard();

        alert("基準化用のイラストを選択しました。\n続けて「基準化」ボタンを押すと、プロンプトデータを読み込みます。");
    } catch (err) {
        console.error("基準化画像の保存エラー:", err);
        alert("基準化画像の保存に失敗しました。画像の取得または一時保存で問題が発生しています。");
    }
}

async function clearStandardReference() {
    if (!confirm("現在の基準化イラストを解除しますか？")) return;

    try {
        await clearStandardReferenceImageBlob();
        localStorage.removeItem(STANDARD_REF_KEY);
        renderStandardReferenceCard();
    } catch (err) {
        console.error("基準化画像の解除エラー:", err);
        alert("基準化画像の解除中に問題が発生しました。");
    }
}

function renderStandardReferenceCard() {

    if (!box) return;

    if (!raw) {
        box.innerHTML = `
            <div style="font-size:10px; color:#999; margin-top:8px;">
                現在の基準化：未設定
            </div>
        `;
        return;
    }

    let ref = null;
    try {
        ref = JSON.parse(raw);
    } catch {
        localStorage.removeItem(STANDARD_REF_KEY);
        renderStandardReferenceCard();
        return;
    }

    const typeLabel =
        ref.type === "scenery" ? "風景" :

// 3. 描画・ページ操作系
function refreshPages() {
    pages = [];
    for (let i = 0; i < masterText.length; i += 100) {
        pages.push(masterText.substring(i, i + 100));
    }
}

function renderPage() {
    const textHalf = document.getElementById("textHalf");
    const illustHalf = document.getElementById("illustHalf");
    const counter = document.getElementById("pageCounter");
    textHalf.innerText = pages[currentPage] || "";
    if (pageAssets[currentPage]) {

    } else {
        illustHalf.innerHTML = `<span style="color:#aaa; font-size:12px;">NO IMAGE</span>`;
    }
    counter.innerText = `${currentPage + 1} / ${pages.length}`;
}

function handleTextEdit() {
    pages[currentPage] = document.getElementById("textHalf").innerText;
    masterText = pages.join("");
    document.getElementById("pageCounter").innerText = `${currentPage + 1} / ${pages.length}`;
    isEdited = true; // ✨ 追加：文字を編集したら「未保存」にする
}

function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage >= 0 && newPage < pages.length) {
        currentPage = newPage;
        renderPage();
    }
}

// 4. 画像生成ロジック（重複を削除し、ローディングと優先順位を実装）
async function generateImage(type) {
    const charSelect = document.getElementById("charSelect");
    const charId = charSelect.value;
    const urlParams = new URLSearchParams(window.location.search);
    const loadingOverlay = document.getElementById("loadingOverlay");

    // --- プレミアムの場合 ---
    if (type === 'premium') {
        if (charId === "text") {
            alert("プレミアム生成にはキャラクターを選択してください。");
            return;
        }
        location.href = `premium_generate.html?char_id=${charId}&novel_id=${novelData.id}&page=${currentPage}&cIdx=${urlParams.get('cIdx')}&eIdx=${urlParams.get('eIdx')}`;
        return;
    }

    // --- スタンダードの場合 ---
    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data: profile } = await supabaseClient.from('profiles').select('np_balance').eq('id', user.id).single();

        if (!profile || profile.np_balance < 10) {
            alert("NP残高が不足しています（必要: 10 NP）。");
            return;
        }

        if (!confirm("スタンダード生成を実行しますか？ (費用: 10 NP / モノクロ固定)")) return;

        // 🌟 画面をロックしてローディング表示
        if (loadingOverlay) loadingOverlay.style.display = "flex";

        // 決済処理
        await supabaseClient.from('profiles').update({ np_balance: profile.np_balance - 10 }).eq('id', user.id);
        document.getElementById("myNp").innerText = profile.np_balance - 10;

        // 🌟 ここから差し替え 🌟
        // プロンプト作成と送信データの構築
        let requestPayload = {};
        const novelTags = novelData.tag || "";

        if (charId !== "text") {
            // 【キャラクターモード】
            const charData = novelData.characters.find(c => c.id === charId);
            const dynamicContent = charData ? charData.detail : "";
            const finalPrompt = `(monochrome:1.3), (black and white:1.2), grayscale, sketch, ink drawing, ${novelTags}, ${dynamicContent}, masterpiece, high quality`;
            
            requestPayload = {
                mode: "character",
                prompt: finalPrompt
            };
        } else {
            // 【本文（風景）モード】
            const basePrompt = `(masterpiece, best quality:1.2), (monochrome, grayscale, line art, ink drawing:1.4), scenery, landscape, background only, empty place, ${novelTags}, `;
            
            requestPayload = {
                mode: "scenery",
                base_prompt: basePrompt,
                raw_text: pages[currentPage] // 抽出元のテキスト
            };
        }

        requestPayload.debug = true;

        // サーバー通信：全年齢用の関数（Leonardo）を直接叩く
        const response = await fetch(`${SUPABASE_URL}/functions/v1/generate-nft-image-safe`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${SUPABASE_KEY}` 
            },
            body: JSON.stringify(requestPayload) // 修正：プロンプトだけでなくPayload全体を送る
        });
        // 🌟 ここまで差し替え 🌟

        if (!response.ok) throw new Error("サーバー通信エラー");

        const data = await response.json();
        const imageUrl = data.imageUrl;

        if (imageUrl) {
            pageAssets[currentPage] = imageUrl;
            isEdited = true; // ✨ 追加：画像を生成した時も「未保存」状態にする！
            renderPage();
            if (loadingOverlay) loadingOverlay.style.display = "none"; // ロック解除
            alert("スタンダード生成が完了しました！内容を保存してください。");
        } else {
            throw new Error("画像URLの取得に失敗しました");
        }

    } catch (err) {
        console.error("Standard Generation Error:", err);
        if (loadingOverlay) loadingOverlay.style.display = "none"; // エラー時もロック解除
        alert("エラー: " + err.message);
    }
}

// 5. 保存ロジック（エピソードごとに分離 ＆ ミント済み保護機能付き）
async function saveNftDraft() {
    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) throw new Error("ログインセッションが見つかりません。");

        // ★修正ポイント：現在の小説を書いた「作家のID」を取得する
        const currentAuthorId = localStorage.getItem("authorId") || novelData.author_id;

        const urlParams = new URLSearchParams(window.location.search);
        const cIdx = urlParams.get('cIdx');
        const eIdx = urlParams.get('eIdx');
        
        // 【重要】エピソードごとに固有のキーを作成
        const episodeKey = `draft_${cIdx}_${eIdx}`;

        // 🌟 修正1：複数あるデータの中から「一番最新のデータ」を取得する
        const { data: existingData } = await supabaseClient
            .from('nft_metadata')
            .select('id, nft_content, minted_at')
            .eq('novel_id', novelData.id)
            .is('minted_at', null) // 👈 ★ここにも追加！
            .order('created_at', { ascending: false }) // 日付が新しい順
            .limit(1)
            .maybeSingle();

        let currentContent = existingData ? existingData.nft_content : {};
        if (!currentContent) currentContent = {};
        if (!currentContent.episodes) currentContent.episodes = {};

        // このエピソード専用のデータを作成
        const episodeData = {
            full_text: masterText,
            pages: pages,
            assets: pageAssets,
            last_edited: new Date()
        };

        // 全体のデータの中に、このエピソードのデータを格納
        currentContent.episodes[episodeKey] = episodeData;

        // 🌟 修正2：upsert をやめて、ミント状況に応じた安全な保存を行う
        if (existingData && existingData.id) {
            if (existingData.minted_at) {
                // ▼ 最新データが「すでにミント済みの作品」だった場合
                const { error } = await supabaseClient.from('nft_metadata').insert({
                    novel_id: novelData.id,
                    author_id: currentAuthorId, // 👈 修正：user.id から変更！
                    owner_id: user.id,  
                    nft_content: currentContent,
                    title_at_mint: novelData.title,
                    minted_at: null // 👈 ミント前（下書き）の証拠として null を入れる
                });
                if (error) throw error;
            } else {
                // ▼ 最新データが「まだミントされていない下書き」だった場合
                const { error } = await supabaseClient.from('nft_metadata')
                    .update({ 
                        nft_content: currentContent,
                        title_at_mint: novelData.title 
                    })
                    .eq('id', existingData.id);
                if (error) throw error;
            }
        } else {
            // ▼ まだ一度も保存・ミントされていない場合（完全新規）
            const { error } = await supabaseClient.from('nft_metadata').insert({
                novel_id: novelData.id,
                author_id: currentAuthorId, // 👈 修正：user.id から変更！
                owner_id: user.id,  
                nft_content: currentContent,
                title_at_mint: novelData.title,
                minted_at: null // 下書きなので null
            });
            if (error) throw error;
        }

        alert("編集内容を保存しました。");
        isEdited = false; // 保存が完了したら「保存済み」に戻す

    } catch (err) {
        console.error("Save Error:", err);
        alert("保存失敗: " + (err.message || JSON.stringify(err)));
    }
}

// 🌟 プレミアム生成からの帰還時：最新データを同期して画面に反映する
// ==========================================
window.addEventListener('load', async () => {
    const params = new URLSearchParams(window.location.search);
    
    // プレミアム生成から戻った時、またはURLに novel_id がある場合に実行
    if (params.has('page') && typeof supabaseClient !== 'undefined') {
        console.log("💎 プレミアム生成からの帰還を検知。最新データを同期します...");
        
        try {
            // 現在の novelId を取得（変数名が novel_id の場合はそれに合わせる）
            const targetId = typeof novelId !== 'undefined' ? novelId : params.get('novel_id');

            const { data: novel, error } = await supabaseClient
                .from('novels')
                .select('content')
                .eq('id', targetId)
                .single();

            if (!error && novel && novel.content) {
                // URLから現在のチャプターとエピソード番号を取得
                const c = parseInt(params.get('cIdx') || "0");
                const e = parseInt(params.get('eIdx') || "0");
                
                // 🌟 重要：DBの構造から pageAssets を抽出
                const dbAssets = novel.content[c]?.episodes[e]?.pageAssets || [];
                
                console.log("📦 DBから取得した画像リスト:", dbAssets);

                // 🌟 ここがポイント：nft_prepare.html 内で画像リストを保持している
                // 全く同じ変数名（おそらく pageAssets）に代入する
                if (typeof pageAssets !== 'undefined') {
                    pageAssets = dbAssets;
                }

                // 🌟 画面の再描画（現在表示中のページを更新）
                if (typeof renderPage === 'function') {
                    renderPage(); 
                } else if (typeof showPage === 'function') {
                    showPage(parseInt(params.get('page'))); // 関数名が showPage の場合
                }
                
                console.log("✅ 画面への反映が完了しました。");
            }
        } catch (err) {
            console.error("同期失敗:", err);
        }
    }
});
