<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<title>作家ページ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: #f5f5f5;
}

/* メニュー */
.menu {
  background: #333;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 20px;
}

.menu a {
  color: white;
  margin-right: 20px;
  text-decoration: none;
}

/* 戻るリンク（外に出す） */
.back-link {
  width: 800px;
  margin: 20px auto 0;
  font-size: 14px;
}

.back-link a {
  text-decoration: none;
  color: #333;
}

/* メイン中央 */
.container {
  width: 800px;
  margin: 20px auto;
  background: #fff;
  padding: 30px;
}

/* タイトル */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* 新規作成 */
.create {
  text-align: center;
  margin-bottom: 20px;
}

.create a {
  display: inline-block;
  padding: 8px 16px;
  border: 1px solid #999;
  text-decoration: none;
  color: #333;
}

/* リスト */
.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 15px 0;
  border-bottom: 1px solid #ddd;
}

/* タイトル */
.work-title {
  font-size: 16px;
}

/* 編集ボタン */
.edit-btn {
  padding: 6px 12px;
  border: 1px solid #999;
  background: #fff;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px; /* ボタン同士の間隔 */
}

.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.page-title {
  text-align: center;
  margin-bottom: 40px;
}

.label {
  display: block;
  font-size: 14px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.author-badge {
  display: inline-block;
  font-size: 28px;
  background: linear-gradient(135deg, #6e8efb, #a7a7af);
  color: white;
  padding: 5px 25px;
  border-radius: 50px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.review-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}

.review-modal {
  width: min(700px, 92vw);
  max-height: 80vh;
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.review-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  border-bottom: 1px solid #eee;
  padding-bottom: 10px;
}

.review-modal-header h2 {
  font-size: 18px;
  margin: 0;
}

.review-close-btn {
  border: none;
  background: #eee;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.review-scroll-area {
  max-height: 55vh;
  overflow-y: auto;
  padding-right: 6px;
}

.review-item {
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  background: #fafafa;
}

.review-meta {
  font-size: 12px;
  color: #777;
  margin-bottom: 6px;
}

.review-text {
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  margin-bottom: 8px;
}

.review-reactions {
  display: flex;
  gap: 8px;
  font-size: 13px;
  color: #555;
}

.review-unread {
  border-left: 4px solid #00897b;
}

/* ===== 作家管理：作品一覧を2行表示にする ===== */
#workList .work-item {
  display: flex !important;
  flex-direction: column !important;
  align-items: stretch !important;
  gap: 10px;
  padding: 16px 12px !important;
}

#workList .work-item > div:first-child {
  width: 100%;
  line-height: 1.7;
  font-size: 15px;
}

#workList .work-item > div:first-child strong {
  font-size: 16px;
}

#workList .actions {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

#workList .actions button {
  margin-right: 0 !important;
  padding: 8px 12px !important;
  border-radius: 6px !important;
  font-size: 13px;
  min-height: 36px;
}

/* スマホではボタンをさらに押しやすくする */
@media (max-width: 760px) {
  .menu {
    height: auto;
    min-height: 56px;
    padding: 8px 10px;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .menu a {
    margin-right: 0;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.12);
  }

  .back-link,
  .container {
    width: calc(100% - 24px);
  }

  .container {
    margin: 14px auto;
    padding: 20px 14px;
    border-radius: 12px;
  }

  .page-title {
    margin-bottom: 24px;
  }

  .author-badge {
    font-size: 22px;
    padding: 6px 18px;
  }

  #workList .actions button {
    flex: 1 1 calc(50% - 8px);
  }

  #workList .actions button[disabled] {
    flex-basis: 100%;
  }
}

</style>
</head>

<body>

<div class="menu">
  <a href="index.html">トップ</a>
  <a href="works.html">本棚</a>
</div>

<div class="back-link">
  ← <a href="../portal/account.html">アカウント管理へもどる</a>
</div>
<div class="container">  <!-- ★これ追加 -->
<h1 class="page-title">
  <span class="label">作家名：</span>
  <span id="displayAuthorName" class="author-badge">読み込み中...</span>
</h1>

  <!-- 新規作成 -->
  <div class="create">
    <button onclick="createNewWork()">＋ 新規作成</button>
  </div>

  <!-- 作品一覧 -->
  <div id="workList"></div>

</div> <!-- ★ここで閉じる -->
<div id="reviewModalOverlay" class="review-modal-overlay">
  <div class="review-modal">
    <div class="review-modal-header">
      <h2 id="reviewModalTitle">投げ銭レビュー</h2>
      <button class="review-close-btn" onclick="closeReviewModal()">閉じる</button>
    </div>

    <p style="font-size:12px; color:#777; line-height:1.6; margin-bottom:10px;">
  作品に届いた投げ銭レビューを確認できます。未読レビューは確認後に既読へ変更できます。
</p>

    <div id="reviewListArea" class="review-scroll-area">
      <p style="color:#999; font-size:13px;">レビューを読み込みます。</p>
    </div>
  </div>
</div>

<script src="../portal/auth-check.js"></script>
<script>
// --- 1. 初期設定 ---
// window.supabaseClient は auth-check.js から引き継ぎ
const authorId = localStorage.getItem("authorId");
let novels = [];
let currentUser = null;

// --- 2. データの取得 ---
async function fetchNovels() {
  const authorId = localStorage.getItem("authorId");
  
  // IDがない場合は、不正なリクエストを投げる前にマイページへ戻す
  if (!authorId || authorId === "null") {
    console.warn("authorIdが見つかりません。account.htmlに戻ります。");
    location.href = "../portal/account.html"; 
    return;
  }
  
  try {
    // window.supabaseClient を使用
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    
    if (!user) {
      location.href = "../portal/login.html";
      return;
    }
    currentUser = user;

    // 作家名取得
    const { data: author, error: authorError } = await window.supabaseClient
      .from('authors')
      .select('*')
      .eq('id', authorId)
      .single();

    if (authorError) throw authorError;
    document.getElementById("displayAuthorName").innerText = author?.author_name || "不明な作家";

    // 作品取得
// NNFT用コピー作品は作家管理画面には表示しない。
// 元の一般小説だけを管理対象として表示する。
const { data, error: novelError } = await window.supabaseClient
  .from('novels')
  .select('*')
  .eq('author_id', authorId)
  .or('is_nft.is.null,is_nft.eq.false')
  .order('created_at', { ascending: false });

    if (novelError) throw novelError;

    const novelList = data || [];
    const novelIds = novelList.map(n => n.id);

    let tipCountsByNovelId = {};

    if (novelIds.length > 0) {
      const { data: tipRows, error: tipError } = await window.supabaseClient
        .from('novel_tip_reviews')
        .select('novel_id, is_read')
        .eq('author_user_id', user.id)
        .in('novel_id', novelIds);

      if (tipError) {
        console.error("投げ銭レビュー件数取得失敗:", tipError);
      } else {
        (tipRows || []).forEach(row => {
          if (!tipCountsByNovelId[row.novel_id]) {
            tipCountsByNovelId[row.novel_id] = {
              unread: 0,
              read: 0
            };
          }

          if (row.is_read) {
            tipCountsByNovelId[row.novel_id].read += 1;
          } else {
            tipCountsByNovelId[row.novel_id].unread += 1;
          }
        });
      }
    }

    novels = novelList.map(novel => ({
      ...novel,
      tip_counts: tipCountsByNovelId[novel.id] || {
        unread: 0,
        read: 0
      }
    }));

    displayNovels(novels); 

  } catch (err) {
    console.error("データ取得失敗:", err);
  }
}

// --- 3. 作品リストを表示 ---
function displayNovels(novels) {
  const area = document.getElementById("workList"); 
  if (!area) return;
  area.innerHTML = "";

  if (!novels || novels.length === 0) {
    area.innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>作品がありません</p>";
    return;
  }

  novels.forEach((w) => {
    const isPublished = w.published === true;
    let statusNotice = "";
    let statusText = isPublished ? "【投稿済み】" : "【未投稿】";
    let rowStyle = "display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;";

    if (w.review_status === 'suspended') {
      statusText = "<span style='color:#d32f2f;'>【🚫規約違反による停止】</span>";
      rowStyle += "background: #fff0f0;";
      statusNotice = `<div style="font-size: 11px; color: #d32f2f; margin-bottom: 5px; font-weight: bold;">※この作品は規約違反のため運営により公開停止されています。</div>`;
    } else if (w.review_status === 'reported') {
      statusText = "<span style='color:#f57f17;'>【⚠️内容精査中】</span>";
    }

    const tipUnread = w.tip_counts?.unread || 0;
    const tipRead = w.tip_counts?.read || 0;
    const hasTipReviews = (tipUnread + tipRead) > 0;

    const div = document.createElement("div");
    div.className = "work-item";
    div.style = rowStyle;
    
    div.innerHTML = `
      <div style="flex: 1;">
        ${statusNotice}
        <span>${statusText} <strong>${w.title}</strong></span>
      </div>
      <div class="actions">
        <button onclick="editWork('${w.id}')" style="margin-right:5px;">編集</button>

        <button onclick="togglePublish('${w.id}', ${isPublished})" 
                ${w.review_status === 'suspended' ? 'disabled' : ''}
                style="margin-right:5px; background: ${isPublished ? '#666' : '#6a0dad'}; color:white; border:none; padding:5px 10px; border-radius:3px; cursor: ${w.review_status === 'suspended' ? 'not-allowed' : 'pointer'}; opacity: ${w.review_status === 'suspended' ? '0.5' : '1'};">
          ${isPublished ? '投稿停止' : '投稿'}
        </button>

        <button
          onclick="openNovelTipReviews('${w.id}')"
          ${hasTipReviews ? '' : 'disabled'}
          style="margin-right:5px; background:${hasTipReviews ? '#00897b' : '#ddd'}; color:${hasTipReviews ? 'white' : '#888'}; border:none; padding:5px 10px; border-radius:3px; cursor:${hasTipReviews ? 'pointer' : 'not-allowed'};"
        >
          レビュー 未読${tipUnread} / 既読${tipRead}
        </button>

        ${!isPublished ? `<button onclick="deleteWork('${w.id}')" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">削除</button>` : ''}
      </div>
    `;
    area.appendChild(div);
  });
}

function closeReviewModal() {
  const overlay = document.getElementById("reviewModalOverlay");
  if (overlay) {
    overlay.style.display = "none";
  }
}

async function openNovelTipReviews(novelId) {
  const overlay = document.getElementById("reviewModalOverlay");
  const titleEl = document.getElementById("reviewModalTitle");
  const listArea = document.getElementById("reviewListArea");

  if (!overlay || !titleEl || !listArea) {
    alert("レビュー表示エリアが見つかりません。");
    return;
  }

  const novel = novels.find(n => n.id === novelId);
  const novelTitle = novel?.title || "作品";

  titleEl.innerText = `投げ銭レビュー：${novelTitle}`;
  listArea.innerHTML = `<p style="color:#999; font-size:13px;">レビューを読み込み中...</p>`;
  overlay.style.display = "flex";

  try {
    const { data: { user } } = await window.supabaseClient.auth.getUser();

    if (!user) {
      listArea.innerHTML = `<p style="color:#999; font-size:13px;">ログイン情報を確認できませんでした。</p>`;
      return;
    }

    const { data: reviews, error: reviewError } = await window.supabaseClient
      .from("novel_tip_reviews")
      .select("id, review_text, amount_np, author_receive_np, is_read, created_at, author_user_id")
      .eq("novel_id", novelId);

    if (reviewError) throw reviewError;

    if (!reviews || reviews.length === 0) {
      listArea.innerHTML = `<p style="color:#999; font-size:13px;">まだ投げ銭レビューはありません。</p>`;
      return;
    }

    const reviewIds = reviews.map(r => r.id);

    const { data: reactions, error: reactionError } = await window.supabaseClient
      .from("novel_tip_review_reactions")
      .select("review_id, reaction_type")
      .in("review_id", reviewIds);

    if (reactionError) {
      console.error("レビュー評価取得失敗:", reactionError);
    }

    const reactionCountsByReviewId = {};

    (reactions || []).forEach(row => {
      if (!reactionCountsByReviewId[row.review_id]) {
        reactionCountsByReviewId[row.review_id] = {
          heart: 0,
          thinking: 0,
          shocked: 0,
          total: 0
        };
      }

      if (row.reaction_type === "heart") {
        reactionCountsByReviewId[row.review_id].heart += 1;
      } else if (row.reaction_type === "thinking") {
        reactionCountsByReviewId[row.review_id].thinking += 1;
      } else if (row.reaction_type === "shocked") {
        reactionCountsByReviewId[row.review_id].shocked += 1;
      }

      reactionCountsByReviewId[row.review_id].total += 1;
    });

    const sortedReviews = reviews
      .map(review => ({
        ...review,
        reactions: reactionCountsByReviewId[review.id] || {
          heart: 0,
          thinking: 0,
          shocked: 0,
          total: 0
        }
      }))
      .sort((a, b) => {
        if (b.reactions.total !== a.reactions.total) {
          return b.reactions.total - a.reactions.total;
        }
        return new Date(b.created_at).getTime() - new Date(a.created_at).getTime();
      });

    listArea.innerHTML = sortedReviews.map(review => {
      const dateText = review.created_at
        ? new Date(review.created_at).toLocaleString("ja-JP")
        : "";

      const unreadClass = review.is_read ? "" : " review-unread";

      return `
        <div class="review-item${unreadClass}">
          <div class="review-meta">
            ${review.is_read ? "既読" : "未読"} / ${dateText} / 投げ銭 ${review.amount_np}NP
          </div>
          <div class="review-text">${escapeHtml(review.review_text || "")}</div>
          <div class="review-reactions">
            <span>❤️ ${review.reactions.heart}</span>
            <span>🤔 ${review.reactions.thinking}</span>
            <span>😨 ${review.reactions.shocked}</span>
          </div>
        </div>
      `;
    }).join("");

    // 作者本人が開いた場合、未読レビューを既読化する
    const unreadReviews = sortedReviews.filter(review =>
      review.author_user_id === user.id && review.is_read === false
    );

    for (const review of unreadReviews) {
      const { error: markError } = await window.supabaseClient.rpc(
        "mark_novel_tip_review_read",
        {
          p_review_id: review.id
        }
      );

      if (markError) {
        console.error("レビュー既読化失敗:", markError);
      }
    }

    if (unreadReviews.length > 0) {
      await fetchNovels();
    }

  } catch (err) {
    console.error("レビュー一覧取得エラー:", err);
    listArea.innerHTML = `
      <p style="color:#d32f2f; font-size:13px;">
        レビューの読み込みに失敗しました。
      </p>
    `;
  }
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// --- 4. 投稿状態の切り替え（報酬ロジック維持版） ---
async function togglePublish(id, currentPublishedStatus) {
  const action = currentPublishedStatus ? "本棚から下げて「下書き」に戻しますか？" : "この作品を「本棚」に公開しますか？";
  if (!confirm(action)) return;

  try {
    const newStatus = !currentPublishedStatus; 

    const { error } = await window.supabaseClient
      .from('novels')
      .update({ published: newStatus })
      .eq('id', id);

    if (error) throw error;

        let publishMessage = currentPublishedStatus
      ? "下書きに戻しました。"
      : "本棚に投稿しました！";

    if (newStatus === true) {
      const { data: rewardData, error: rewardError } = await window.supabaseClient.rpc('check_and_grant_reward', { 
        target_novel_id: id 
      });

      if (rewardError) {
        console.error("報酬チェック失敗:", rewardError.message);
        publishMessage += "\n\n※報酬判定でエラーが発生しました: " + rewardError.message;
      } else if (rewardData) {
        if (rewardData.status === 'success') {
          publishMessage += `\n\n【投稿報酬候補】\n公開中の本文が条件を満たしたため、${rewardData.new_grants} NVT分の報酬候補を作成しました。\n\n報酬は72時間後に確定します。確定前に対象の話を非公開にすると、候補は取り消されます。`;
        } else if (rewardData.status === 'cancelled_pending') {
          publishMessage += `\n\n【投稿報酬】\n公開条件を下回ったため、未確定の報酬候補を取り消しました。`;
        } else if (rewardData.status === 'no_reward_derivative') {
          publishMessage += `\n\n【投稿報酬】\n二次創作として登録されているため、NVT報酬の対象外です。`;
        } else if (rewardData.status === 'no_change') {
          publishMessage += `\n\n【投稿報酬】\n現在、新しく発生する報酬候補はありません。`;
        } else if (rewardData.status === 'not_found') {
          publishMessage += `\n\n【投稿報酬】\n報酬判定対象の作品が見つかりませんでした。`;
        }
      }
    }

    alert(publishMessage);
    await fetchNovels(); 
    if (typeof renderRightPanel === 'function') renderRightPanel();

  } catch (err) {
    console.error("更新エラー:", err);
    alert("状態の更新に失敗しました: " + err.message);
  }
}

// --- 5. 作品の削除 ---
async function deleteWork(id) {
  if (!confirm("この作品を完全に削除しますか？\n未確定の報酬データもすべて消去されます。")) return;

  try {
    // 依存データの掃除も window.supabaseClient を使用
    await window.supabaseClient.from('rewards_pending').delete().eq('novel_id', id);
    await window.supabaseClient.from('reports').delete().eq('novel_id', id);
    await window.supabaseClient.from('messages').delete().eq('novel_id', id);

    const { error: mainError } = await window.supabaseClient
      .from('novels')
      .delete()
      .eq('id', id);

    if (mainError) throw mainError;

    alert("作品を完全に削除しました。");
    await fetchNovels();
    if (typeof renderRightPanel === 'function') renderRightPanel();

  } catch (err) {
    console.error("削除エラー:", err);
    alert(`削除に失敗しました。\n理由: ${err.message}`);
  }
}

// --- 6. 画面遷移と作成 ---
function editWork(id) {
  localStorage.setItem("editNovelId", id);
  location.href = "novel_profile.html";
}

async function createNewWork() {
  const authorId = localStorage.getItem("authorId");
  const { data: { user } } = await window.supabaseClient.auth.getUser();

  if (!authorId || !user) {
    alert("作家情報が不足しています。");
    return;
  }

  const { data, error } = await window.supabaseClient
    .from('novels')
    .insert([{
      user_id: user.id,
      author_id: authorId,
      title: "無題の作品",
      content: []
    }])
    .select()
    .single();

  if (error) {
    alert("作品の作成に失敗しました: " + error.message);
    return;
  }

  localStorage.setItem("editNovelId", data.id);
  location.href = "novel_profile.html";
}

// --- 7. 初期化処理 ---
async function checkAccountStatus() {
  const { data: { user } } = await window.supabaseClient.auth.getUser();
  if (user) {
    const { data: profile } = await window.supabaseClient
      .from('profiles')
      .select('is_frozen')
      .eq('id', user.id)
      .single();

    if (profile && profile.is_frozen) {
      window.location.replace('../portal/penalty.html');
      return true;
    }
  }
  return false;
}

async function initPage() {
  const isFrozen = await checkAccountStatus();
  if (isFrozen) return;

  await fetchNovels();
  if (typeof renderRightPanel === 'function') renderRightPanel();
}

initPage();
</script>
