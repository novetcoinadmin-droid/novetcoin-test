<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<title>作家ページ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: #f5f5f5;
}

/* メニュー */
.menu {
  background: #333;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 20px;
}

.menu a {
  color: white;
  margin-right: 20px;
  text-decoration: none;
}

/* 戻るリンク（外に出す） */
.back-link {
  width: 800px;
  margin: 20px auto 0;
  font-size: 14px;
}

.back-link a {
  text-decoration: none;
  color: #333;
}

/* メイン中央 */
.container {
  width: 800px;
  margin: 20px auto;
  background: #fff;
  padding: 30px;
}

/* タイトル */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* 新規作成 */
.create {
  text-align: center;
  margin-bottom: 20px;
}

.create a {
  display: inline-block;
  padding: 8px 16px;
  border: 1px solid #999;
  text-decoration: none;
  color: #333;
}

/* リスト */
.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 15px 0;
  border-bottom: 1px solid #ddd;
}

/* タイトル */
.work-title {
  font-size: 16px;
}

/* 編集ボタン */
.edit-btn {
  padding: 6px 12px;
  border: 1px solid #999;
  background: #fff;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px; /* ボタン同士の間隔 */
}

.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.page-title {
  text-align: center;
  margin-bottom: 40px;
}

.label {
  display: block;
  font-size: 14px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.author-badge {
  display: inline-block;
  font-size: 28px;
  background: linear-gradient(135deg, #6e8efb, #a7a7af);
  color: white;
  padding: 5px 25px;
  border-radius: 50px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="menu">
  <a href="index.html">トップ</a>
  <a href="works.html">本棚</a>
</div>

<div class="back-link">
  ← <a href="../portal/account.html">アカウント管理へもどる</a>
</div>
<div class="container">  <!-- ★これ追加 -->
<h1 class="page-title">
  <span class="label">作家名：</span>
  <span id="displayAuthorName" class="author-badge">読み込み中...</span>
</h1>

  <!-- 新規作成 -->
  <div class="create">
    <button onclick="createNewWork()">＋ 新規作成</button>
  </div>

  <!-- 作品一覧 -->
  <div id="workList"></div>

</div> <!-- ★ここで閉じる -->

<script src="auth-check.js"></script>
<script>
// --- 1. 初期設定 ---
// window.supabaseClient は auth-check.js から引き継ぎ
const authorId = localStorage.getItem("authorId");
let novels = [];
let currentUser = null;

// --- 2. データの取得 ---
async function fetchNovels() {
  const authorId = localStorage.getItem("authorId");
  
  // IDがない場合は、不正なリクエストを投げる前にマイページへ戻す
  if (!authorId || authorId === "null") {
    console.warn("authorIdが見つかりません。account.htmlに戻ります。");
    location.href = "../portal/account.html"; 
    return;
  }
  
  try {
    // window.supabaseClient を使用
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    
    if (!user) {
      location.href = "../portal/login.html";
      return;
    }
    currentUser = user;

    // 作家名取得
    const { data: author, error: authorError } = await window.supabaseClient
      .from('authors')
      .select('*')
      .eq('id', authorId)
      .single();

    if (authorError) throw authorError;
    document.getElementById("displayAuthorName").innerText = author?.author_name || "不明な作家";

    // 作品取得
    const { data, error: novelError } = await window.supabaseClient
      .from('novels')
      .select('*')
      .eq('author_id', authorId)
      .order('created_at', { ascending: false });

    if (novelError) throw novelError;

    const novelList = data || [];
    const novelIds = novelList.map(n => n.id);

    let tipCountsByNovelId = {};

    if (novelIds.length > 0) {
      const { data: tipRows, error: tipError } = await window.supabaseClient
        .from('novel_tip_reviews')
        .select('novel_id, is_read')
        .eq('author_user_id', user.id)
        .in('novel_id', novelIds);

      if (tipError) {
        console.error("投げ銭レビュー件数取得失敗:", tipError);
      } else {
        (tipRows || []).forEach(row => {
          if (!tipCountsByNovelId[row.novel_id]) {
            tipCountsByNovelId[row.novel_id] = {
              unread: 0,
              read: 0
            };
          }

          if (row.is_read) {
            tipCountsByNovelId[row.novel_id].read += 1;
          } else {
            tipCountsByNovelId[row.novel_id].unread += 1;
          }
        });
      }
    }

    novels = novelList.map(novel => ({
      ...novel,
      tip_counts: tipCountsByNovelId[novel.id] || {
        unread: 0,
        read: 0
      }
    }));

    displayNovels(novels); 

  } catch (err) {
    console.error("データ取得失敗:", err);
  }
}

// --- 3. 作品リストを表示 ---
function displayNovels(novels) {
  const area = document.getElementById("workList"); 
  if (!area) return;
  area.innerHTML = "";

  if (!novels || novels.length === 0) {
    area.innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>作品がありません</p>";
    return;
  }

  novels.forEach((w) => {
    const isPublished = w.published === true;
    let statusNotice = "";
    let statusText = isPublished ? "【投稿済み】" : "【未投稿】";
    let rowStyle = "display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;";

    if (w.review_status === 'suspended') {
      statusText = "<span style='color:#d32f2f;'>【🚫規約違反による停止】</span>";
      rowStyle += "background: #fff0f0;";
      statusNotice = `<div style="font-size: 11px; color: #d32f2f; margin-bottom: 5px; font-weight: bold;">※この作品は規約違反のため運営により公開停止されています。</div>`;
    } else if (w.review_status === 'reported') {
      statusText = "<span style='color:#f57f17;'>【⚠️内容精査中】</span>";
    }

    const tipUnread = w.tip_counts?.unread || 0;
    const tipRead = w.tip_counts?.read || 0;
    const hasTipReviews = (tipUnread + tipRead) > 0;

    const div = document.createElement("div");
    div.className = "work-item";
    div.style = rowStyle;
    
    div.innerHTML = `
      <div style="flex: 1;">
        ${statusNotice}
        <span>${statusText} <strong>${w.title}</strong></span>
      </div>
      <div class="actions">
        <button onclick="editWork('${w.id}')" style="margin-right:5px;">編集</button>

        <button onclick="togglePublish('${w.id}', ${isPublished})" 
                ${w.review_status === 'suspended' ? 'disabled' : ''}
                style="margin-right:5px; background: ${isPublished ? '#666' : '#6a0dad'}; color:white; border:none; padding:5px 10px; border-radius:3px; cursor: ${w.review_status === 'suspended' ? 'not-allowed' : 'pointer'}; opacity: ${w.review_status === 'suspended' ? '0.5' : '1'};">
          ${isPublished ? '投稿停止' : '投稿'}
        </button>

        <button
          onclick="alert('レビュー一覧は次の手順で接続します。')"
          ${hasTipReviews ? '' : 'disabled'}
          style="margin-right:5px; background:${hasTipReviews ? '#00897b' : '#ddd'}; color:${hasTipReviews ? 'white' : '#888'}; border:none; padding:5px 10px; border-radius:3px; cursor:${hasTipReviews ? 'pointer' : 'not-allowed'};"
        >
          レビュー 未読${tipUnread} / 既読${tipRead}
        </button>

        ${!isPublished ? `<button onclick="deleteWork('${w.id}')" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">削除</button>` : ''}
      </div>
    `;
    area.appendChild(div);
  });
}

// --- 4. 投稿状態の切り替え（報酬ロジック維持版） ---
async function togglePublish(id, currentPublishedStatus) {
  const action = currentPublishedStatus ? "本棚から下げて「下書き」に戻しますか？" : "この作品を「本棚」に公開しますか？";
  if (!confirm(action)) return;

  try {
    const newStatus = !currentPublishedStatus; 

    const { error } = await window.supabaseClient
      .from('novels')
      .update({ published: newStatus })
      .eq('id', id);

    if (error) throw error;

        let publishMessage = currentPublishedStatus
      ? "下書きに戻しました。"
      : "本棚に投稿しました！";

    if (newStatus === true) {
      const { data: rewardData, error: rewardError } = await window.supabaseClient.rpc('check_and_grant_reward', { 
        target_novel_id: id 
      });

      if (rewardError) {
        console.error("報酬チェック失敗:", rewardError.message);
        publishMessage += "\n\n※報酬判定でエラーが発生しました: " + rewardError.message;
      } else if (rewardData) {
        if (rewardData.status === 'success') {
          publishMessage += `\n\n【投稿報酬候補】\n公開中の本文が条件を満たしたため、${rewardData.new_grants} NVT分の報酬候補を作成しました。\n\n報酬は72時間後に確定します。確定前に対象の話を非公開にすると、候補は取り消されます。`;
        } else if (rewardData.status === 'cancelled_pending') {
          publishMessage += `\n\n【投稿報酬】\n公開条件を下回ったため、未確定の報酬候補を取り消しました。`;
        } else if (rewardData.status === 'no_reward_derivative') {
          publishMessage += `\n\n【投稿報酬】\n二次創作として登録されているため、NVT報酬の対象外です。`;
        } else if (rewardData.status === 'no_change') {
          publishMessage += `\n\n【投稿報酬】\n現在、新しく発生する報酬候補はありません。`;
        } else if (rewardData.status === 'not_found') {
          publishMessage += `\n\n【投稿報酬】\n報酬判定対象の作品が見つかりませんでした。`;
        }
      }
    }

    alert(publishMessage);
    await fetchNovels(); 
    if (typeof renderRightPanel === 'function') renderRightPanel();

  } catch (err) {
    console.error("更新エラー:", err);
    alert("状態の更新に失敗しました: " + err.message);
  }
}

// --- 5. 作品の削除 ---
async function deleteWork(id) {
  if (!confirm("この作品を完全に削除しますか？\n未確定の報酬データもすべて消去されます。")) return;

  try {
    // 依存データの掃除も window.supabaseClient を使用
    await window.supabaseClient.from('rewards_pending').delete().eq('novel_id', id);
    await window.supabaseClient.from('reports').delete().eq('novel_id', id);
    await window.supabaseClient.from('messages').delete().eq('novel_id', id);

    const { error: mainError } = await window.supabaseClient
      .from('novels')
      .delete()
      .eq('id', id);

    if (mainError) throw mainError;

    alert("作品を完全に削除しました。");
    await fetchNovels();
    if (typeof renderRightPanel === 'function') renderRightPanel();

  } catch (err) {
    console.error("削除エラー:", err);
    alert(`削除に失敗しました。\n理由: ${err.message}`);
  }
}

// --- 6. 画面遷移と作成 ---
function editWork(id) {
  localStorage.setItem("editNovelId", id);
  location.href = "novel_profile.html";
}

async function createNewWork() {
  const authorId = localStorage.getItem("authorId");
  const { data: { user } } = await window.supabaseClient.auth.getUser();

  if (!authorId || !user) {
    alert("作家情報が不足しています。");
    return;
  }

  const { data, error } = await window.supabaseClient
    .from('novels')
    .insert([{
      user_id: user.id,
      author_id: authorId,
      title: "無題の作品",
      content: []
    }])
    .select()
    .single();

  if (error) {
    alert("作品の作成に失敗しました: " + error.message);
    return;
  }

  localStorage.setItem("editNovelId", data.id);
  location.href = "novel_profile.html";
}

// --- 7. 初期化処理 ---
async function checkAccountStatus() {
  const { data: { user } } = await window.supabaseClient.auth.getUser();
  if (user) {
    const { data: profile } = await window.supabaseClient
      .from('profiles')
      .select('is_frozen')
      .eq('id', user.id)
      .single();

    if (profile && profile.is_frozen) {
      window.location.replace('penalty.html');
      return true;
    }
  }
  return false;
}

async function initPage() {
  const isFrozen = await checkAccountStatus();
  if (isFrozen) return;

  await fetchNovels();
  if (typeof renderRightPanel === 'function') renderRightPanel();
}

initPage();
</script>

</body>
</html>
