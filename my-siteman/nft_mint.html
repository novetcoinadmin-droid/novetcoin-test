<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Minting Studio | Novet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .work-card { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; border-radius: 10px; transition: 0.2s; background: #fff; }
        .work-card:hover { border-color: #6a0dad; background: #fdfbff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .meta-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .nav-link { text-decoration: none; color: #666; padding: 5px 0; transition: 0.2s; }
        .nav-link:hover { color: #6a0dad; }
        .nav-active { color: #6a0dad !important; font-weight: bold; border-bottom: 2px solid #6a0dad; }
    </style>
<style>body { background: #2c2e33 !important; }</style></head>
<body>
<nav style="background: #fff; border-bottom: 1px solid #eee; padding: 10px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000;">
  <div style="font-weight: bold; color: #6a0dad; display: flex; align-items: center; gap: 8px; font-size: 20px;">
    💎 Novet NFT Studio
  </div>
  <div style="display: flex; gap: 30px;">
    <a href="nft_mint.html" class="nav-link nav-active">作成トップ</a>
    <a href="market.html" class="nav-link">マーケット</a>
    <a href="library.html" class="nav-link">ライブラリ</a>
    <a href="assets.html" class="nav-link">イラスト保管庫</a>
    <a href="purchased.html" class="nav-link">購入済み一覧</a>
  </div>
  <div><a href="index.html" style="font-size: 13px; color: #999; text-decoration: none;">← 一般サイトへ</a></div>
</nav>

<div id="mainStudioArea" style="display: none;">
    <div style="display: flex; max-width: 1200px; margin: 30px auto; padding: 0 20px; gap: 40px; align-items: flex-start;">
      
      <div style="flex: 1;">
        <div style="background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f0f0f0;">
          <h2 style="font-size: 1.3rem; border-left: 5px solid #6a0dad; padding-left: 15px; margin: 0 0 10px 0;">1. NFT化する作品を選択</h2>
          <p style="font-size: 12px; color: #888; margin-bottom: 20px;">※4,000文字以上のオリジナル作品のみ表示されます。</p>
          <div id="eligibleList">読み込み中...</div>

          <div id="previewArea" style="display: none; margin-top: 40px; border-top: 2px dashed #eee; padding-top: 30px;">
            <h2 style="font-size: 1.4rem; border-left: 5px solid #e0115f; padding-left: 15px; margin-bottom: 20px;">2. メタデータ確認</h2>
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px;">
              <tr><td style="padding: 12px; border-bottom: 1px solid #f0f0f0; font-weight: bold; width: 150px;">タイトル</td><td id="metaTitle" style="padding: 12px; border-bottom: 1px solid #f0f0f0;"></td></tr>
              <tr><td style="padding: 12px; border-bottom: 1px solid #f0f0f0; font-weight: bold;">タグ</td><td id="metaTags" style="padding: 12px; border-bottom: 1px solid #f0f0f0;"></td></tr>
              <tr><td style="padding: 12px; border-bottom: 1px solid #f0f0f0; font-weight: bold;">文字数</td><td id="metaChars" style="padding: 12px; border-bottom: 1px solid #f0f0f0;"></td></tr>
            </table>
            <div style="background-color: #fff5f5; border: 1px solid #feb2b2; padding: 20px; border-radius: 12px; color: #c53030; font-size: 14px;">
              <strong>【警告】</strong> 刻印後は主要なメタデータが固定されます。修正にはシステム手数料が発生します。
            </div>
            <button onclick="startMinting()" style="width: 100%; background: linear-gradient(135deg, #6a0dad 0%, #e0115f 100%); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer;">
              この内容でNFTを鋳造(Mint)する
            </button>
          </div>
        </div>
      </div>

      <div style="width: 280px; position: sticky; top: 100px;">
        <div id="userStatusArea"></div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #999; padding: 15px; background: #fff; border-radius: 12px; border: 1px solid #eee;">
          <p style="margin: 0 0 10px 0;"><strong>エコシステム情報</strong></p>
          <div style="display: flex; justify-content: space-between;"><span>現在レート:</span><span>1 NVT = 150 NP</span></div>
        </div>
      </div>
    </div>
</div>

<script src="auth-check.js"></script>
<script>
// Supabase設定は auth-check.js で window.supabaseClient として共通読み込み済み

// --- 🌟 ② ページ読み込み時の初期化（未ログイン時は弾く） ---
async function init() {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    
    if (session && session.user) {
        // ログイン中ならメイン画面を表示
        document.getElementById("mainStudioArea").style.display = "block";
        
        renderUserStatus(session.user);
        loadEligibleWorks(session.user);
    } else {
        // 未ログインの場合は警告を出して一般サイトのトップへ戻す
        alert("ログインが必要です。");
        window.location.href = "index.html";
    }
}

// --- プロフィール情報を取得して描画する関数 ---
async function renderUserStatus(user) {
    const statusArea = document.getElementById("userStatusArea");
    if (!statusArea) return;

    const { data: profile, error } = await window.supabaseClient
        .from('profiles')
        .select('username, nvt_balance, np_balance')
        .eq('id', user.id)
        .single();

    if (error) {
        console.error("プロフィール取得エラー:", error);
    }

    statusArea.innerHTML = `
        <div style="background: #fff; border: 2px solid #6a0dad; padding: 20px; border-radius: 16px; font-size: 14px; box-shadow: 0 4px 12px rgba(106, 13, 173, 0.08);">
            <h3 style="border-bottom: 2px solid #6a0dad; padding-bottom: 5px; margin-bottom: 15px;">マイステータス</h3>
            <p style="font-size:13px; margin-bottom:10px;"><b>👤 アカウント：</b><br>${profile?.username || "名無し"}</p>
            
            <a href="../portal/wallet.html" style="text-decoration: none; color: inherit; display: block;">
                <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #eee; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='#f9f9f9'">
                    <p style="font-size:11px; color:#666; margin-bottom:5px;">保有資産 <span style="color:#6a0dad; font-weight:bold;">(クリックでウォレットへ)</span></p>
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span style="font-size:13px; font-weight:bold; color:#6a0dad;">💎 NVT (報酬)</span>
                        <span style="font-size:13px; font-weight:bold;">${(profile?.nvt_balance || 0).toLocaleString()}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-size:13px; font-weight:bold; color:#ff8c00;">💰 NP (ポイント)</span>
                        <span style="font-size:13px; font-weight:bold;">${(profile?.np_balance || 0).toLocaleString()}</span>
                    </div>
                </div>
            </a>
            <div style="font-size:12px; color:#444; border-top:1px solid #eee; padding-top:10px;">
                <div style="border-top: 1px solid #f0f0f0; padding-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="../portal/account.html" style="text-align: center; text-decoration: none; font-size: 12px; color: #6a0dad; padding: 8px; border: 1px solid #6a0dad; border-radius: 8px; font-weight: bold;">
                        ← アカウント管理へ戻る
                    </a>
                    <button onclick="handleLogout()" style="width: 100%; font-size: 11px; cursor: pointer; border: none; background: #f5f5f5; color: #999; padding: 8px; border-radius: 8px;">
                        ログアウト
                    </button>
                </div>
            </div>
        </div>
    `;
}

// --- 🌟 ① NFT化対象の作品一覧を読み込む（全年齢属性のみに絞り込み） ---
async function loadEligibleWorks(user) {
    const list = document.getElementById("eligibleList");
    list.innerHTML = "読み込み中...";

    // 1. ユーザーの作家IDを取得（★ここで 'main' ゾーンの作家だけに絞り込む）
    const { data: myAuthors } = await window.supabaseClient
        .from('authors')
        .select('id')
        .eq('user_id', user.id)
        .eq('zone', 'mens'); 

    if (!myAuthors || myAuthors.length === 0) {
        list.innerHTML = "<p style='color:#666;'>全年齢向けの作家・作品がありません。</p>";
        return;
    }
    const authorIds = myAuthors.map(a => a.id);

    // 2. 絞り込んだ作家IDに紐づく作品一覧を取得
    const { data: novels, error } = await window.supabaseClient
        .from('novels')
        .select('*')
        .in('author_id', authorIds)
        .order('created_at', { ascending: false });

    if (error) {
        list.innerHTML = "<p>エラーが発生しました。</p>";
        return;
    }

    list.innerHTML = ""; // クリア

    if (novels.length === 0) {
        list.innerHTML = "<p style='color:#666;'>まだ作品がありません。</p>";
        return;
    }

    for (const n of novels) {
        const card = document.createElement("div");
        card.className = "work-card";
        card.style.border = "2px solid #eee";
        card.style.padding = "20px";
        
        // 4,000文字チェック
        const isReadyForMint = (n.char_count >= 4000);
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong style="font-size: 1.1rem;">${n.title}</strong><br>
                    <small style="color:#666;">${n.char_count.toLocaleString()} 文字 / ${n.tag || "タグなし"}</small>
                </div>
                <div>
                    ${isReadyForMint ? 
                        `<button onclick="event.stopPropagation(); goToPayment('${n.id}')" style="background: linear-gradient(135deg, #6a0dad, #e0115f); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">NFT発行・支払いへ</button>` 
                        : `<small style="color:#999;">あと ${4000 - (n.char_count || 0)}文字で発行可能</small>`
                    }
                </div>
            </div>
            
            <div id="tree-${n.id}" style="margin-top:15px; display:none; background:#f9f9f9; border-radius:8px; padding:10px;">
                <p style="font-size:11px; color:#999; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">エピソードを選択して編集・挿絵作成</p>
                <div id="ep-list-${n.id}"></div>
            </div>
            <div style="text-align:center; margin-top:10px;">
                <small style="color:#6a0dad; cursor:pointer;">▼ エピソード一覧を開く</small>
            </div>
        `;

        // カードクリックでツリー展開
        card.onclick = () => {
            const tree = document.getElementById(`tree-${n.id}`);
            const isHidden = tree.style.display === "none";
            tree.style.display = isHidden ? "block" : "none";
            if (isHidden) renderEpisodeTree(n.id, n.content);
        };

        list.appendChild(card);
    }
}

// エピソードツリーを生成する関数
function renderEpisodeTree(novelId, content) {
    const container = document.getElementById(`ep-list-${novelId}`);
    container.innerHTML = "";

    if (!content || !Array.isArray(content)) {
        container.innerHTML = "<p style='font-size:12px;'>エピソードがありません。</p>";
        return;
    }

    content.forEach((chapter, cIdx) => {
        const chapDiv = document.createElement("div");
        chapDiv.innerHTML = `<div style="font-size:12px; font-weight:bold; color:#444; margin-top:10px;">${chapter.title || '章題なし'}</div>`;
        
        if (chapter.episodes) {
            chapter.episodes.forEach((ep, eIdx) => {
                const epLink = document.createElement("div");
                epLink.style = "display:flex; justify-content:space-between; padding:8px 5px; border-bottom:1px solid #eee; font-size:13px; align-items:center;";
                epLink.innerHTML = `
                    <span style="color:#333;">・${ep.title}</span>
                    <button onclick="event.stopPropagation(); location.href='nft_prepare.html?novel_id=${novelId}&cIdx=${cIdx}&eIdx=${eIdx}'" 
                            style="background:#fff; border:1px solid #6a0dad; color:#6a0dad; padding:3px 10px; border-radius:4px; font-size:11px; cursor:pointer;">
                        編集・挿絵
                    </button>
                `;
                chapDiv.appendChild(epLink);
            });
        }
        container.appendChild(chapDiv);
    });
}

// エピソード詳細ページへ飛ばさず、最新の編集状態を考慮して確認画面へ飛ばす
function goToPayment(novelId) {
    window.location.href = `nft_confirm.html?novel_id=${novelId}&cIdx=0&eIdx=0&page=0`;
}

// 実行開始
init();

// ※③ イラストアップロード機能（handleAssetUpload）は削除しました。
</script>
</body>
</html>
