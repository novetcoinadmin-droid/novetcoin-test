async function loadEligibleWorks(user) {
    const list = document.getElementById("eligibleList");
    list.innerHTML = "読み込み中...";

    // 1. ユーザーの作家IDを取得
    const { data: myAuthors } = await supabaseClient.from('authors').select('id').eq('user_id', user.id).eq('zone', 'mens');
    if (!myAuthors || myAuthors.length === 0) {
        list.innerHTML = "<p>作家登録が必要です。</p>";
        return;
    }
    const authorIds = myAuthors.map(a => a.id);

    // 2. 自分の作品一覧を取得
    const { data: novels, error } = await supabaseClient
        .from('novels')
        .select('*')
        .in('author_id', authorIds)
        .order('created_at', { ascending: false });

    if (error) {
        list.innerHTML = "<p>エラーが発生しました。</p>";
        return;
    }

    list.innerHTML = ""; // クリア

    for (const n of novels) {
        // すでにNFTデータ（下書きや発行済み）があるか確認
        const { data: nftMeta } = await supabaseClient
            .from('nft_metadata')
            .select('id, is_listing')
            .eq('novel_id', n.id)
            .maybeSingle(); // データがなくてもエラーにならず、nullを返してくれる

        const card = document.createElement("div");
        card.className = "work-card";
        card.style.border = "2px solid #eee";
        card.style.padding = "20px";
        
        // 4,000文字チェック
        const isReadyForMint = (n.char_count >= 4000);
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong style="font-size: 1.1rem;">${n.title}</strong><br>
                    <small style="color:#666;">${n.char_count.toLocaleString()} 文字 / ${n.tag}</small>
                </div>
                <div>
                    ${isReadyForMint ? 
                        `<button onclick="event.stopPropagation(); goToPayment('${n.id}')" style="background: linear-gradient(135deg, #6a0dad, #e0115f); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">NFT発行・支払いへ</button>` 
                        : `<small style="color:#999;">あと ${4000 - n.char_count}文字で発行可能</small>`
                    }
                </div>
            </div>
            
            <div id="tree-${n.id}" style="margin-top:15px; display:none; background:#f9f9f9; border-radius:8px; padding:10px;">
                <p style="font-size:11px; color:#999; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">エピソードを選択して編集・挿絵作成</p>
                <div id="ep-list-${n.id}"></div>
            </div>
            <div style="text-align:center; margin-top:10px;">
                <small style="color:#6a0dad; cursor:pointer;">▼ エピソード一覧を開く</small>
            </div>
        `;

        // カードクリックでツリー展開
        card.onclick = () => {
            const tree = document.getElementById(`tree-${n.id}`);
            const isHidden = tree.style.display === "none";
            tree.style.display = isHidden ? "block" : "none";
            if (isHidden) renderEpisodeTree(n.id, n.content);
        };

        list.appendChild(card);
    }
}

// エピソードツリーを生成する関数
function renderEpisodeTree(novelId, content) {
    const container = document.getElementById(`ep-list-${novelId}`);
    container.innerHTML = "";

    if (!content || !Array.isArray(content)) {
        container.innerHTML = "<p style='font-size:12px;'>エピソードがありません。</p>";
        return;
    }

    content.forEach((chapter, cIdx) => {
        const chapDiv = document.createElement("div");
        chapDiv.innerHTML = `<div style="font-size:12px; font-weight:bold; color:#444; margin-top:10px;">${chapter.title || '章題なし'}</div>`;
        
        if (chapter.episodes) {
            chapter.episodes.forEach((ep, eIdx) => {
                const epLink = document.createElement("div");
                epLink.style = "display:flex; justify-content:space-between; padding:8px 5px; border-bottom:1px solid #eee; font-size:13px; align-items:center;";
                epLink.innerHTML = `
                    <span style="color:#333;">・${ep.title}</span>
                    <button onclick="event.stopPropagation(); location.href='nft_prepare.html?novel_id=${novelId}&cIdx=${cIdx}&eIdx=${eIdx}'" 
                            style="background:#fff; border:1px solid #6a0dad; color:#6a0dad; padding:3px 10px; border-radius:4px; font-size:11px; cursor:pointer;">
                        編集・挿絵
                    </button>
                `;
                chapDiv.appendChild(epLink);
            });
        }
        container.appendChild(chapDiv);
    });
}

// 🌟 素材ボックス（WebP変換＆Storage保存）システム

// 画像アップロード処理（複数枚対応）
async function handleAssetUpload(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return;

    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return alert("ログインセッションが切れました。");

    const btn = document.getElementById('uploadAssetBtn');
    btn.innerText = "⏳ 変換＆アップロード中...";
    btn.disabled = true;

    try {
        // 選ばれたファイルを1枚ずつ順番に処理する
        for (let i = 0; i < files.length; i++) {
            let file = files[i];
            
            // 1. 画像をブラウザ上で読み込む
            const img = new Image();
            const objectUrl = URL.createObjectURL(file);
            await new Promise((resolve, reject) => {
                img.onload = resolve; img.onerror = reject; img.src = objectUrl;
            });

            // 2. Canvasを使ってWebPに変換
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            
            const webpBlob = await new Promise(resolve => {
                canvas.toBlob(resolve, "image/webp", 0.8); // 80%の画質で圧縮
            });

            // 3. Storageに保存
            // novelId が取得できている前提（nft_mint.htmlのグローバル変数を使用）
            const fileName = `asset_${novelId}_${Date.now()}_${i}.webp`;
            
            const { error: uploadErr } = await supabaseClient.storage
                .from('illustrations')
                .upload(fileName, webpBlob, { contentType: 'image/webp' });

            if (uploadErr) throw uploadErr;

            // 4. URLを取得
            const { data: publicUrlData } = supabaseClient.storage
                .from('illustrations')
                .getPublicUrl(fileName);
            const finalUrl = publicUrlData.publicUrl;

            // 5. 🌟 先ほど作った user_assets テーブルに記録！
            await supabaseClient.from('user_assets').insert({
                user_id: user.id,
                novel_id: novelId,
                file_url: finalUrl
            });
        }

        // 全部の処理が終わったら、ギャラリーを最新状態に更新する
        await fetchUserAssets();

    } catch (err) {
        console.error("Asset Upload Error:", err);
        alert("一部の画像のアップロードに失敗しました: " + err.message);
    } finally {
        btn.innerText = "＋ 挿絵・素材を追加する（複数選択OK）";
        btn.disabled = false;
        event.target.value = ""; // リセット
    }
}
