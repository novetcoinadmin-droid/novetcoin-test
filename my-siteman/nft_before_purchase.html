<script src="auth-check.js"></script>
<script type="module">
// Supabase設定は auth-check.js で共通読み込み済み

import {
  createDynamicClient,
  getWalletAccounts,
  isSignedIn,
  waitForClientInitialized,
  switchActiveNetwork,
} from "https://esm.sh/@dynamic-labs-sdk/client";

import {
  createWaasWalletAccounts,
  getChainsMissingWaasWalletAccounts,
} from "https://esm.sh/@dynamic-labs-sdk/client/waas";

import {
  addEvmExtension,
  isEvmWalletAccount,
} from "https://esm.sh/@dynamic-labs-sdk/evm";

import {
  createWalletClientForWalletAccount,
} from "https://esm.sh/@dynamic-labs-sdk/evm/viem";

import {
  createPublicClient,
  encodeFunctionData,
  erc20Abi,
  formatUnits,
  http,
  parseUnits,
} from "https://esm.sh/viem";

import { polygon } from "https://esm.sh/viem/chains";

const supabaseClient = window.supabaseClient;

const DYNAMIC_ENVIRONMENT_ID = "29eddb8f-3de5-4dd0-be48-ec5a7d811a92";
const NVT_CONTRACT_ADDRESS = "0x2bcabf131ab1d3620914f17b576bd3d6fa76812e";
const POLYGON_RPC_URL = "https://polygon.publicnode.com";
const NVT_TO_NP_RATE = 150;
const PLATFORM_FEE_RATE = 0.05;
const MIN_NNFT_PRICE_NVT = 5;

let currentProfile = null;
let currentWalletAddress = "";
let dynamicWalletAccount = null;

const publicClient = createPublicClient({
  chain: polygon,
  transport: http(POLYGON_RPC_URL),
});

createDynamicClient({
  environmentId: DYNAMIC_ENVIRONMENT_ID,
  metadata: {
    name: "ノベットコイン.com",
    universalLink: window.location.origin,
  },
  transformers: {
    networkData: (network) => {
      if (String(network.networkId) === "137") {
        return {
          ...network,
          rpcUrls: {
            ...(network.rpcUrls || {}),
            http: [POLYGON_RPC_URL],
          },
        };
      }

      return network;
    },
  },
});

addEvmExtension();

async function prepareDynamicWalletAccount() {
  await waitForClientInitialized();

  if (!isSignedIn()) {
    throw new Error("Dynamicにログインしていません。ログインし直してください。");
  }

  const missingChains = getChainsMissingWaasWalletAccounts();

  if (missingChains.length > 0) {
    await createWaasWalletAccounts({ chains: missingChains });
  }

  const walletAccounts = getWalletAccounts();

  const evmWalletAccount =
    walletAccounts.find((account) => isEvmWalletAccount(account)) ||
    walletAccounts[0] ||
    null;

  if (!evmWalletAccount) {
    throw new Error("Dynamicウォレットアカウントが見つかりません。");
  }

  dynamicWalletAccount = evmWalletAccount;

  await switchActiveNetwork({
    walletAccount: dynamicWalletAccount,
    networkId: "137",
  });

  console.log("Dynamic wallet ready:", {
    address: dynamicWalletAccount.address,
    activeNetwork: "137",
  });

  return dynamicWalletAccount;
}

async function sendNvtFromDynamicWallet({ toAddress, amountNvt }) {
  if (!dynamicWalletAccount) {
    await prepareDynamicWalletAccount();
  }

  if (!isEvmWalletAccount(dynamicWalletAccount)) {
    throw new Error("DynamicウォレットがEVMウォレットではありません。");
  }

  const walletClient = await createWalletClientForWalletAccount({
    walletAccount: dynamicWalletAccount,
  });

  const amountRaw = parseUnits(String(amountNvt), 18);

  const data = encodeFunctionData({
    abi: erc20Abi,
    functionName: "transfer",
    args: [toAddress, amountRaw],
  });

  const txHash = await walletClient.sendTransaction({
    to: NVT_CONTRACT_ADDRESS,
    data,
    value: 0n,
    chain: polygon,
  });

  return txHash;
}

async function fetchOnchainNvtBalance(walletAddress) {
  if (!walletAddress) return 0;

  const balanceRaw = await publicClient.readContract({
    address: NVT_CONTRACT_ADDRESS,
    abi: erc20Abi,
    functionName: "balanceOf",
    args: [walletAddress],
  });

  return Number(formatUnits(balanceRaw, 18));
}

let currentUser = null;
let targetNft = null;
let hasPurchasedAccess = false;
let existingOwnReview = false;

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const nftId = urlParams.get('id');

    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user;

    if (!nftId) {
        alert("作品が見つかりません");
        window.location.href = "market.html";
        return;
    }

    // 作品データの取得
    const { data: nft, error } = await supabaseClient
        .from('nft_metadata')
        .select('*')
        .eq('id', nftId)
        .single();

    if (error || !nft) return alert("作品データの取得に失敗しました");
    targetNft = nft;

    // 🌟 追加：作者（クリエイター）のプロフィール（名前）を取得
    let creatorName = "名無し作家";
    if (targetNft.owner_id) {
        const { data: authorProfile } = await supabaseClient
            .from('profiles')
            .select('username')
            .eq('id', targetNft.owner_id)
            .single();
        if (authorProfile && authorProfile.username) {
            creatorName = authorProfile.username;
        }
    }

    // 残高の取得：NVTはDBではなくDynamicウォレットのオンチェーン残高を見る
let myNvt = 0;

if (currentUser) {
    const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("wallet_address, dynamic_wallet_address, np_balance")
        .eq("id", currentUser.id)
        .single();

    if (profileError) {
        console.error(profileError);
    }

    currentProfile = profile || null;
    currentWalletAddress =
        currentProfile?.dynamic_wallet_address ||
        currentProfile?.wallet_address ||
        "";

    if (currentWalletAddress) {
        try {
            myNvt = await fetchOnchainNvtBalance(currentWalletAddress);
        } catch (err) {
            console.error("NVTオンチェーン残高取得エラー:", err);
            myNvt = 0;
        }
    }
}

    // 🌟 creatorName も一緒に画面描画へ渡す
    renderDetails(myNvt, creatorName);
await checkIfPurchased();
await loadReviews();
}

function getImageUrlFromAsset(asset) {
    if (!asset) return "";

    if (typeof asset === "string") {
        return asset;
    }

    if (typeof asset !== "object") {
        return "";
    }

    return (
        asset.image_url ||
        asset.imageUrl ||
        asset.file_url ||
        asset.url ||
        asset.cover_image ||
        asset.cover_image_url ||
        ""
    );
}

function countNftImagesAndRemoved(content) {
    let visibleCount = 0;
    let removedCount = 0;

    function inspectAsset(asset) {
        if (!asset) return;

        if (typeof asset === "string") {
            if (asset.trim()) visibleCount++;
            return;
        }

        if (typeof asset !== "object") return;

        if (asset.mode === "double" || asset.left || asset.right) {
            inspectAsset(asset.left);
            inspectAsset(asset.right);
            return;
        }

        const hasKnownImageField =
            Object.prototype.hasOwnProperty.call(asset, "image_url") ||
            Object.prototype.hasOwnProperty.call(asset, "imageUrl") ||
            Object.prototype.hasOwnProperty.call(asset, "file_url") ||
            Object.prototype.hasOwnProperty.call(asset, "url") ||
            Object.prototype.hasOwnProperty.call(asset, "cover_image") ||
            Object.prototype.hasOwnProperty.call(asset, "cover_image_url");

        const imageUrl = getImageUrlFromAsset(asset);

        if (imageUrl) {
            visibleCount++;
        } else if (hasKnownImageField) {
            removedCount++;
        }
    }

    const rawContent = content || {};

    if (rawContent.cover_image || rawContent.cover_image_url || rawContent.image_url) {
        visibleCount++;
    }

    const directAssets = rawContent.assets || {};
    Object.values(directAssets).forEach(inspectAsset);

    const episodes = rawContent.episodes;

    if (Array.isArray(episodes)) {
        episodes.forEach((ep) => {
            Object.values(ep.assets || {}).forEach(inspectAsset);
        });
    } else if (episodes && typeof episodes === "object") {
        Object.values(episodes).forEach((ep) => {
            Object.values(ep.assets || {}).forEach(inspectAsset);
        });
    }

    return {
        visibleCount,
        removedCount
    };
}

function countNftTextCharacters(content) {
    let total = 0;

    function addPages(pages) {
        if (!Array.isArray(pages)) return;

        pages.forEach((page) => {
            total += String(page || "").replace(/\s/g, "").length;
        });
    }

    const rawContent = content || {};
    const episodes = rawContent.episodes;

    if (Array.isArray(episodes)) {
        episodes.forEach((ep) => addPages(ep.pages));
    } else if (episodes && typeof episodes === "object") {
        Object.values(episodes).forEach((ep) => addPages(ep.pages));
    } else {
        addPages(rawContent.pages);
    }

    return total;
}

// 🌟 creatorName を受け取るように修正
function renderDetails(myNvt, creatorName) {
    document.getElementById("nftTitle").innerText = targetNft.title_at_mint;
    document.getElementById("nftCover").src = targetNft.cover_image_url;
    document.getElementById("nftPrice").innerText = targetNft.price_nvt;
    const imageStats = countNftImagesAndRemoved(targetNft.nft_content || {});
const charCount = countNftTextCharacters(targetNft.nft_content || {});

document.getElementById("nftIllustCount").innerText =
    `${imageStats.visibleCount.toLocaleString()} 枚`;

document.getElementById("nftRemovedImageCount").innerText =
    `${imageStats.removedCount.toLocaleString()} 枚`;

document.getElementById("nftCharCount").innerText =
    `${charCount.toLocaleString()} 字`;

document.getElementById("nftDate").innerText =
    targetNft.created_at
        ? new Date(targetNft.created_at).toLocaleDateString()
        : "---";

    const creatorElement = document.getElementById("creatorName");
    if (creatorElement) {
        creatorElement.innerText = "@" + creatorName;
    }

    const priceNvt = Number(targetNft.price_nvt || 0);
    const platformFeeNp = Math.floor(priceNvt * NVT_TO_NP_RATE * PLATFORM_FEE_RATE);
    const myNp = Number(currentProfile?.np_balance || 0);

    if (document.getElementById("myNvt")) {
        document.getElementById("myNvt").innerText = myNvt.toLocaleString("ja-JP", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 6
        });
    }

    const btn = document.getElementById("buyButton");

    if (!currentUser) {
        btn.innerText = "ログインが必要です";
        btn.disabled = true;
    } else if (targetNft.owner_id === currentUser.id) {
        btn.innerText = "自分の作品です";
        btn.disabled = true;
    } else if (priceNvt < MIN_NNFT_PRICE_NVT) {
        btn.innerText = `販売価格は最低 ${MIN_NNFT_PRICE_NVT} NVT 以上です`;
        btn.disabled = true;
    } else if (myNvt < priceNvt) {
        btn.innerText = "NVT残高が足りません";
        btn.disabled = true;
    } else if (myNp < platformFeeNp) {
        btn.innerText = `NP手数料が足りません（必要 ${platformFeeNp} NP）`;
        btn.disabled = true;
    } else {
        btn.innerText = `この作品を購入する（手数料 ${platformFeeNp} NP）`;
        btn.disabled = false;
    }
}

// 🌟 新しく追加した関数（購入済みかチェックする）
async function checkIfPurchased() {
    if (!currentUser || !targetNft) return;

    // 自分の作品なら何もしない
    if (currentUser.id === targetNft.owner_id) return; 

    // nnft_access_rights から、自分の閲覧権を探す
const { data: logs, error } = await supabaseClient
    .from("nnft_access_rights")
    .select("id")
    .eq("user_id", currentUser.id)
    .eq("nft_metadata_id", targetNft.id);

    // 履歴が見つかった場合（すでに購入済み）
    if (logs && logs.length > 0) {
        const btn = document.getElementById("buyButton");
        hasPurchasedAccess = true;
        updateReviewFormVisibility();
        btn.innerText = "🎉 購入済み（本編を読む）";
        btn.style.background = "#4CAF50"; // 緑色に変更
        btn.style.color = "white";
        btn.disabled = false; // 残高不足などでdisabledになっていても解除する
        
        // クリック時の処理を「決済」から「閲覧」に上書きする
        btn.onclick = () => {
            alert("本編ビューワーへ移動します");
            window.location.href = `nft_view.html?id=${targetNft.id}`;
        };
    }
}

function escapeReviewHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function updateReviewCounter() {
    const textarea = document.getElementById("reviewText");
    const counter = document.getElementById("reviewCounter");

    if (!textarea || !counter) return;

    counter.innerText = `${textarea.value.length} / 200`;
}

function updateReviewFormVisibility() {
    const formArea = document.getElementById("reviewFormArea");
    if (!formArea) return;

    const canReview =
        !!currentUser &&
        !!targetNft &&
        hasPurchasedAccess === true &&
        existingOwnReview !== true &&
        currentUser.id !== targetNft.owner_id;

    formArea.style.display = canReview ? "block" : "none";
}

async function loadReviews() {
    const list = document.getElementById("reviewList");
    if (!list || !targetNft) return;

    const { data: reviews, error } = await supabaseClient
        .from("nnft_reviews")
        .select("reviewer_user_id, review_text, created_at")
        .eq("nft_metadata_id", targetNft.id)
        .order("created_at", { ascending: false })
        .limit(30);

    if (error) {
        console.error("レビュー取得エラー:", error);
        list.innerHTML = `
            <div class="review-empty">
                レビューの読み込みに失敗しました。
            </div>
        `;
        return;
    }

    existingOwnReview =
        !!currentUser &&
        Array.isArray(reviews) &&
        reviews.some((review) => review.reviewer_user_id === currentUser.id);

    if (!reviews || reviews.length === 0) {
        list.innerHTML = `
            <div class="review-empty">
                まだレビューはありません。<br>
                購入後に最初のレビューを投稿できます。
            </div>
        `;
        updateReviewFormVisibility();
        return;
    }

    const userIds = [...new Set(reviews.map((review) => review.reviewer_user_id).filter(Boolean))];

    let profileMap = {};

    if (userIds.length > 0) {
        const { data: profiles, error: profileError } = await supabaseClient
            .from("profiles")
            .select("id, username")
            .in("id", userIds);

        if (!profileError && profiles) {
            profileMap = Object.fromEntries(
                profiles.map((profile) => [profile.id, profile.username || "購入者"])
            );
        }
    }

    list.innerHTML = reviews.map((review) => {
        const reviewerName = profileMap[review.reviewer_user_id] || "購入者";
        const dateText = review.created_at
            ? new Date(review.created_at).toLocaleDateString()
            : "";

        return `
            <div class="review-card">
                <div class="review-card-header">
                    @${escapeReviewHtml(reviewerName)} ・ ${escapeReviewHtml(dateText)}
                </div>
                <div class="review-card-text">
                    ${escapeReviewHtml(review.review_text)}
                </div>
            </div>
        `;
    }).join("");

    updateReviewFormVisibility();
}

async function submitReview() {
    if (!currentUser || !targetNft) {
        alert("ログイン情報または作品情報を確認できませんでした。");
        return;
    }

    if (!hasPurchasedAccess) {
        alert("レビュー投稿は購入済みユーザーのみ可能です。");
        return;
    }

    if (existingOwnReview) {
        alert("この作品にはすでにレビュー済みです。");
        return;
    }

    const textarea = document.getElementById("reviewText");
    const btn = document.getElementById("submitReviewBtn");

    const reviewText = textarea ? textarea.value.trim() : "";

    if (reviewText.length < 10) {
        alert("レビューは10文字以上で入力してください。");
        return;
    }

    if (reviewText.length > 200) {
        alert("レビューは200文字以内で入力してください。");
        return;
    }

    if (btn) {
        btn.disabled = true;
        btn.innerText = "投稿中...";
    }

    try {
        const { error } = await supabaseClient
            .from("nnft_reviews")
            .insert({
                nft_metadata_id: targetNft.id,
                reviewer_user_id: currentUser.id,
                review_text: reviewText
            });

        if (error) {
            throw error;
        }

        alert("レビューを投稿しました。");

        if (textarea) {
            textarea.value = "";
        }

        updateReviewCounter();
        await loadReviews();

    } catch (err) {
        console.error("レビュー投稿エラー:", err);
        alert("レビュー投稿に失敗しました。すでにレビュー済みの可能性があります。");
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerText = "レビュー投稿";
        }
    }
}

window.submitReview = submitReview;
window.updateReviewCounter = updateReviewCounter;

async function processPurchase() {
    if (!currentUser || !targetNft) {
        alert("購入情報を読み込めていません。");
        return;
    }

    if (targetNft.owner_id === currentUser.id) {
        alert("自分の作品は購入できません。");
        return;
    }

    const priceNvt = Number(targetNft.price_nvt || 0);

    if (!Number.isFinite(priceNvt) || priceNvt < MIN_NNFT_PRICE_NVT) {
        alert(`NNFT作品価格は最低 ${MIN_NNFT_PRICE_NVT} NVT 以上が必要です。`);
        return;
    }

    const platformFeeNp = Math.floor(priceNvt * NVT_TO_NP_RATE * PLATFORM_FEE_RATE);

    const btn = document.getElementById("buyButton");

    try {
        btn.disabled = true;
        btn.innerText = "購入準備中...";

        // 1. 販売者Dynamicウォレットを取得
        const { data: sellerProfile, error: sellerError } = await supabaseClient
            .from("profiles")
            .select("wallet_address, dynamic_wallet_address")
            .eq("id", targetNft.owner_id)
            .single();

        if (sellerError || !sellerProfile) {
            throw new Error("販売者プロフィールの取得に失敗しました。");
        }

        const sellerWalletAddress =
            sellerProfile.dynamic_wallet_address ||
            sellerProfile.wallet_address ||
            "";

        if (!sellerWalletAddress) {
            throw new Error("販売者Dynamicウォレットが登録されていません。");
        }

        // 2. 購入者プロフィール・NP残高確認
        const { data: buyerProfile, error: buyerError } = await supabaseClient
            .from("profiles")
            .select("wallet_address, dynamic_wallet_address, np_balance")
            .eq("id", currentUser.id)
            .single();

        if (buyerError || !buyerProfile) {
            throw new Error("購入者プロフィールの取得に失敗しました。");
        }

        currentProfile = buyerProfile;
        currentWalletAddress =
            buyerProfile.dynamic_wallet_address ||
            buyerProfile.wallet_address ||
            "";

        if (!currentWalletAddress) {
            throw new Error("購入者Dynamicウォレットが登録されていません。");
        }

        const buyerNpBalance = Number(buyerProfile.np_balance || 0);

        if (buyerNpBalance < platformFeeNp) {
            throw new Error(`NP残高が不足しています。必要手数料: ${platformFeeNp} NP`);
        }

        // 3. オンチェーンNVT残高確認
        const onchainNvtBalance = await fetchOnchainNvtBalance(currentWalletAddress);

        if (onchainNvtBalance < priceNvt) {
            throw new Error(`NVT残高が不足しています。必要額: ${priceNvt} NVT`);
        }

        const ok = confirm(
            [
                `${targetNft.title_at_mint} を購入します。`,
                "",
                `作品価格: ${priceNvt} NVT`,
                `送金先: ${sellerWalletAddress}`,
                `運営手数料: ${platformFeeNp} NP`,
                "",
                "購入者Dynamicウォレットから作者DynamicウォレットへNVT送金します。",
                "実行しますか？"
            ].join("\n")
        );

        if (!ok) {
            btn.disabled = false;
            btn.innerText = "この作品を購入する";
            return;
        }

        // 4. 購入者Dynamicウォレット → 作者DynamicウォレットへNVT送金
        btn.innerText = "NVT送金中...";

        const txHash = await sendNvtFromDynamicWallet({
            toAddress: sellerWalletAddress,
            amountNvt: priceNvt
        });

        // 5. tx_hashを検証して購入ログ・閲覧権・NP手数料を反映
        btn.innerText = "購入記録を保存中...";

        const { data: confirmResult, error: confirmError } =
            await supabaseClient.functions.invoke("confirm-nnft-purchase", {
                body: {
                    nft_metadata_id: targetNft.id,
                    tx_hash: txHash
                }
            });

        if (confirmError) {
            throw confirmError;
        }

        if (!confirmResult?.success) {
            throw new Error(confirmResult?.error || "購入確認に失敗しました。");
        }

        alert(
            "購入が完了しました。\n" +
            "作品価格: " + confirmResult.price_nvt + " NVT\n" +
            "運営手数料: " + confirmResult.platform_fee_np + " NP\n" +
            "tx_hash: " + confirmResult.nvt_payment_tx_hash
        );

        window.location.href = `nft_view.html?id=${targetNft.id}`;
    } catch (err) {
        console.error("Purchase Error:", err);
        alert("購入に失敗しました: " + (err?.message || String(err)));

        btn.disabled = false;
        btn.innerText = "この作品を購入する";
    }
}

window.processPurchase = processPurchase;

init();
</script>
