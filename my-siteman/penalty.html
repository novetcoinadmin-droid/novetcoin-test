<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アカウント凍結解除・報酬返還 | Novet</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #fdf2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .penalty-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 480px; text-align: center; border-top: 8px solid #6a0dad; }
    h1 { color: #6a0dad; font-size: 22px; margin-bottom: 10px; }
    p { color: #666; font-size: 14px; line-height: 1.6; }
    .debt-box { background: #f8f0ff; padding: 20px; border-radius: 12px; margin: 25px 0; }
    .debt-label { font-size: 12px; color: #6a0dad; font-weight: bold; }
    .debt-amount { font-size: 32px; font-weight: bold; color: #333; margin: 5px 0; }
    
    .btn-pay { background: #6a0dad; color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 15px; transition: opacity 0.2s; }
    .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
    
    /* インポート（ガワ）ボタンのスタイル */
    .btn-import { background: white; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 13px; }
    
    .logout-link { display: block; margin-top: 20px; color: #999; text-decoration: underline; font-size: 12px; cursor: pointer; }
  </style>
<style>body { background: #2c2e33 !important; }</style></head>
<body>

<div class="penalty-card">
  <h1>報酬の返還と制限解除</h1>
  <p>規約違反判定に伴い、当該作品で得られた報酬の返還が必要です。<br>以下の額を返還することで、アカウントの全機能が再開されます。</p>
  
  <div class="debt-box">
    <div class="debt-label">必要返還額</div>
    <div class="debt-amount"><span id="displayDebt">0</span> <small style="font-size:14px;">NVT / NP</small></div>
    <div style="font-size:11px; color:#999; margin-top:5px;">(現在の保有残高: <span id="currentBalance">0</span>)</div>
  </div>

  <button id="payBtn" class="btn-pay" onclick="handleReturn()">報酬を返還して再開する</button>
  
  <button class="btn-import" onclick="alert('外部ウォレットからのインポート機能は現在準備中です。直接運営へお問い合わせください。')">
    📥 外部からNVTをインポートする
  </button>

  <span class="logout-link" onclick="forceLogout()">ログアウトしてトップへ戻る</span>
</div>

<script src="auth-check.js"></script>
<script>
// --- 1. Supabase設定 ---
// Supabase設定は auth-check.js で共通読み込み済み

let userProfile = null;

// --- 2. 初期化 ---
async function initPenalty() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) return window.location.replace("index.html");

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();

  if (!profile || !profile.is_frozen) {
    // 凍結されていなければトップへ
    window.location.replace("index.html");
    return;
  }

  userProfile = profile;
  const debt = profile.penalty_debt || 0;
  const balance = (profile.nvt_balance || 0) + (profile.np_balance || 0);
  const frozenAt = new Date(profile.frozen_at || new Date()); // 凍結開始日を取得

  // 1. 基本データの表示
  document.getElementById("displayDebt").innerText = debt.toLocaleString();
  document.getElementById("currentBalance").innerText = balance.toLocaleString();

  const btn = document.getElementById("payBtn");

  // 2. 判定ロジック
  if (debt > 0 && balance >= debt) {
    // 【パターンA】返還すべき資産があり、かつ残高が足りている場合
    btn.disabled = false;
    btn.innerText = "報酬を返還して再開する";
  } else {
    // 【パターンB】資産が0、または残高不足の場合（時間ロック）
    const waitDays = (profile.violation_count >= 2) ? 14 : 7; // 2回目以降は14日、初回は7日
    const unlockDate = new Date(frozenAt.getTime() + waitDays * 24 * 60 * 60 * 1000);
    const now = new Date();

    if (now < unlockDate) {
      // まだ待機期間中の場合
      btn.disabled = true;
      const diff = unlockDate - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      btn.innerText = `再開まであと ${days}日 ${hours}時間`;
    } else {
      // 待機期間が終了している場合
      btn.disabled = false;
      btn.innerText = "待機期間が終了しました。再開する";
    }
  }
} // ← ここで initPenalty 関数の終わりをしっかり閉じます

// --- 3. 返還処理 ---
async function handleReturn() {
  if (!confirm("報酬を返還し、アカウントを再開しますか？")) return;

  const debt = userProfile.penalty_debt;
  let newNvt = userProfile.nvt_balance || 0;
  let newNp = userProfile.np_balance || 0;

  // 返還ロジック: まずNVTから引き、足りない分をNPから引く
  let remainingDebt = debt;
  if (newNvt >= remainingDebt) {
    newNvt -= remainingDebt;
    remainingDebt = 0;
  } else {
    remainingDebt -= newNvt;
    newNvt = 0;
    newNp -= remainingDebt;
  }

  try {
    const { error } = await supabaseClient
      .from('profiles')
      .update({
        nvt_balance: newNvt,
        np_balance: newNp,
        is_frozen: false,
        penalty_debt: 0,
        violation_count: 0 // 返還をもってカウントをリセット
      })
      .eq('id', userProfile.id);

    if (error) throw error;

    alert("返還が完了しました。アカウント制限を解除します。");
    window.location.replace("account.html");
  } catch (err) {
    console.error(err);
    alert("処理に失敗しました。");
  }
}

async function forceLogout() {
  await supabaseClient.auth.signOut();
  window.location.replace("index.html");
}

initPenalty();
</script>
</body>
</html>
