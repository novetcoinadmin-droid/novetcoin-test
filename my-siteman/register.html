<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <title>アカウント登録 | ノベットコイン.com</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .gmail-wrap {
      display: flex;
      align-items: center;
    }

    .gmail-wrap input {
      flex: 1;
      border-radius: 5px 0 0 5px;
      border-right: none;
    }

    .gmail-fixed {
      padding: 10px;
      background: #eee;
      border: 1px solid #ccc;
      border-left: none;
      border-radius: 0 5px 5px 0;
    }

    .note {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      font-size: 16px;
      background-color: #6a0dad;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #5800a8;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 15px;
      color: #6a0dad;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px 10px;
      margin-top: 40px;
    }

    .footer a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-size: 14px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .footer .copy {
      margin-top: 10px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
<style>body { background: #2c2e33 !important; }</style></head>

<body>

<div class="container">
  <a href="index.html" class="back-link">← トップへ戻る</a>
  <h1>アカウント登録</h1>

  <form id="registerForm">

    <!-- ユーザー名 -->
    <label>アカウントネーム</label>
    <input type="text" id="username" placeholder="ユーザー名を入力">

    <!-- メール（Gmail固定） -->
    <label>メールアドレス</label>
    <div class="gmail-wrap">
      <input type="text" id="email" placeholder="example">
      <div class="gmail-fixed">@gmail.com</div>
    </div>

    <!-- パスワード -->
    <label>パスワード</label>
    <input type="password" id="password" placeholder="パスワード">

    <p class="note">
      サイト内ウォレット作成のため、Gmailアカウントのみとなっています。
    </p>

    <button type="submit">アカウント作成</button>

  </form>
</div>

<div class="footer">
  <div>
    <a href="#">サイトマップ</a>
    <a href="#">プライバシーポリシー</a>
    <a href="#">問い合わせ</a>
  </div>
  <div class="copy">
    ODAcorp
  </div>
</div>

<script src="auth-check.js"></script>
<script>
// --- Supabaseの設定（index.htmlと同じものを使います） ---
// Supabase設定は auth-check.js で共通読み込み済み

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("username").value;
  const email = document.getElementById("email").value + "@gmail.com";
  const password = document.getElementById("password").value;

  if (!name || !password || !document.getElementById("email").value) {
    alert("全ての項目を入力してください");
    return;
  }

  try {
    // 1. Supabase Authでユーザーを作成
    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          display_name: name // ユーザー名をメタデータとして保存
        }
      }
    });

    if (error) throw error;

    if (data.user) {
      // 2. profilesテーブルにユーザー情報を紐付け（初期設定）
      // ※Supabase側でトリガーを設定していない場合、ここで手動作成します
      const { error: profileError } = await supabaseClient
        .from('profiles')
        .insert([
          { 
            id: data.user.id, 
            username: name,
            total_nvt: 0 
          }
        ]);

      if (profileError) {
        console.warn("Profile作成エラー:", profileError.message);
      }

      alert("登録が完了しました！");
      // 登録完了後の遷移先（complete.htmlへ）
      window.location.href = "complete.html";
    }

  } catch (error) {
    alert("エラーが発生しました: " + error.message);
    console.error(error);
  }
});
</script>

</body>
</html>
