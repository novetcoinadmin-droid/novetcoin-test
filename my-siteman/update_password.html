<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>パスワード再設定 | ノベットコイン.com</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f5f5f5; }
    .container { max-width: 500px; margin: 60px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #333; }
    p { text-align: center; font-size: 14px; color: #666; margin-bottom: 30px; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
    input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; margin-top: 25px; padding: 14px; font-size: 16px; font-weight: bold; background-color: #6a0dad; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #5800a8; }
  </style>
<style>body { background: #2c2e33 !important; }</style></head>

<body>

<div class="container">
  <h1>新しいパスワードの設定</h1>
  <p>アカウントの新しいパスワードを入力してください。<br>（6文字以上）</p>

  <form id="updateForm">
    <label>新しいパスワード</label>
    <input type="password" id="newPassword" placeholder="新しいパスワードを入力" required minlength="6">
    <button type="submit">パスワードを変更してログイン</button>
  </form>
</div>

<script>
// Supabaseの接続設定
const SUPABASE_URL = "https://brgaykxyfgylzyujrjbp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2F5a3h5Zmd5bHp5dWpyamJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxNDUsImV4cCI6MjA5MDIwMDE0NX0.HRN3DDpjFKeiyfhdhvcHOHg0lvnSvozJwBFsL0E12e0";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// パスワード更新処理
document.getElementById("updateForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  
  const newPassword = document.getElementById("newPassword").value;
  
  if (!newPassword || newPassword.length < 6) {
    return alert("パスワードは6文字以上で入力してください。");
  }

  try {
    // 💡 URLのハッシュ（#access_token=...）をSupabaseが自動で読み取って、パスワードを上書きしてくれます
    const { error } = await supabaseClient.auth.updateUser({
      password: newPassword
    });

    if (error) throw error;

    alert("✅ パスワードの変更が完了しました！\nトップページへ移動します。");
    // パスワード変更と同時にログイン状態になるので、トップへ飛ばします
    window.location.href = "index.html";

  } catch (error) {
    alert("エラーが発生しました: " + error.message + "\n時間が経ってリンクが無効になった可能性があります。もう一度パスワードリセットメールを送信し直してください。");
  }
});
</script>

</body>
</html>
