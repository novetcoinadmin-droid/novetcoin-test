<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script src="/config.jp"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <title>作品一覧 - 本棚</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* スタイル部分は以前のままでOKです（省略） */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; }
    .menu { background: #333; height: 50px; display: flex; align-items: center; padding: 0 20px; }
    .menu a { color: white; margin-right: 20px; text-decoration: none; font-size: 14px; line-height: 50px; }
    .layout { display: flex; max-width: 1200px; margin: 30px auto; gap: 20px; }
    .left { width: 220px; }
    .side-box { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
    .side-box h3 { font-size: 14px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #6a0dad; }
    .search-box { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
    .side-list { list-style: none; font-size: 14px; }
    .side-list li { padding: 8px 0; cursor: pointer; color: #555; }
    .side-list li.active { color: #6a0dad; font-weight: bold; text-decoration: underline; }
    .main { flex: 1; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd; min-height: 600px; }
    .main h1 { font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .novel-list { list-style: none; }
    .novel-list li { padding: 20px 0; border-bottom: 1px solid #eee; }
    .novel-list a { font-size: 18px; color: #333; text-decoration: none; font-weight: bold; }
    .meta { display: block; font-size: 13px; color: #777; margin-top: 8px; }
    .right { width: 250px; background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; align-self: flex-start; }
    .right h3 { font-size: 16px; margin-bottom: 15px; }
    .right p { margin-bottom: 12px; font-size: 14px; }
    .right-btn { display: block; width: 100%; padding: 10px; background: #6a0dad; color: white; text-align: center; text-decoration: none; border-radius: 5px; margin-top: 10px; font-size: 14px; }
    .logout-btn { display: block; width: 100%; padding: 8px; background: #fff; color: #888; text-align: center; border: 1px solid #ddd; border-radius: 5px; margin-top: 10px; font-size: 12px; cursor: pointer; }
  </style>
<style>body { background: #fdeff2 !important; }</style></head>
<body>

  <div class="menu">
    <a href="index.html">トップ</a>
    <a href="works.html">本棚</a>
    <a href="nft_mint.html">NNFTへ</a>
  </div>

  <div class="layout">
    <div class="left">
      <div class="side-box">
        <h3>作品検索</h3>
        <input type="text" id="searchInput" class="search-box" placeholder="タイトル検索..." oninput="fetchNovels()">
      </div>
      <div class="side-box">
        <h3>並べ替え</h3>
        <ul class="side-list" id="sortMenu">
          <li onclick="changeSort('id')" id="sort-id" class="active">新着順</li>
          <li onclick="changeSort('views')" id="sort-views">閲覧ランキング</li>
          <li onclick="changeSort('likes')" id="sort-likes">いいねランキング</li>
          <li onclick="changeSort('char_count')" id="sort-char_count">文字数順</li>
        </ul>
      </div>
    </div>

    <div class="main">
      <h1 id="listTitle">一般本棚</h1>
      <ul class="novel-list" id="worksList"></ul>
    </div>

    <div class="right" id="rightPanel"></div>
  </div>

<script>
// --- 1. Supabase 設定（修正済み） ---
const SUPABASE_URL = "https://brgaykxyfgylzyujrjbp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ2F5a3h5Zmd5bHp5dWpyamJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxNDUsImV4cCI6MjA5MDIwMDE0NX0.HRN3DDpjFKeiyfhdhvcHOHg0lvnSvozJwBFsL0E12e0";

// 変数名を supabaseClient に統一して二重宣言エラーを回避
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSort = 'id';

// --- 2. 作品データ取得 ---
async function fetchNovels() {
  const list = document.getElementById("worksList");
  const query = document.getElementById("searchInput").value;

  // A. データ取得条件の構築
  let builder = supabaseClient
    .from('novels')
    .select('*, authors!inner(author_name, zone)') // ★変更
    .eq('published', true)
    .neq('review_status', 'suspended')
    .eq('authors.zone', 'womens');

  // 検索クエリがあれば適用
  if (query) {
    builder = builder.ilike('title', `%${query}%`);
  }

  // ソート適用
  builder = builder.order(currentSort, { ascending: false });

  const { data: novels, error } = await builder;

  if (error) {
    console.error("データ取得エラー:", error);
    list.innerHTML = "<li>データ取得に失敗しました</li>";
    return;
  }

  list.innerHTML = "";
  if (!novels || novels.length === 0) {
    list.innerHTML = "<li style='text-align:center; padding:50px; color:#999;'>公開作品が見つかりません</li>";
    return;
  }

  // B. リストの描画
  novels.forEach(n => {
    const li = document.createElement("li");
    const penName = n.authors ? n.authors.author_name : "不明な作家";
    
    // 話数のカウント
    const epCount = (n.content || []).reduce((acc, chap) => acc + (chap.episodes ? chap.episodes.length : 0), 0);

    // ★【追加】ステータスに応じたバッジ（マーク）の生成
    let statusBadge = "";
    if (n.review_status === 'reported') {
      statusBadge = '<span style="background:#ff4d4d; color:white; font-size:10px; padding:2px 6px; border-radius:3px; margin-left:8px; vertical-align:middle;">⚠️ 精査中</span>';
    } else if (n.review_status === 'ai_cleared') {
      statusBadge = '<span style="background:#eee; color:#888; font-size:10px; padding:2px 6px; border-radius:3px; margin-left:8px; vertical-align:middle; opacity:0.7;">🔍 審査済</span>';
    }

    li.innerHTML = `
      <div style="display:flex; align-items:center;">
        <a href="detail.html?authorId=${n.author_id}&id=${n.id}">${n.title}</a>
        ${statusBadge} 
      </div>
      <span class="meta">
        作者：${penName} （全 ${epCount} 話 / ${ (n.char_count || 0).toLocaleString() } 文字）
        <span style="margin-left:15px; color:#999;">👁 ${n.views || 0}  ❤️ ${n.likes || 0}</span>
      </span>
    `;
    list.appendChild(li);
  });
}

// --- 3. ソート切り替え ---
function changeSort(column) {
  currentSort = column;
  document.querySelectorAll('.side-list li').forEach(li => li.classList.remove('active'));
  document.getElementById(`sort-${column}`).classList.add('active');
  fetchNovels();
}

// --- 3. 右パネル（ログイン状態の反映） ---
async function renderRightPanel() {
  const panel = document.getElementById("rightPanel");
  
  // 1. 現在のログインユーザーを取得
  const { data: { user }, error: authError } = await supabaseClient.auth.getUser();

  // ログインしていない、またはエラーの場合（ゲスト表示）
  if (authError || !user) {
    panel.innerHTML = `
      <h3>ゲストさん</h3>
      <p style="font-size:12px; color:#666; margin-bottom:15px;">ログインすると執筆や報酬の受け取りが可能です。</p>
      <a href="register.html" class="right-btn">新規登録</a>
      <a href="login.html" class="right-btn" style="background:#555; margin-top:10px;">ログイン</a>
    `;
    return;
  }

  // 2. ログインしている場合
  try {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    const { data: myNovels } = await supabaseClient
      .from('novels')
      .select('char_count')
      .eq('user_id', user.id)
      .eq('published', true);

    const wCount = myNovels ? myNovels.length : 0;
    const tChars = myNovels ? myNovels.reduce((sum, n) => sum + (n.char_count || 0), 0) : 0;

    // --- ここから表示内容の変更 ---
    panel.innerHTML = `
       <h3 style="border-bottom: 2px solid #6a0dad; padding-bottom: 5px; margin-bottom: 15px;">マイステータス</h3>
      
      <p style="font-size:13px; margin-bottom:10px;"><b>👤 アカウント：</b><br>${profile?.username || "名無し"}</p>
      
      <a href="/portal/wallet.html" style="text-decoration: none; color: inherit; display: block;">
        <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #eee; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='#f9f9f9'">
          <p style="font-size:11px; color:#666; margin-bottom:5px;">保有資産 <span style="color:#6a0dad; font-weight:bold;">(クリックでウォレットへ)</span></p>
          <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span style="font-size:13px; font-weight:bold; color:#6a0dad;">💎 NVT (報酬)</span>
            <span style="font-size:13px; font-weight:bold;">${(profile?.nvt_balance || 0).toLocaleString()}</span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:13px; font-weight:bold; color:#ff8c00;">💰 NP (ポイント)</span>
            <span style="font-size:13px; font-weight:bold;">${(profile?.np_balance || 0).toLocaleString()}</span>
          </div>
        </div>
      </a>
      <div style="font-size:12px; color:#444; border-top:1px solid #eee; pt:10px;">

      <div style="font-size:12px; color:#444; border-top:1px solid #eee; pt:10px;">
        <p><b>作品数：</b>${wCount} 作品</p>
        <p><b>累計文字数：</b>${tChars.toLocaleString()} 字</p>
      </div>

      <a href="/my-sitewomens//portal/account.html"" class="right-btn" style="margin-top:15px;">マイページ / お財布</a>
      <button class="logout-btn" onclick="handleLogout()" style="background:none; border:none; color:#999; text-decoration:underline; font-size:11px; cursor:pointer; width:100%; margin-top:10px;">ログアウト</button>
    `;
  } catch (err) {
    console.error("データ取得失敗:", err);
  }
}

async function handleLogout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

// 初期実行
fetchNovels();
renderRightPanel();

// アカウント状態（凍結）をチェックする共通関数
async function checkAccountStatus() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  
  if (user) {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('is_frozen')
      .eq('id', user.id)
      .single();

    if (profile && profile.is_frozen) {
      // ★ location.href ではなく replace を使うのがコツです
      window.location.replace('penalty.html');
      return true;
    }
  }
  return false;
}

// ページ読み込み時の実行処理
async function initPage() {
  const isFrozen = await checkAccountStatus();
  if (isFrozen) return; // 凍結中なら以下の処理はやめる

  // ここに各ページ元々の読み込み処理（fetchNovelsなど）があれば書く
  if (typeof fetchNovels === 'function') fetchNovels();
  if (typeof renderRightPanel === 'function') renderRightPanel();
}

// 実行
initPage();
</script>
</body>
</html>
