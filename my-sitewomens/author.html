<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<title>作家ページ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: #f5f5f5;
}

/* メニュー */
.menu {
  background: #333;
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 20px;
}

.menu a {
  color: white;
  margin-right: 20px;
  text-decoration: none;
}

/* 戻るリンク（外に出す） */
.back-link {
  width: 800px;
  margin: 20px auto 0;
  font-size: 14px;
}

.back-link a {
  text-decoration: none;
  color: #333;
}

/* メイン中央 */
.container {
  width: 800px;
  margin: 20px auto;
  background: #fff;
  padding: 30px;
}

/* タイトル */
h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* 新規作成 */
.create {
  text-align: center;
  margin-bottom: 20px;
}

.create a {
  display: inline-block;
  padding: 8px 16px;
  border: 1px solid #999;
  text-decoration: none;
  color: #333;
}

/* リスト */
.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 15px 0;
  border-bottom: 1px solid #ddd;
}

/* タイトル */
.work-title {
  font-size: 16px;
}

/* 編集ボタン */
.edit-btn {
  padding: 6px 12px;
  border: 1px solid #999;
  background: #fff;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px; /* ボタン同士の間隔 */
}

.work-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.page-title {
  text-align: center;
  margin-bottom: 40px;
}

.label {
  display: block;
  font-size: 14px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.author-badge {
  display: inline-block;
  font-size: 28px;
  background: linear-gradient(135deg, #6e8efb, #a7a7af);
  color: white;
  padding: 5px 25px;
  border-radius: 50px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
</style>
<style>body { background: #fdeff2 !important; }</style></head>

<body>

<div class="menu">
  <a href="index.html">トップ</a>
  <a href="works.html">本棚</a>
</div>

<div class="back-link">
  ← <a href="../portal/account.html">アカウント管理へもどる</a>
</div>
<div class="container">  <!-- ★これ追加 -->
<h1 class="page-title">
  <span class="label">作家名：</span>
  <span id="displayAuthorName" class="author-badge">読み込み中...</span>
</h1>

  <!-- 新規作成 -->
  <div class="create">
    <button onclick="createNewWork()">＋ 新規作成</button>
  </div>

  <!-- 作品一覧 -->
  <div id="workList"></div>

</div> <!-- ★ここで閉じる -->

<script src="auth-check.js"></script>
<script>
// --- 1. 初期設定 ---
// window.supabaseClient は auth-check.js で設定済み
const authorId = localStorage.getItem("authorId");
let novels = [];
let currentUser = null;

// --- 2. データの取得と描画 ---
async function fetchNovels() {
  // ★ ご希望の妥協案をここに実装！
  // authorId が無い、または "null" の文字列になっている場合はエラーを出さずに戻す
  if (!authorId || authorId === "null" || authorId === "undefined") {
    alert("作家データを読み込めません、アカウント管理ページから入りなおしてください。");
    window.location.href = "../portal/account.html";
    return;
  }

  try {
    // ユーザー情報の取得
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    
    if (!user) {
      location.href = "login.html";
      return;
    }
    currentUser = user;

    // 作家名取得
    const { data: author, error: authorError } = await window.supabaseClient
      .from('authors')
      .select('*')
      .eq('id', authorId)
      .single();

    if (authorError) throw authorError;

    document.getElementById("displayAuthorName").innerText = author?.author_name || "不明な作家";

    // 作品取得
    const { data, error: novelError } = await window.supabaseClient
      .from('novels')
      .select('*')
      .eq('author_id', authorId)
      .order('created_at', { ascending: false });

    if (novelError) throw novelError;

    novels = data;
    displayNovels(data); 

  } catch (err) {
    console.error("データ取得失敗:", err);
  }
}

// --- 3. 作品リストを表示 ---
function displayNovels(novels) {
  const area = document.getElementById("workList"); 
  if (!area) return;
  area.innerHTML = "";

  if (!novels || novels.length === 0) {
    area.innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>作品がありません</p>";
    return;
  }

  novels.forEach((w) => {
    const isPublished = w.published === true;
    let statusNotice = "";
    let statusText = isPublished ? "【投稿済み】" : "【未投稿】";
    let rowStyle = "display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;";

    if (w.review_status === 'suspended') {
      statusText = "<span style='color:#d32f2f;'>【🚫規約違反による停止】</span>";
      rowStyle += "background: #fff0f0;"; 
      statusNotice = `<div style="font-size: 11px; color: #d32f2f; margin-bottom: 5px; font-weight: bold;">※この作品は規約違反のため運営により公開停止されています。</div>`;
    } else if (w.review_status === 'reported') {
      statusText = "<span style='color:#f57f17;'>【⚠️内容精査中】</span>";
    }

    const div = document.createElement("div");
    div.className = "work-item";
    div.style = rowStyle;
    
    div.innerHTML = `
      <div style="flex: 1;">
        ${statusNotice}
        <span>${statusText} <strong>${w.title}</strong></span>
      </div>
      <div class="actions">
        <button onclick="editWork('${w.id}')" style="margin-right:5px;">編集</button>
        <button onclick="togglePublish('${w.id}', ${isPublished})" 
                ${w.review_status === 'suspended' ? 'disabled' : ''}
                style="margin-right:5px; background: ${isPublished ? '#666' : '#6a0dad'}; color:white; border:none; padding:5px 10px; border-radius:3px; cursor: ${w.review_status === 'suspended' ? 'not-allowed' : 'pointer'}; opacity: ${w.review_status === 'suspended' ? '0.5' : '1'};">
          ${isPublished ? '投稿停止' : '投稿'}
        </button>
        ${!isPublished ? `<button onclick="deleteWork('${w.id}')" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">削除</button>` : ''}
      </div>
    `;
    area.appendChild(div);
  });
}

// --- 4. 投稿状態の切り替え ---
async function togglePublish(id, currentPublishedStatus) {
  const action = currentPublishedStatus ? "本棚から下げて「下書き」に戻しますか？" : "この作品を「本棚」に公開しますか？";
  if (!confirm(action)) return;

  try {
    const newStatus = !currentPublishedStatus; 

    const { error } = await window.supabaseClient
      .from('novels')
      .update({ published: newStatus })
      .eq('id', id);

    if (error) throw error;

    if (newStatus === true) {
      const { data: rewardData, error: rewardError } = await window.supabaseClient.rpc('check_and_grant_reward', { target_novel_id: id });
      if (rewardError) {
        console.error("報酬チェック失敗:", rewardError.message);
      } else if (rewardData && rewardData.status === 'success') {
        alert(`【達成報酬】\n報酬として ${rewardData.new_grants} NVT を付与しました。`);
      }
    }

    alert(currentPublishedStatus ? "下書きに戻しました。" : "本棚に投稿しました！");
    await fetchNovels(); 
  } catch (err) {
    alert("状態の更新に失敗しました: " + err.message);
  }
}

// --- 5. 作品の削除 ---
async function deleteWork(id) {
  if (!confirm("この作品を完全に削除しますか？\n未確定の報酬データもすべて消去されます。")) return;

  try {
    await window.supabaseClient.from('rewards_pending').delete().eq('novel_id', id);
    await window.supabaseClient.from('reports').delete().eq('novel_id', id);
    await window.supabaseClient.from('messages').delete().eq('novel_id', id);
    
    const { error: mainError } = await window.supabaseClient.from('novels').delete().eq('id', id);
    if (mainError) throw mainError;

    alert("作品を完全に削除しました。");
    await fetchNovels();
  } catch (err) {
    alert(`削除に失敗しました。\n理由: ${err.message}`);
  }
}

// --- 6. 画面遷移と作成 ---
function editWork(id) {
  localStorage.setItem("editNovelId", id);
  location.href = "novel_profile.html";
}

async function createNewWork() {
  if (!authorId || authorId === "null" || authorId === "undefined") {
    alert("作家データを読み込めません、アカウント管理ページから入りなおしてください。");
    window.location.href = "../portal/account.html";
    return;
  }
  const { data: { user } } = await window.supabaseClient.auth.getUser();
  if (!user) return;

  const { data, error } = await window.supabaseClient
    .from('novels')
    .insert([{ user_id: user.id, author_id: authorId, title: "無題の作品", content: [] }])
    .select()
    .single();

  if (error) {
    alert("作品の作成に失敗しました: " + error.message);
    return;
  }

  localStorage.setItem("editNovelId", data.id);
  location.href = "novel_profile.html";
}

// --- 7. 初期化とアカウント凍結チェック ---
async function checkAccountStatus() {
  const { data: { user } } = await window.supabaseClient.auth.getUser();
  if (user) {
    const { data: profile } = await window.supabaseClient.from('profiles').select('is_frozen').eq('id', user.id).single();
    if (profile && profile.is_frozen) {
      window.location.replace('../my-site/penalty.html');
      return true;
    }
  }
  return false;
}

async function initPage() {
  const isFrozen = await checkAccountStatus();
  if (isFrozen) return; 

  await fetchNovels();
}

// ページ読み込み時に実行
initPage();
</script>
</body>
</html>
