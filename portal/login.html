<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン | ノベットコイン.com</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; background-color: #f5f5f5; }
    .container { max-width: 400px; margin: 100px auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 30px; }
    button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }

    .google-btn { background-color: #4285F4; color: #fff; font-weight: bold; }
    .google-btn:hover { background-color: #357ae8; }
    .google-btn:disabled { background-color: #aaa; cursor: not-allowed; }

    .reset-btn { background-color: #6a0dad; color: #fff; font-weight: bold; margin-top: 12px; }
    .reset-btn:hover { background-color: #580b91; }
    .reset-btn:disabled { background-color: #aaa; cursor: not-allowed; }

    .back-link { display: inline-block; margin-bottom: 20px; color: #6a0dad; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }

    .info-text { text-align: center; margin-top: 20px; font-size: 13px; color: #666; line-height: 1.6; }
    .status-text { text-align: center; margin-top: 15px; font-size: 12px; color: #888; line-height: 1.6; word-break: break-word; }

    .reset-box { display: none; }
    .reset-box input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .footer { background: #333; color: white; text-align: center; padding: 20px 10px; margin-top: 60px; }
    .footer .copy { font-size: 12px; color: #ccc; }
  </style>
</head>

<body>

<div class="container">
  <a href="../my-site/index.html" class="back-link">← トップへ戻る</a>

  <div id="loginBox">
    <h1>ログイン</h1>

    <button type="button" id="googleLoginBtn" class="google-btn">
      Googleでログイン / ウォレット作成
    </button>

    <div class="info-text">
      Googleアカウントでログインするだけで、<br>
      あなたの専用ウォレットが自動的に作成されます。
    </div>

    <div id="loginStatus" class="status-text">
      Dynamicを初期化中...
    </div>
  </div>

  <div id="resetBox" class="reset-box">
    <h1>パスワード再設定</h1>

    <div class="info-text">
      Supabase Auth連携用のパスワードを再設定します。<br>
      指定した形式のパスワードを入力してください。
    </div>

    <input type="password" id="newPasswordInput" placeholder="新しいパスワード">
    <input type="password" id="newPasswordConfirmInput" placeholder="新しいパスワードを再入力">

    <button type="button" id="resetPasswordBtn" class="reset-btn">
      パスワードを更新する
    </button>

    <div id="resetStatus" class="status-text">
      パスワードを入力してください。
    </div>
  </div>
</div>

<div class="footer">
  <div class="copy">ODAcorp</div>
</div>

<script type="module">
  import {
    createDynamicClient,
    authenticateWithSocial,
    detectOAuthRedirect,
    completeSocialAuthentication,
    isSignedIn,
    waitForClientInitialized,
  } from "https://esm.sh/@dynamic-labs-sdk/client";

  import {
    createWaasWalletAccounts,
    getChainsMissingWaasWalletAccounts,
  } from "https://esm.sh/@dynamic-labs-sdk/client/waas";

  import { addEvmExtension } from "https://esm.sh/@dynamic-labs-sdk/evm";

  const SUPABASE_URL = "https://brgaykxyfgylzyujrjbp.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZhe5Zmd5bHp5dWpyamJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxNDUsImV4cCI6MjA5MDIwMDE0NX0.HRN3DDpjFKeiyfhdhvcHOHg0lvnSvozJwBFsL0E12e0".replace("Zhe5", "h5");

  const environmentId = "29eddb8f-3de5-4dd0-be48-ec5a7d811a92";

  window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginBox = document.getElementById("loginBox");
  const resetBox = document.getElementById("resetBox");

  const statusEl = document.getElementById("loginStatus");
  const loginBtn = document.getElementById("googleLoginBtn");

  const resetStatusEl = document.getElementById("resetStatus");
  const resetPasswordBtn = document.getElementById("resetPasswordBtn");
  const newPasswordInput = document.getElementById("newPasswordInput");
  const newPasswordConfirmInput = document.getElementById("newPasswordConfirmInput");

  const client = createDynamicClient({
    environmentId,
    metadata: {
      name: "ノベットコイン.com",
      universalLink: window.location.origin,
    },
  });

  addEvmExtension();

  function setStatus(message) {
    statusEl.innerText = message;
  }

  function setResetStatus(message) {
    resetStatusEl.innerText = message;
  }

  function getRedirectUrl() {
    if (window.location.protocol === "file:") {
      return null;
    }

    return window.location.origin + window.location.pathname;
  }

  function getAfterLoginUrl() {
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next");

    if (next && !next.startsWith("http")) {
      return next;
    }

    return "account.html";
  }

  function getEmailFromDynamicUser(user) {
    const verifiedCredentials = user?.verifiedCredentials ?? [];

    return (
      user?.email ||
      user?.oauthEmails?.[0] ||
      verifiedCredentials.map((item) => item?.email).filter(Boolean)[0] ||
      null
    );
  }

  function getEvmWalletCredential(user) {
    const verifiedCredentials = user?.verifiedCredentials ?? [];

    return (
      verifiedCredentials.find(
        (item) =>
          item?.address &&
          (
            item?.chain === "eip155" ||
            item?.walletProvider === "embeddedWallet" ||
            item?.walletName === "dynamicwaas"
          )
      ) ?? null
    );
  }

  function isPasswordRecoveryReturn() {
    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const query = new URLSearchParams(window.location.search);

    return (
      hash.get("type") === "recovery" ||
      query.get("type") === "recovery" ||
      hash.has("access_token")
    );
  }

  async function handlePasswordRecoveryIfNeeded() {
    if (!isPasswordRecoveryReturn()) return false;

    loginBox.style.display = "none";
    resetBox.style.display = "block";

    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const accessToken = hash.get("access_token");
    const refreshToken = hash.get("refresh_token");

    if (!accessToken || !refreshToken) {
      setResetStatus("リセット用トークンが見つかりません。もう一度リセットメールを送ってください。");
      return true;
    }

    const { error } = await window.supabaseClient.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });

    if (error) {
      setResetStatus("リセット認証に失敗しました: " + error.message);
      return true;
    }

    window.history.replaceState({}, document.title, window.location.pathname);
    setResetStatus("新しいパスワードを入力してください。");
    return true;
  }

  async function createWalletIfNeeded() {
    const missingChains = getChainsMissingWaasWalletAccounts();

    if (missingChains.length > 0) {
      setStatus("サイト内ウォレットを作成中...");
      await createWaasWalletAccounts({ chains: missingChains });
    }
  }

  async function syncDynamicProfile() {
    const user = client.user;
    const email = getEmailFromDynamicUser(user);
    const dynamicUserId = user?.id ?? null;
    const evmWalletCredential = getEvmWalletCredential(user);
    const walletAddress = evmWalletCredential?.address ?? null;

    if (!email || !dynamicUserId || !walletAddress) {
      throw new Error("Dynamicユーザー情報またはウォレット情報が不足しています。");
    }

    const response = await fetch(
      "https://brgaykxyfgylzyujrjbp.supabase.co/functions/v1/sync-dynamic-profile",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          email,
          dynamic_user_id: dynamicUserId,
          dynamic_wallet_address: walletAddress,
        }),
      }
    );

    const result = await response.json().catch(() => null);

    if (!response.ok) {
      throw new Error(result?.error || "Supabaseプロフィール同期に失敗しました。");
    }

    localStorage.setItem("userEmail", email);
    localStorage.setItem("dynamicUserId", dynamicUserId);
    localStorage.setItem("dynamicWalletAddress", walletAddress);

    return {
      email,
      dynamicUserId,
      walletAddress,
      result,
    };
  }

  async function ensureSupabaseAuthSession({ email, dynamicUserId }) {
    const syncPassword = "Nvt!" + dynamicUserId + "2026";

    let authResult = await window.supabaseClient.auth.signInWithPassword({
      email,
      password: syncPassword,
    });

    if (authResult.error) {
      const signUpResult = await window.supabaseClient.auth.signUp({
        email,
        password: syncPassword,
      });

      if (signUpResult.error) {
        throw new Error("Supabase Auth連携失敗: " + signUpResult.error.message);
      }

      authResult = await window.supabaseClient.auth.signInWithPassword({
        email,
        password: syncPassword,
      });
    }

    if (authResult.error) {
      throw new Error("Supabase Authログイン失敗: " + authResult.error.message);
    }

    return authResult.data.user;
  }

  async function completeLoginFlow() {
    await createWalletIfNeeded();

    setStatus("プロフィール同期中...");
    const synced = await syncDynamicProfile();

    setStatus("Supabaseログイン状態を作成中...");
    await ensureSupabaseAuthSession({
      email: synced.email,
      dynamicUserId: synced.dynamicUserId,
    });

    setStatus("ログイン成功。移動します...");

    setTimeout(() => {
      window.location.href = getAfterLoginUrl();
    }, 500);
  }

  async function handleRedirectIfNeeded() {
    try {
      const isRecovery = await handlePasswordRecoveryIfNeeded();
      if (isRecovery) return;

      loginBtn.disabled = true;
      setStatus("Dynamicを初期化中...");

      await waitForClientInitialized();

      const currentUrl = new URL(window.location.href);
      const isReturning = await detectOAuthRedirect({ url: currentUrl });

      if (isReturning) {
        setStatus("Googleログイン完了処理中...");
        await completeSocialAuthentication({ url: currentUrl });

        window.history.replaceState({}, document.title, window.location.pathname);

        await completeLoginFlow();
        return;
      }

      if (isSignedIn() && client.user) {
        setStatus("ログイン済みです。同期中...");
        await completeLoginFlow();
        return;
      }

      setStatus("Googleでログインしてください。");
    } catch (error) {
      console.error("Dynamic login handling error:", error);
      setStatus("ログイン処理エラー: " + (error?.message || String(error)));
    } finally {
      loginBtn.disabled = false;
    }
  }

  loginBtn.addEventListener("click", async () => {
    try {
      const redirectUrl = getRedirectUrl();

      if (!redirectUrl) {
        setStatus("このログインはWeb上のURLで開いてください。file:// ではDynamicログインできません。");
        return;
      }

      loginBtn.disabled = true;
      setStatus("Googleログインへ移動中...");

      await authenticateWithSocial({
        provider: "google",
        redirectUrl,
      });
    } catch (error) {
      console.error("Google login start error:", error);
      setStatus("ログイン開始エラー: " + (error?.message || String(error)));
      loginBtn.disabled = false;
    }
  });

  resetPasswordBtn.addEventListener("click", async () => {
    const newPassword = newPasswordInput.value;
    const confirmPassword = newPasswordConfirmInput.value;

    if (!newPassword || !confirmPassword) {
      setResetStatus("パスワードを2回入力してください。");
      return;
    }

    if (newPassword !== confirmPassword) {
      setResetStatus("パスワードが一致しません。");
      return;
    }

    resetPasswordBtn.disabled = true;
    setResetStatus("パスワードを更新中...");

    try {
      const { error } = await window.supabaseClient.auth.updateUser({
        password: newPassword,
      });

      if (error) {
        throw error;
      }

      await window.supabaseClient.auth.signOut();

      setResetStatus("パスワードを更新しました。ログイン画面へ戻ります。");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);
    } catch (error) {
      setResetStatus("更新エラー: " + (error?.message || String(error)));
      resetPasswordBtn.disabled = false;
    }
  });

  handleRedirectIfNeeded();
</script>

</body>
</html>
