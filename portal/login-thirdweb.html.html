<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>thirdweb 接続テスト | ノベットコイン.com</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../my-site/auth-check.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px 20px;
      color: #333;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      background: #fff;
      padding: 36px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 42px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #6a0dad;
      text-decoration: none;
      font-size: 14px;
    }

    .google-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4a82e8;
      color: #fff;
      font-weight: bold;
    }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
    }

    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .value {
      font-weight: bold;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
      text-align: center;
    }

    .next-btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      margin-top: 16px;
      background: #333;
      color: #fff;
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../my-site/index.html" class="back-link">← トップへ戻る</a>

    <h1>ログイン</h1>

    <button type="button" id="googleLoginBtn" class="google-btn">
      thirdweb 接続テストを開始
    </button>

    <div class="status-box">
      <div class="label">状態</div>
      <div id="thirdwebStatus" class="value">未接続</div>
    </div>

    <div class="status-box">
      <div class="label">現在の thirdweb ウォレットアドレス</div>
      <div id="walletAddressResult" class="value">未取得</div>
    </div>

    <button type="button" id="nextStepBtn" class="next-btn">
      session key 付与へ進む（次で有効化）
    </button>

    <div class="note">
      まずはこのページで、<br>
      Googleログイン後に同じページ内で<br>
      thirdweb のウォレットアドレスが表示されることを確認します。
    </div>
  </div>

  <script type="module">
    import { createThirdwebClient } from "https://esm.sh/thirdweb";
    import { polygon } from "https://esm.sh/thirdweb/chains";
    import { inAppWallet } from "https://esm.sh/thirdweb/wallets";

    const CLIENT_ID = "cc1d58553ac67551873be028676a90d6";
    const EXPECTED_WALLET = "0x386ae7147F3A30770af204339ef7D812A7e71A4B";

    const statusEl = document.getElementById("thirdwebStatus");
    const walletAddressEl = document.getElementById("walletAddressResult");
    const loginBtn = document.getElementById("googleLoginBtn");
    const nextStepBtn = document.getElementById("nextStepBtn");

    const client = createThirdwebClient({
      clientId: CLIENT_ID,
    });

    const wallet = inAppWallet({
      auth: {
        mode: "popup",
        options: ["google"],
      },
      executionMode: {
        mode: "EIP7702",
        sponsorGas: true,
      },
    });

    let currentAccount = null;

    function setStatus(text) {
      if (statusEl) statusEl.innerText = text;
    }

    function setWalletAddress(text) {
      if (walletAddressEl) walletAddressEl.innerText = text;
    }

    function updateNextButton(enabled) {
      nextStepBtn.disabled = !enabled;
      nextStepBtn.style.cursor = enabled ? "pointer" : "not-allowed";
      nextStepBtn.style.opacity = enabled ? "1" : "0.6";
      nextStepBtn.innerText = enabled
        ? "次は session key 付与に進めます"
        : "session key 付与へ進む（次で有効化）";
    }

    async function syncProfileWalletAddress(address) {
      const { data: { user } } = await window.supabaseClient.auth.getUser();

      if (!user) {
        setStatus("Supabaseログインが見つかりません");
        return;
      }

      const { error } = await window.supabaseClient
        .from("profiles")
        .update({
          wallet_address: address,
          updated_at: new Date().toISOString(),
        })
        .eq("id", user.id);

      if (error) {
        console.error("profiles update error:", error);
        setStatus("profiles 更新失敗");
        return;
      }
    }

    async function connectThirdweb() {
      try {
        setStatus("Googleログインを開始します...");
        setWalletAddress("未取得");
        updateNextButton(false);

        currentAccount = await wallet.connect({
          client,
          chain: polygon,
          strategy: "google",
        });

        if (!currentAccount) {
          setStatus("thirdweb 接続失敗");
          return;
        }

        const address = currentAccount.address;
        setWalletAddress(address);

        await syncProfileWalletAddress(address);

        if (address.toLowerCase() === EXPECTED_WALLET.toLowerCase()) {
          setStatus("接続成功（期待どおりのアドレスです）");
          updateNextButton(true);
        } else {
          setStatus("接続成功（ただし想定アドレスと異なります）");
          updateNextButton(true);
        }
      } catch (err) {
        console.error("thirdweb connect error:", err);
        setStatus("thirdweb 接続失敗: " + err.message);
        setWalletAddress("未取得");
        updateNextButton(false);
      }
    }

    loginBtn.addEventListener("click", async () => {
      await connectThirdweb();
    });

    nextStepBtn.addEventListener("click", () => {
      if (nextStepBtn.disabled) return;
      alert("ここまで確認できたら、次に session key 付与コードを足します。");
    });

    setStatus("未接続");
    setWalletAddress("未取得");
    updateNextButton(false);
  </script>
</body>
</html>
