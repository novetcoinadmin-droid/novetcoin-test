<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン | ノベットコイン.com</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  

  <style>
    body { font-family: sans-serif; background-color: #f5f5f5; }
    .container { max-width: 400px; margin: 100px auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 30px; }
    button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
    
    .google-btn { background-color: #4285F4; color: #fff; font-weight: bold; }
    .google-btn:hover { background-color: #357ae8; }
    .back-link { display: inline-block; margin-bottom: 20px; color: #6a0dad; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    .info-text { text-align: center; margin-top: 20px; font-size: 13px; color: #666; line-height: 1.6; }
    .footer { background: #333; color: white; text-align: center; padding: 20px 10px; margin-top: 60px; }
    .footer .copy { font-size: 12px; color: #ccc; }
  </style>
</head>

<body>

<div class="container">
  <a href="../my-site/index.html" class="back-link">← トップへ戻る</a>
  <h1>ログイン</h1>

  <button type="button" id="googleLoginBtn" class="google-btn">thirdweb 接続テストを開始</button>
  <p id="thirdwebStatus" style="font-size:12px; color:#666; margin-top:12px;">thirdweb 未確認</p>

  <div class="info-text">
    Googleアカウントでログインするだけで、<br>
    あなたの専用ウォレットが自動的に作成されます。
  </div>
</div>

<div class="footer">
  <div class="copy">ODAcorp</div>
</div>

<script src="auth-check.js"></script>
<script type="module">
  import { createThirdwebClient } from "https://esm.sh/thirdweb";
  import { inAppWallet } from "https://esm.sh/thirdweb/wallets";

  const statusEl = document.getElementById("thirdwebStatus");
  const loginBtn = document.getElementById("googleLoginBtn");

  const client = createThirdwebClient({
    clientId: "cc1d58553ac67551873be028676a90d6"
  });

  const wallet = inAppWallet({
    auth: {
      mode: "redirect",
      options: ["google"],
      redirectUrl: window.location.href,
    },
  });

  async function syncWalletAddressToProfile(walletAddress) {
    const { data: { user } } = await window.supabaseClient.auth.getUser();

    if (!user) {
      if (statusEl) statusEl.innerText = "Supabaseログインが見つかりません。";
      return false;
    }

    const { error } = await window.supabaseClient
      .from("profiles")
      .update({
        wallet_address: walletAddress,
        updated_at: new Date().toISOString()
      })
      .eq("id", user.id);

    if (error) {
      console.error("profiles 更新失敗:", error);
      if (statusEl) statusEl.innerText = "wallet_address 保存失敗";
      return false;
    }

    return true;
  }

  async function handleThirdwebLoginReturn() {
    try {
      const url = new URL(window.location.href);
      const authResult = url.searchParams.get("authResult");

      if (!authResult) {
        if (statusEl) statusEl.innerText = "thirdweb アカウント未接続";
        return;
      }

      if (statusEl) statusEl.innerText = "thirdweb ログイン結果を確認中...";

      const parsed = JSON.parse(authResult);
      const walletAddress =
        parsed?.storedToken?.authDetails?.walletAddress || "";

      if (!walletAddress) {
        if (statusEl) statusEl.innerText = "walletAddress が見つかりません";
        return;
      }

      if (statusEl) statusEl.innerText = `thirdweb 接続済み: ${walletAddress}`;

      const ok = await syncWalletAddressToProfile(walletAddress);
      if (!ok) return;

      if (statusEl) statusEl.innerText = "保存完了。トップへ戻ります...";

      url.search = "";
      window.history.replaceState({}, document.title, url.toString());

      setTimeout(() => {
        window.location.href = "../my-site/index.html";
      }, 1000);
    } catch (err) {
      console.error("thirdweb return handling error:", err);
      if (statusEl) statusEl.innerText = "thirdweb ログイン後処理失敗";
    }
  }

  if (statusEl) {
    statusEl.innerText = "thirdweb module 読み込みOK";
  }

  loginBtn.addEventListener("click", async () => {
    try {
      if (statusEl) statusEl.innerText = "thirdweb Googleログインへ移動します...";
      await wallet.connect({
        client,
        strategy: "google",
      });
    } catch (err) {
      console.error("thirdweb login error:", err);
      if (statusEl) statusEl.innerText = "thirdweb ログイン失敗";
    }
  });

  handleThirdwebLoginReturn();

  window.thirdwebClient = client;
  window.thirdwebWallet = wallet;
</script>

</body>
</html>
